<script type="text/babel">
    (function () {
        const { useState, useEffect } = React;

        window.AccountManagement = function AccountManagement() {
            // State
            const [accounts, setAccounts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [message, setMessage] = useState({ type: '', text: '' });
            const [pwdModal, setPwdModal] = useState({ isOpen: false, username: '', newPassword: '' });
            const ACCOUNT_CACHE_KEY = "karaoke_account_cache_v1";
            const ACCOUNT_CACHE_TTL_MS = 60 * 1000;

            // Form thêm mới
            const [newForm, setNewForm] = useState({
                username: '',
                password: '',
                role: 'staff',
                name: ''
            });

            const saveAccountCache = (nextAccounts) => {
                try {
                    localStorage.setItem(ACCOUNT_CACHE_KEY, JSON.stringify({
                        ts: Date.now(),
                        data: Array.isArray(nextAccounts) ? nextAccounts : []
                    }));
                } catch (e) {
                    console.warn("Save account cache failed", e);
                }
            };

            const readAccountCache = () => {
                try {
                    const raw = localStorage.getItem(ACCOUNT_CACHE_KEY);
                    if (!raw) return null;
                    const parsed = JSON.parse(raw);
                    if (!parsed || !parsed.ts || !Array.isArray(parsed.data)) return null;
                    const isExpired = Date.now() - Number(parsed.ts) > ACCOUNT_CACHE_TTL_MS;
                    return { data: parsed.data, isExpired };
                } catch (e) {
                    console.warn("Read account cache failed", e);
                    return null;
                }
            };

            // Load danh sách tài khoản
            const loadAccounts = () => {
                setMessage({ type: '', text: '' });
                const cached = readAccountCache();
                if (cached?.data) {
                    // ✅ Hiện ngay từ cache, không chờ server
                    setAccounts(cached.data);
                    setLoading(false);
                } else {
                    setLoading(true);
                }

                google.script.run
                    .withSuccessHandler((data) => {
                        const normalized = Array.isArray(data) ? data : [];
                        setAccounts(normalized);
                        saveAccountCache(normalized);
                        setLoading(false);
                    })
                    .withFailureHandler((err) => {
                        if (!cached?.data) {
                            setMessage({ type: 'error', text: 'Lỗi tải dữ liệu: ' + (err.message || err) });
                        }
                        setLoading(false);
                    })
                    .getAllAccounts();
            };

            // Thêm tài khoản mới
            const handleAddAccount = () => {
                if (!newForm.username.trim() || !newForm.password.trim()) {
                    setMessage({ type: 'error', text: 'Vui lòng nhập tên đăng nhập và mật khẩu!' });
                    return;
                }
                if (newForm.password.trim().length < 4) {
                    setMessage({ type: 'error', text: 'Mật khẩu phải có ít nhất 4 ký tự!' });
                    return;
                }

                setSaving(true);
                setMessage({ type: '', text: '' });
                google.script.run
                    .withSuccessHandler((res) => {
                        setMessage({ type: 'success', text: res.message || 'Thêm tài khoản thành công!' });
                        setNewForm({ username: '', password: '', role: 'staff', name: '' });
                        loadAccounts(); // reload danh sách
                        setSaving(false);
                    })
                    .withFailureHandler((err) => {
                        setMessage({ type: 'error', text: err.message || 'Thêm tài khoản thất bại!' });
                        setSaving(false);
                    })
                    .addNewAccount(newForm);
            };

            // Đổi mật khẩu Mở popup
            const openPasswordModal = (username) => {
                setPwdModal({ isOpen: true, username, newPassword: '' });
                setMessage({ type: '', text: '' });
            };

            const closePasswordModal = () => {
                setPwdModal({ isOpen: false, username: '', newPassword: '' });
            };

            const submitPasswordChange = () => {
                const { username, newPassword } = pwdModal;
                if (newPassword.trim().length < 4) {
                    setMessage({ type: 'error', text: "Mật khẩu mới phải có ít nhất 4 ký tự!" });
                    return;
                }
                
                setSaving(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        setMessage({ type: 'success', text: res.message || 'Đổi mật khẩu thành công!' });
                        loadAccounts();
                        setSaving(false);
                        closePasswordModal();
                    })
                    .withFailureHandler((err) => {
                        setMessage({ type: 'error', text: 'Lỗi: ' + (err.message || err) });
                        setSaving(false);
                    })
                    .changePasswordAdmin(username, newPassword);
            };

            // Xoá tài khoản
            const handleDeleteAccount = (username) => {
                if (!confirm(`Bạn có chắc chắn muốn XOÁ tài khoản "${username}" không? Hành động này không thể hoàn tác!`)) return;
                
                google.script.run
                    .withSuccessHandler((res) => {
                        setMessage({ type: 'success', text: res.message || 'Đã xoá tài khoản!' });
                        loadAccounts();
                    })
                    .withFailureHandler((err) => {
                        setMessage({ type: 'error', text: 'Lỗi: ' + (err.message || err) });
                    })
                    .deleteAccountAdmin(username);
            };

            // Load dữ liệu khi component mount
            useEffect(() => {
                loadAccounts();
            }, []);

            // Clear message sau 5 giây
            useEffect(() => {
                if (message.text) {
                    const timer = setTimeout(() => setMessage({ type: '', text: '' }), 5000);
                    return () => clearTimeout(timer);
                }
            }, [message]);

            // Hàm tạo các nút
            return (
                <div className="max-w-7xl mx-auto space-y-6">
                    {/* Header */}
                    <div className="flex items-center justify-between">
                        <h1 className="text-3xl font-bold text-gray-800 flex items-center gap-3">
                            <span className="text-4xl">🔐</span> Quản lý Tài khoản
                        </h1>
                        <button
                            onClick={loadAccounts}
                            className="px-5 py-2.5 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 flex items-center gap-2 font-medium"
                        >
                            <span className="material-icons-round text-lg">refresh</span> Làm mới
                        </button>
                    </div>

                    {/* Form thêm tài khoản */}
                    <div className="bg-white rounded-3xl shadow p-8">
                        <h2 className="text-xl font-semibold mb-6 text-gray-700">Thêm tài khoản mới</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                            {/* Username */}
                            <div>
                                <label className="block text-sm font-medium text-gray-600 mb-1">Tên đăng nhập</label>
                                <input
                                    type="text"
                                    value={newForm.username}
                                    onChange={(e) => setNewForm({ ...newForm, username: e.target.value })}
                                    className="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500"
                                    placeholder="vd: admin2"
                                />
                            </div>
                            {/* Password */}
                            <div>
                                <label className="block text-sm font-medium text-gray-600 mb-1">Mật khẩu</label>
                                <input
                                    type="password"
                                    value={newForm.password}
                                    onChange={(e) => setNewForm({ ...newForm, password: e.target.value })}
                                    className="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500"
                                    placeholder="Ít nhất 4 ký tự"
                                />
                            </div>
                            {/* Role */}
                            <div>
                                <label className="block text-sm font-medium text-gray-600 mb-1">Vai trò</label>
                                <select
                                    value={newForm.role}
                                    onChange={(e) => setNewForm({ ...newForm, role: e.target.value })}
                                    className="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 bg-white"
                                >
                                    <option value="staff">Nhân viên (Staff)</option>
                                    <option value="admin">Quản trị viên (Admin)</option>
                                </select>
                            </div>
                            {/* Tên đầy đủ */}
                            <div>
                                <label className="block text-sm font-medium text-gray-600 mb-1">Tên đầy đủ</label>
                                <input
                                    type="text"
                                    value={newForm.name}
                                    onChange={(e) => setNewForm({ ...newForm, name: e.target.value })}
                                    className="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500"
                                    placeholder="Nguyễn Văn A"
                                />
                            </div>
                        </div>

                        <button
                            onClick={handleAddAccount}
                            disabled={saving}
                            className="mt-8 px-10 py-3.5 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-2xl hover:brightness-105 transition disabled:opacity-70 flex items-center gap-2"
                        >
                            {saving ? 'Đang thêm...' : '➕ Thêm tài khoản mới'}
                        </button>
                    </div>

                    {/* Message */}
                    {message.text && (
                        <div
                            className={`p-4 rounded-2xl text-sm font-medium ${message.type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`}
                        >
                            {message.text}
                        </div>
                    )}

                    {/* Bảng danh sách */}
                    <div className="bg-white rounded-3xl shadow overflow-hidden">
                        <div className="px-8 py-5 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-semibold text-gray-700">Danh sách tài khoản ({accounts.length})</h3>
                        </div>

                        <table className="w-full">
                            <thead className="bg-gray-100">
                                <tr>
                                    <th className="px-8 py-4 text-left font-medium text-gray-600">ID</th>
                                    <th className="px-8 py-4 text-left font-medium text-gray-600">Tài khoản</th>
                                    <th className="px-8 py-4 text-left font-medium text-gray-600">Tên</th>
                                    <th className="px-8 py-4 text-left font-medium text-gray-600">Vai trò</th>
                                    <th className="px-8 py-4 text-center font-medium text-gray-600">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {loading ? (
                                    <tr>
                                        <td colSpan="5" className="py-20 text-center text-gray-500">
                                            Đang tải danh sách tài khoản...
                                        </td>
                                    </tr>
                                ) : (
                                    accounts.map((acc, index) => (
                                        <tr key={index} className="hover:bg-gray-50">
                                            <td className="px-8 py-5 font-mono text-gray-700">{acc.id}</td>
                                            <td className="px-8 py-5 font-medium">{acc.username}</td>
                                            <td className="px-8 py-5 text-gray-600">{acc.name || '—'}</td>
                                            <td className="px-8 py-5">
                                                <span
                                                    className={`inline-block px-4 py-1 text-xs font-semibold rounded-full ${acc.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}
                                                >
                                                    {acc.role.toUpperCase()}
                                                </span>
                                            </td>
                                            <td className="px-8 py-5 text-center space-x-3">
                                                <button
                                                    onClick={() => openPasswordModal(acc.username)}
                                                    className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-all active:scale-95"
                                                    title="Đổi mật khẩu"
                                                >
                                                    🔑 Đổi MK
                                                </button>
                                                <button
                                                    onClick={() => handleDeleteAccount(acc.username)}
                                                    className="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium rounded-xl transition-all active:scale-95"
                                                    title="Xoá tài khoản"
                                                >
                                                    🗑 Xoá
                                                </button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>

                    {/* Pop-up Đổi mật khẩu */}
                    {pwdModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                    <h3 className="text-xl font-bold text-gray-800">🔑 Đổi mật khẩu</h3>
                                    <button onClick={closePasswordModal} className="text-gray-400 hover:text-gray-600">
                                        <span className="material-icons-round">close</span>
                                    </button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-2">Tài khoản</label>
                                        <input
                                            type="text"
                                            value={pwdModal.username}
                                            disabled
                                            className="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 cursor-not-allowed"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-2">Mật khẩu mới</label>
                                        <input
                                            type="password"
                                            value={pwdModal.newPassword}
                                            onChange={(e) => setPwdModal({ ...pwdModal, newPassword: e.target.value })}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500"
                                            placeholder="Nhập ít nhất 4 ký tự..."
                                            autoFocus
                                        />
                                    </div>
                                </div>
                                <div className="p-6 border-t border-gray-100 flex gap-3 bg-gray-50">
                                    <button
                                        onClick={closePasswordModal}
                                        className="flex-1 py-3 px-4 bg-white border border-gray-300 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition"
                                    >
                                        Huỷ
                                    </button>
                                    <button
                                        onClick={submitPasswordChange}
                                        disabled={saving}
                                        className="flex-1 py-3 px-4 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700 disabled:opacity-70 flex justify-center items-center gap-2 transition"
                                    >
                                        {saving ? 'Đang lưu...' : 'Lưu mật khẩu'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
    })();
</script>
