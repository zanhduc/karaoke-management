  <script type="text/babel">
    // ============ SHARED REACT HOOKS ============
    window.ReactShared = {
      useState: React.useState,
      useEffect: React.useEffect,
      useRef: React.useRef,
      useMemo: React.useMemo,
      useCallback: React.useCallback,
    };

    // ============ AUTH CONTEXT ============
    const AuthContext = React.createContext(null);

    // Auth Server Bridge
    const AuthServer = {
      isLocal: !window.google || !google.script || !google.script.run,
      login: function (username, password) {
        if (this.isLocal) {
          return new Promise((resolve) => {
            setTimeout(() => {
              if (username === "admin" && password === "admin123") {
                resolve({
                  success: true,
                  role: "admin",
                  name: "Quản trị viên",
                });
              } else if (username === "staff" && password === "123456") {
                resolve({ success: true, role: "staff", name: "Nhân viên" });
              } else {
                resolve({
                  success: false,
                  message: "Sai tên đăng nhập hoặc mật khẩu!",
                });
              }
            }, 500);
          });
        } else {
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .login(username, password);
          });
        }
      },
    };

    // ============ AUTH PROVIDER ============
    const SESSION_EXPIRY_MS = 24 * 60 * 60 * 1000; // 1 ngày

    function AuthProvider({ children }) {
      const [user, setUser] = React.useState(() => {
        const saved = localStorage.getItem("authUser");
        if (saved) {
          const userData = JSON.parse(saved);
          const loginTime = new Date(userData.loginTime).getTime();
          if (Date.now() - loginTime > SESSION_EXPIRY_MS) {
            localStorage.removeItem("authUser");
            return null;
          }
          return userData;
        }
        return null;
      });

      React.useEffect(() => {
        const checkExpiry = () => {
          if (user && user.loginTime) {
            const loginTime = new Date(user.loginTime).getTime();
            if (Date.now() - loginTime > SESSION_EXPIRY_MS) logout();
          }
        };
        const interval = setInterval(checkExpiry, 60000);
        return () => clearInterval(interval);
      }, [user]);

      const login = async (username, password) => {
        const result = await AuthServer.login(username, password);
        if (result.success) {
          const userData = {
            username,
            role: result.role,
            name: result.name,
            loginTime: new Date().toISOString(),
          };
          localStorage.setItem("authUser", JSON.stringify(userData));
          setUser(userData);
        }
        return result;
      };

      const logout = () => {
        localStorage.removeItem("authUser");
        setUser(null);
        if (!AuthServer.isLocal && google.script.run.logout) {
          google.script.run.logout();
        }
      };

      return (
        <AuthContext.Provider value={{ user, login, logout }}>
          {children}
        </AuthContext.Provider>
      );
    }

    const useAuth = () => React.useContext(AuthContext);

    // ============ ICON COMPONENT ============
    window.Icon = function ({ name, className = "" }) {
      return (
        <span className={`material-icons-round ${className}`}>{name}</span>
      );
    };

    /* ============ CÁC COMPONENT KHÔNG DÙNG ĐÃ BỊ COMMENT ============ */
    /*
    window.PremiumDatePicker = function (...) { ... }
    window.CustomSelect = function (...) { ... }
    */

    // ============ LOGIN APP COMPONENT ============
    function LoginApp() {
      const { login } = useAuth();
      const [username, setUsername] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [showPassword, setShowPassword] = React.useState(false);
      const [isLoading, setIsLoading] = React.useState(false);
      const [error, setError] = React.useState("");
      const [shake, setShake] = React.useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!username.trim() || !password.trim()) {
          setError("Vui lòng nhập đầy đủ thông tin!");
          setShake(true);
          setTimeout(() => setShake(false), 500);
          return;
        }

        setIsLoading(true);
        setError("");

        try {
          const result = await login(username, password);
          if (!result.success) {
            setError(result.message || "Đăng nhập thất bại!");
            setShake(true);
            setTimeout(() => setShake(false), 500);
          }
        } catch (err) {
          setError("Lỗi kết nối: " + err.message);
          setShake(true);
          setTimeout(() => setShake(false), 500);
        } finally {
          setIsLoading(false);
        }
      };

      const Icon = window.Icon;

      return (
        <div
          className="min-h-screen flex items-center justify-center p-4"
          style={{
            background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
          }}
        >
          <div
            className={`w-full max-w-md rounded-3xl shadow-2xl p-8 bg-white/95 backdrop-blur ${shake ? "animate-shake" : ""}`}
            style={{
              animation: shake
                ? "shake 0.5s ease-in-out"
                : "fadeIn 0.5s ease-out",
            }}
          >
            {/* Logo & Header */}
            <div className="text-center mb-8">
              <div className="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                <Icon name="inventory_2" className="text-4xl text-white" />
              </div>
              <h1 className="text-2xl font-bold text-gray-800">
                Quản Lý Quán
              </h1>
              <p className="text-gray-500 mt-2">Đăng nhập để tiếp tục</p>
            </div>

            {/* Error Message */}
            {error && (
              <div className="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 flex items-center gap-2 text-red-600">
                <Icon name="error" className="text-lg" />
                <span className="text-sm font-medium">{error}</span>
              </div>
            )}

            {/* Login Form */}
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-sm font-semibold text-gray-600 mb-2">
                  Tên đăng nhập
                </label>
                <div className="relative">
                  <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <Icon name="person" className="text-xl" />
                  </div>
                  <input
                    type="text"
                    value={username}
                    onChange={(e) => setUsername(e.target.value)}
                    className="w-full pl-12 pr-4 py-3.5 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none text-gray-700 font-medium transition-all"
                    placeholder="Nhập tên đăng nhập..."
                    autoComplete="username"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-semibold text-gray-600 mb-2">
                  Mật khẩu
                </label>
                <div className="relative">
                  <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <Icon name="lock" className="text-xl" />
                  </div>
                  <input
                    type={showPassword ? "text" : "password"}
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full pl-12 pr-12 py-3.5 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none text-gray-700 font-medium transition-all"
                    placeholder="Nhập mật khẩu..."
                    autoComplete="current-password"
                  />
                  <button
                    type="button"
                    onClick={() => setShowPassword(!showPassword)}
                    className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                  >
                    <Icon
                      name={showPassword ? "visibility_off" : "visibility"}
                      className="text-xl"
                    />
                  </button>
                </div>
              </div>

              <button
                type="submit"
                disabled={isLoading}
                className="w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2 disabled:opacity-70 transition-all hover:-translate-y-0.5"
                style={{
                  background:
                    "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
                }}
              >
                {isLoading ? (
                  <>
                    <Icon name="sync" className="text-xl animate-spin" /> Đang
                    đăng nhập...
                  </>
                ) : (
                  <>
                    <Icon name="login" className="text-xl" /> Đăng nhập
                  </>
                )}
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ============ ĐÃ COMMENT PHẦN CHUYỂN TRANG (MainApp) ============ */
    /*
    function MainApp() { ... logic chuyển trang ở đây ... }
    */

    // ============ MAIN APP MẪU (Thay thế tạm thời) ============
    function DummyDashboard() {
      const { user, logout } = useAuth();
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-gray-100 p-4">
          <h1 className="text-3xl font-bold text-green-600 mb-4">
            Đăng nhập thành công!
          </h1>
          <p className="text-gray-700 mb-6">
            Xin chào, {user.name} (Role: {user.role})
          </p>
          <button
            onClick={logout}
            className="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors"
          >
            Đăng xuất
          </button>
        </div>
      );
    }
    function MainApp() {
      const { user, logout } = useAuth();
      const [sidebarOpen, setSidebarOpen] = React.useState(false);
      const getInitialPage = () => {
        try {
          const p = new URLSearchParams(window.location.search).get("page");
          if (p === "product") return "product";
          if (p === "room") return "room";
          if (p === "order-management") return "order-management";
          if (p === "dashboard" && user.role === "admin") return "dashboard";
          if (p === "account" && user.role === "admin") return "account";
          return "room";
        } catch (e) {
          return "room";
        }
      };

      const [page, setPage] = React.useState(getInitialPage);

      const setPageAndUrl = (next) => {
        setPage(next);
        setSidebarOpen(false); // auto-close sidebar on mobile
        try {
          const url = new URL(window.location.href);
          url.searchParams.set("page", next);
          window.history.replaceState({}, "", url.toString());
        } catch (e) {
          // ignore
        }
      };

      const StaffPage = window.StaffPage;
      const ProductPage = window.ProductPage;
      const RoomPage = window.RoomPage;
      const DashboardPage = window.DashboardPage;

      const AccountManagementPage = window.AccountManagement;

      const renderPage = () => {
        if (page === "dashboard") {
          if (!DashboardPage) {
            return (
              <div className="p-4 text-red-600">
                Lỗi: chưa tải được DashboardPage. Kiểm tra file{" "}
                <code>dashboardComponent.html</code> và include trong index.
              </div>
            );
          }
          return <DashboardPage />;
        }
        if (page === "room") {
          if (!RoomPage) {
            return (
              <div className="p-4 text-red-600">
                Lỗi: chưa tải được RoomPage. Kiểm tra file{" "}
                <code>roomOrderIntegratedComponent.html</code> và include trong index.
              </div>
            );
          }
          return <RoomPage />;
        }
        if (page === "staff") {
          if (!StaffPage) {
            return (
              <div className="p-4 text-red-600">
                Lỗi: chưa tải được StaffPage. Kiểm tra file{" "}
                <code>staffComponent.html</code> và include trong index.
              </div>
            );
          }
          return <StaffPage />;
        }
        if (page === "product") {
          if (!ProductPage) {
            return (
              <div className="p-4 text-red-600">
                Lỗi: chưa tải được ProductPage. Kiểm tra{" "}
                <code>productComponent.html</code>.
              </div>
            );
          }
          return <ProductPage />;
        }
        if (page === "account" && user.role === "admin") {
          if (!AccountManagementPage) {
            return (
              <div className="p-4 text-red-600">
                Lỗi: chưa tải được ManagerAccount. Kiểm tra{" "}
                <code>managerAccount.html</code>.
              </div>
            );
          }
          return <AccountManagementPage />;
        }
        return <RoomPage />;
      };

      // Menu items filtered by role
      const navItems = [
        { id: "room", label: "🏠 Quản lý", roles: ["admin", "staff"] },
        { id: "staff", label: "👩‍💼 Nhân viên", roles: ["admin", "staff"] },
        { id: "product", label: "🛒 Hàng hoá", roles: ["admin", "staff"] },

        { id: "dashboard", label: "📊 Dashboard", roles: ["admin"] },
        { id: "account", label: "🔐 Tài khoản", roles: ["admin"] },
      ].filter(item => item.roles.includes(user.role));

      const pageTitles = {
        room: "🏠 Quản lý phòng",

        staff: "👩‍💼 Nhân viên",
        product: "🛒 Hàng hoá",
        dashboard: "📊 Dashboard",
        account: "🔐 Tài khoản",
      };

      return (
        <div className="flex flex-col h-screen bg-blue-50">
          {/* ===== MOBILE OVERLAY ===== */}
          <div
            className={`sidebar-overlay ${sidebarOpen ? "active" : ""}`}
            onClick={() => setSidebarOpen(false)}
          />

          {/* ===== MOBILE SIDEBAR ===== */}
          <div className={`mobile-sidebar bg-white shadow-2xl flex flex-col md:hidden ${sidebarOpen ? "open" : ""}`}>
            <div className="flex items-center justify-between p-4 border-b bg-gradient-to-r from-blue-600 to-indigo-600">
              <div>
                <h2 className="text-white font-bold text-lg">Quản lý Quán</h2>
                <p className="text-blue-100 text-xs">{user.name} · {user.role}</p>
              </div>
              <button onClick={() => setSidebarOpen(false)} className="text-white/80 hover:text-white p-1">
                <span className="material-icons-round">close</span>
              </button>
            </div>
            <nav className="flex-1 py-2 overflow-y-auto">
              {navItems.map(item => (
                <button
                  key={item.id}
                  onClick={() => setPageAndUrl(item.id)}
                  className={`w-full text-left px-5 py-3.5 text-sm font-medium transition-colors ${page === item.id
                    ? "bg-blue-50 text-blue-700 border-r-4 border-blue-600"
                    : "text-slate-700 hover:bg-slate-50"
                    }`}
                >
                  {item.label}
                </button>
              ))}
            </nav>
            <div className="p-4 border-t">
              <button
                onClick={logout}
                className="w-full py-3 bg-red-500 text-white rounded-xl font-semibold text-sm hover:bg-red-600 transition-colors flex items-center justify-center gap-2"
              >
                <span className="material-icons-round text-lg">logout</span>
                Đăng xuất
              </button>
            </div>
          </div>

          {/* ===== TOP NAVBAR ===== */}
          <div className="bg-white shadow-lg flex-shrink-0">
            {/* Mobile top bar */}
            <div className="flex md:hidden items-center justify-between px-4 py-3">
              <button
                onClick={() => setSidebarOpen(true)}
                className="p-2 rounded-xl hover:bg-slate-100 text-slate-700"
              >
                <span className="material-icons-round">menu</span>
              </button>
              <h2 className="font-bold text-blue-600 text-base">{pageTitles[page] || "Quản lý Quán"}</h2>
              <button
                onClick={logout}
                className="p-2 rounded-xl hover:bg-red-50 text-red-500"
                title="Đăng xuất"
              >
                <span className="material-icons-round text-xl">logout</span>
              </button>
            </div>

            {/* Desktop navbar */}
            <div className="hidden md:flex items-center justify-between px-5 py-3">
              <h2 className="text-xl font-bold text-blue-600 whitespace-nowrap mr-4">
                Quản lý Quán
              </h2>
              <div className="flex gap-1 flex-wrap flex-1">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => setPageAndUrl(item.id)}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap ${page === item.id
                      ? "bg-blue-100 text-blue-700 font-semibold"
                      : "hover:bg-blue-50 text-slate-600"
                      }`}
                  >
                    {item.label}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-3 flex-shrink-0 ml-4">
                <p className="text-xs text-gray-500 hidden lg:block">
                  <span className="font-semibold">{user.name}</span>{" "}
                  <span className="text-gray-400">({user.role})</span>
                </p>
                <button
                  onClick={logout}
                  className="bg-red-500 text-white px-3 py-2 rounded-lg text-sm hover:bg-red-600 transition-colors whitespace-nowrap font-medium"
                >
                  Đăng xuất
                </button>
              </div>
            </div>
          </div>

          {/* ===== CONTENT ===== */}
          <div className="flex-1 overflow-auto p-3 md:p-6">{renderPage()}</div>
        </div>
      );
    }

    // ============ APP ROOT ============
    function AppRoot() {
      const { user } = useAuth();

      // Render trang Login nếu chưa đăng nhập, ngược lại render Dashboard tạm thời
      return user ? <MainApp /> : <LoginApp />;
    }

    // ============ RENDER ============
    ReactDOM.createRoot(document.getElementById("app-root")).render(
      <AuthProvider>
        <AppRoot />
      </AuthProvider>,
    );
  </script>

  <div id="app-root"></div>
</body>
