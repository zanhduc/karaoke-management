<script type="text/babel">
  (function () {
    const { useEffect, useMemo, useState, useRef } = React;

    // Component đếm thời gian đã sử dụng
    const ElapsedTimer = ({ startTime, small = false }) => {
      const [display, setDisplay] = useState("");

      useEffect(() => {
        const updateElapsed = () => {
          const now = new Date();
          const start = new Date(startTime);
          const diff = now - start;

          if (diff < 0) {
            setDisplay("0:00");
            return;
          }

          const hours = Math.floor(diff / 3600000);
          const minutes = Math.floor((diff % 3600000) / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);

          setDisplay(
            hours > 0
              ? `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`
              : `${minutes}:${String(seconds).padStart(2, "0")}`,
          );
        };

        updateElapsed();
        const interval = setInterval(updateElapsed, 1000);
        return () => clearInterval(interval);
      }, [startTime]);

      const sizeClass = small ? "text-2xl" : "text-6xl";

      return (
        <div className={`${sizeClass} font-mono font-bold`}>{display}</div>
      );
    };

    window.OrderManagementPage = function OrderManagementPage() {
      const [orders, setOrders] = useState([]);
      const [rooms, setRooms] = useState([]);
      const [products, setProducts] = useState([]);
      const [staffs, setStaffs] = useState([]);
      const [searchQuery, setSearchQuery] = useState("");

      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState("");
      const [success, setSuccess] = useState("");

      // Modal chi tiết order
      const [selectedOrder, setSelectedOrder] = useState(null);
      const [showDetailModal, setShowDetailModal] = useState(false);

      // Dữ liệu tạm trong modal
      const [tempProducts, setTempProducts] = useState([]);
      const [tempStaffs, setTempStaffs] = useState([]);
      const [tempBankPayment, setTempBankPayment] = useState(0);
      const [tempCashPayment, setTempCashPayment] = useState(0);
      const [tempNote, setTempNote] = useState("");

      // Tab chọn
      const [activeTab, setActiveTab] = useState("active"); // "active" hoặc "completed"

      // Notification popup
      const [notification, setNotification] = useState(null);

      // Room detail popup
      const [selectedRoom, setSelectedRoom] = useState(null);
      const [showRoomDetailModal, setShowRoomDetailModal] = useState(false);
      const [remainingTime, setRemainingTime] = useState(0);

      // Track nhân viên đã được giải phóng + thông báo 10 phút (dùng useRef tránh re-render)
      const releasedStaffsRef = useRef(new Set());
      const notifiedOrdersRef = useRef(new Set());

      // Auto-dismiss notification
      useEffect(() => {
        if (notification && notification.duration) {
          const timer = setTimeout(() => {
            setNotification(null);
          }, notification.duration);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      const loadAllData = async () => {
        setIsLoading(true);
        setError("");
        try {
          console.log("Starting loadAllData...");

          const orderPromise = new Promise((res, rej) => {
            console.log("Calling google.script.run.getOrders()...");
            google.script.run
              .withSuccessHandler((result) => {
                console.log("getOrders success handler called with:", result);
                res(result);
              })
              .withFailureHandler((error) => {
                console.error("getOrders failure handler called with:", error);
                rej(error);
              })
              .getOrders();
          });

          const roomPromise = new Promise((res, rej) =>
            google.script.run
              .withSuccessHandler(res)
              .withFailureHandler(rej)
              .getRooms(),
          );

          const productPromise = new Promise((res, rej) =>
            google.script.run
              .withSuccessHandler(res)
              .withFailureHandler(rej)
              .getProducts(),
          );

          const staffPromise = new Promise((res, rej) =>
            google.script.run
              .withSuccessHandler(res)
              .withFailureHandler(rej)
              .getStaffs(),
          );

          console.log("Waiting for all promises...");
          const [orderData, roomData, productData, staffData] =
            await Promise.all([
              orderPromise,
              roomPromise,
              productPromise,
              staffPromise,
            ]);

          // DEBUG: Log data
          console.log("Orders from API:", orderData);
          console.log("Rooms from API:", roomData);
          console.log("Products from API:", productData);
          console.log("Staffs from API:", staffData);

          setOrders(orderData || []);
          setRooms(roomData || []);
          setProducts(productData || []);
          setStaffs(staffData || []);
        } catch (e) {
          setError("Không tải được dữ liệu: " + (e.message || e));
          console.error("Load error:", e);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        loadAllData();
        // Reload dữ liệu mỗi 30s để cập nhật thông tin thanh toán
        const interval = setInterval(() => {
          loadAllData();
        }, 30000);
        return () => clearInterval(interval);
      }, []);

      // Lọc orders theo loại
      const activeOrders = useMemo(() => {
        return orders.filter((o) => {
          // Đang hoạt động = chưa thanh toán AND chưa hết giờ
          if (o.paymentStatus === "Đã thanh toán") return false;
          if (o.endTime) {
            const endTime = new Date(o.endTime);
            return endTime > new Date();
          }
          return true;
        });
      }, [orders]);

      const completedOrders = useMemo(() => {
        return orders.filter((o) => {
          // Đã chốt = đã thanh toán HOẶC đã hết giờ
          return (
            o.paymentStatus === "Đã thanh toán" ||
            (o.endTime && new Date(o.endTime) <= new Date())
          );
        });
      }, [orders]);

      // Lọc orders theo search query
      const filteredActiveOrders = useMemo(() => {
        if (!searchQuery.trim()) return activeOrders;
        const q = searchQuery.toLowerCase();
        return activeOrders.filter(
          (o) =>
            o.orderCode.toLowerCase().includes(q) ||
            o.customerName?.toLowerCase().includes(q) ||
            o.roomName?.toLowerCase().includes(q) ||
            String(o.roomId).includes(q),
        );
      }, [activeOrders, searchQuery]);

      const filteredCompletedOrders = useMemo(() => {
        if (!searchQuery.trim()) return completedOrders;
        const q = searchQuery.toLowerCase();
        return completedOrders.filter(
          (o) =>
            o.orderCode.toLowerCase().includes(q) ||
            o.customerName?.toLowerCase().includes(q) ||
            o.roomName?.toLowerCase().includes(q) ||
            String(o.roomId).includes(q),
        );
      }, [completedOrders, searchQuery]);

      // Reset tracked notifications khi active orders thay đổi (tránh thông báo cũ)
      useEffect(() => {
        notifiedOrdersRef.current.forEach((key) => {
          const orderCode = key.split("-")[0];
          if (!activeOrders.find((o) => o.orderCode === orderCode)) {
            notifiedOrdersRef.current.delete(key);
          }
        });
      }, [activeOrders]);

      // Listen for navigation event from room detail to open order edit
      useEffect(() => {
        const handleNavigate = (event) => {
          const detail = event.detail;
          if (
            typeof detail === "object" &&
            detail.page === "orderManagement" &&
            detail.orderCode
          ) {
            setTimeout(() => {
              const order = orders.find(
                (o) => o.orderCode === detail.orderCode,
              );
              if (order) {
                openOrderDetail(order);
                setActiveTab("active");
              }
            }, 100);
          }
        };

        window.addEventListener("navigateToPage", handleNavigate);
        return () =>
          window.removeEventListener("navigateToPage", handleNavigate);
      }, [orders]);

      const openOrderDetail = (order) => {
        setSelectedOrder(order);
        const products = order.products
          ? typeof order.products === "string"
            ? JSON.parse(order.products)
            : order.products
          : [];
        const staffs = order.staffs
          ? typeof order.staffs === "string"
            ? JSON.parse(order.staffs)
            : order.staffs
          : [];
        setTempProducts(products);
        setTempStaffs(staffs);
        setTempBankPayment(order.bankPayment || 0);
        setTempCashPayment(order.cashPayment || 0);
        setTempNote(order.note || "");
        setShowDetailModal(true);
      };

      const closeDetailModal = () => {
        setShowDetailModal(false);
        setSelectedOrder(null);
      };

      // Mở popup chi tiết phòng
      const openRoomDetailModal = (order) => {
        const roomData = {
          ...order,
          endTime:
            order.endTime || new Date(Date.now() + 2 * 3600000).toISOString(),
          products: order.products || JSON.stringify([]),
          staffs: order.staffs || JSON.stringify([]),
          customerName: order.customerName || "Vãng lai",
        };
        setSelectedRoom(roomData);
        setShowRoomDetailModal(true);
        setRemainingTime(0);
      };

      const closeRoomDetailModal = () => {
        setShowRoomDetailModal(false);
        setSelectedRoom(null);
      };

      // Thêm sản phẩm vào order hiện tại
      const addProductToCurrentOrder = (product) => {
        const existing = tempProducts.findIndex((p) => p.id === product.id);
        if (existing >= 0) {
          const updated = [...tempProducts];
          updated[existing].quantity = (updated[existing].quantity || 1) + 1;
          setTempProducts(updated);
        } else {
          setTempProducts([...tempProducts, { ...product, quantity: 1 }]);
        }
      };

      const removeProductFromOrder = (id) => {
        setTempProducts(tempProducts.filter((p) => p.id !== id));
      };

      const updateProductQty = (id, qty) => {
        if (qty < 1) return;
        setTempProducts(
          tempProducts.map((p) => (p.id === id ? { ...p, quantity: qty } : p)),
        );
      };

      // Thêm tiếp viên
      const addStaffToCurrentOrder = (staff) => {
        if (!tempStaffs.find((s) => s.id === staff.id)) {
          setTempStaffs([...tempStaffs, { ...staff }]);
        }
      };

      const removeStaffFromOrder = (id) => {
        setTempStaffs(tempStaffs.filter((s) => s.id !== id));
      };

      const updateStaffHours = (id, hours) => {
        if (hours < 1) return;
        setTempStaffs(
          tempStaffs.map((s) => (s.id === id ? { ...s, hours } : s)),
        );
      };

      // Lấy danh sách staff chưa được thêm vào
      const availableStaffs = useMemo(() => {
        const addedIds = new Set(tempStaffs.map((s) => s.id));
        return staffs.filter((s) => !addedIds.has(s.id));
      }, [staffs, tempStaffs]);

      // State theo dõi thời gian thực để tính ước tính tiền phòng
      const [elapsedTick, setElapsedTick] = useState(0);

      useEffect(() => {
        if (
          !showDetailModal ||
          selectedOrder?.paymentStatus === "Đã thanh toán"
        )
          return;

        const interval = setInterval(() => {
          setElapsedTick((t) => t + 1);
        }, 1000);
        return () => clearInterval(interval);
      }, [showDetailModal, selectedOrder?.paymentStatus]);

      // Tính ước tính duration và tiền phòng khi chưa thanh toán
      const estimatedCalc = useMemo(() => {
        if (!selectedOrder?.startTime)
          return { estimatedDuration: 0, estimatedRoomTotal: 0 };

        const startTime = new Date(selectedOrder.startTime);
        const now = new Date();
        const durationMs = now.getTime() - startTime.getTime();
        const durationHours = durationMs / (1000 * 60 * 60);
        const estimatedDuration = Math.ceil(durationHours);

        // Lấy room price từ rooms list
        const room = rooms.find(
          (r) => String(r.id) === String(selectedOrder.roomId),
        );
        const roomPrice = room ? Number(room.price_per_hour) || 0 : 0;
        const estimatedRoomTotal = estimatedDuration * roomPrice;

        return { estimatedDuration, estimatedRoomTotal };
      }, [selectedOrder?.startTime, rooms, elapsedTick]);

      // Tính tổng tiền realtime trong modal
      const calc = useMemo(() => {
        // Tính tiền hàng hoá + tiếp viên
        const productTotal = tempProducts.reduce(
          (sum, p) => sum + Number(p.price) * (p.quantity || 1),
          0,
        );
        const staffTotal = tempStaffs.reduce(
          (sum, s) => sum + (Number(s.price_per_hour) || 0),
          0,
        );

        // Nếu đã thanh toán, dùng giá trị thực từ order; nếu chưa, dùng ước tính
        const roomTotal =
          selectedOrder?.paymentStatus === "Đã thanh toán"
            ? selectedOrder?.roomTotal || 0
            : estimatedCalc.estimatedRoomTotal;

        const serviceTotal = productTotal + staffTotal;
        const subtotal = serviceTotal + roomTotal;
        const grandTotal = Math.max(
          0,
          subtotal -
            (selectedOrder?.discountCustomer || 0) +
            (selectedOrder?.adjustment || 0),
        );

        return {
          serviceTotal,
          roomTotal,
          grandTotal,
          prodTotal: productTotal,
          staffTotal,
        };
      }, [tempProducts, tempStaffs, selectedOrder, estimatedCalc]);

      // Lưu thay đổi vào order
      const saveOrderChanges = async () => {
        if (!selectedOrder) return;

        const updatedOrder = {
          ...selectedOrder,
          products: JSON.stringify(tempProducts),
          staffs: JSON.stringify(tempStaffs),
          bankPayment: tempBankPayment,
          cashPayment: tempCashPayment,
          note: tempNote,
          grandTotal: calc.grandTotal,
        };

        try {
          await google.script.run
            .withSuccessHandler(() => {})
            .withFailureHandler(() => {})
            .updateOrder(selectedOrder.orderCode, updatedOrder);

          setSuccess("Đã lưu thay đổi vào đơn hàng");
          setTimeout(() => setSuccess(""), 2500);

          // Reload danh sách
          loadAllData();
          closeDetailModal();
        } catch (e) {
          setError("Lưu thay đổi thất bại");
        }
      };

      // Thanh toán & hoàn tất đơn
      const completePayment = async () => {
        if (!selectedOrder) return;

        // Nếu đã thanh toán rồi thì không cho thanh toán nữa
        if (selectedOrder?.paymentStatus === "Đã thanh toán") {
          setError("Đơn hàng này đã được chốt thanh toán rồi!");
          return;
        }

        const totalPaid = tempBankPayment + tempCashPayment;
        if (totalPaid < calc.grandTotal) {
          setError(
            `Số tiền thanh toán chưa đủ! Còn thiếu ${(calc.grandTotal - totalPaid).toLocaleString()}đ`,
          );
          return;
        }

        try {
          await google.script.run
            .withSuccessHandler(() => {})
            .withFailureHandler(() => {})
            .markOrderAsPaid(selectedOrder.orderCode, {
              bankPayment: tempBankPayment,
              cashPayment: tempCashPayment,
              paymentStatus: "Đã thanh toán",
            });

          setSuccess(`Hoàn tất thanh toán đơn ${selectedOrder.orderCode}`);
          setTimeout(() => setSuccess(""), 3000);

          loadAllData();
          closeDetailModal();
        } catch (e) {
          setError("Thanh toán thất bại: " + (e.message || e));
        }
      };

      // ====================== IN HOÁ ĐƠN (MÁY IN NHIỆT - TỰ THÍCH ỨNG) ======================
      const printInvoice = (order, calcData) => {
        console.log('=== PRINT INVOICE START ===');
        console.log('Input order:', order);
        console.log('Input calcData:', calcData);
        if (!order) { console.error('PRINT: order is null/undefined!'); return; }

        const orderProducts = (() => {
          try {
            if (order.products) {
              const parsed = typeof order.products === "string" ? JSON.parse(order.products) : order.products;
              console.log('PRINT: products parsed from order:', parsed.length, 'items');
              return parsed;
            }
          } catch(e) { console.error('PRINT: JSON.parse products failed:', e); }
          console.log('PRINT: using tempProducts fallback:', tempProducts.length, 'items');
          return tempProducts;
        })();
        const orderStaffs = (() => {
          try {
            if (order.staffs) {
              const parsed = typeof order.staffs === "string" ? JSON.parse(order.staffs) : order.staffs;
              console.log('PRINT: staffs parsed from order:', parsed.length, 'items');
              return parsed;
            }
          } catch(e) { console.error('PRINT: JSON.parse staffs failed:', e); }
          console.log('PRINT: using tempStaffs fallback:', tempStaffs.length, 'items');
          return tempStaffs;
        })();

        const isPaid = order.paymentStatus === "Đã thanh toán";
        console.log('PRINT: isPaid =', isPaid, '| paymentStatus =', order.paymentStatus);

        const prodTotal = orderProducts.reduce(
          (sum, p) => sum + Number(p.price) * (p.quantity || 1),
          0,
        );
        const staffTotal = orderStaffs.reduce(
          (sum, s) => sum + (Number(s.price_per_hour) || 0),
          0,
        );

        let roomTotal = 0;
        let duration = 0;
        if (isPaid) {
          roomTotal = order.roomTotal || 0;
          duration = order.duration || 0;
        } else {
          const rm = rooms.find((r) => String(r.id) === String(order.roomId));
          const roomPrice = rm ? Number(rm.price_per_hour) || 0 : 0;
          const st = new Date(order.startTime);
          duration = Math.ceil((Date.now() - st.getTime()) / 3600000);
          roomTotal = duration * roomPrice;
        }

        const discount = Number(order.discountCustomer || 0);
        const adjustment = Number(order.adjustment || 0);
        const grandTotal =
          calcData?.grandTotal ??
          Math.max(
            0,
            prodTotal + staffTotal + roomTotal - discount + adjustment,
          );
        const bankPay = order.bankPayment || 0;
        const cashPay = order.cashPayment || 0;

        console.log('PRINT: === TOTALS ===');
        console.log('  prodTotal:', prodTotal);
        console.log('  staffTotal:', staffTotal);
        console.log('  roomTotal:', roomTotal, '| duration:', duration, 'h');
        console.log('  discount:', discount, '| adjustment:', adjustment);
        console.log('  grandTotal:', grandTotal);
        console.log('  bankPay:', bankPay, '| cashPay:', cashPay);

        const f = (n) => Number(n || 0).toLocaleString("vi-VN");
        const fd = (d) =>
          d
            ? new Date(d).toLocaleString("vi-VN", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              })
            : "";

        const rm = rooms.find((r) => String(r.id) === String(order.roomId));
        const rn = order.roomName || rm?.name || "Phong " + order.roomId;

        // Row helper: label bên trái, value bên phải (dùng table thay vì flex cho tương thích tối đa)
        const R = (l, v, bold) =>
          '<tr><td style="padding:1px 0">' +
          l +
          '</td><td style="padding:1px 0;text-align:right;' +
          (bold ? "font-weight:bold" : "") +
          '">' +
          v +
          "</td></tr>";
        const SEP =
          '<tr><td colspan="2" style="border-top:1px dashed #000;padding:0;height:4px"></td></tr>';
        const SEP2 =
          '<tr><td colspan="2" style="border-top:2px solid #000;padding:0;height:4px"></td></tr>';

        // Bảng hàng hoá
        let prodBlock = "";
        if (orderProducts.length > 0) {
          prodBlock =
            SEP +
            '<tr><td colspan="2" style="font-weight:bold;padding:2px 0">Hang hoa / Do uong</td></tr>' +
            '<tr><td colspan="2"><table width="100%" style="border-collapse:collapse;font-size:inherit">' +
            '<tr style="border-bottom:1px solid #000"><th style="text-align:left;padding:1px 0;font-size:inherit">Ten</th><th style="text-align:right;padding:1px 0;font-size:inherit;width:30px">SL</th><th style="text-align:right;padding:1px 0;font-size:inherit">Gia</th><th style="text-align:right;padding:1px 0;font-size:inherit">TT</th></tr>';
          orderProducts.forEach((p) => {
            const tt = Number(p.price) * (p.quantity || 1);
            prodBlock +=
              '<tr><td style="padding:1px 0">' +
              p.name +
              '</td><td style="text-align:right;padding:1px 0">' +
              (p.quantity || 1) +
              '</td><td style="text-align:right;padding:1px 0">' +
              f(p.price) +
              '</td><td style="text-align:right;padding:1px 0">' +
              f(tt) +
              "</td></tr>";
          });
          prodBlock +=
            "</table></td></tr>" +
            R("Tong hang hoa:", f(prodTotal) + "d", true);
        }

        // Bảng tiếp viên
        let staffBlock = "";
        if (orderStaffs.length > 0) {
          staffBlock =
            SEP +
            '<tr><td colspan="2" style="font-weight:bold;padding:2px 0">Tiep vien</td></tr>' +
            '<tr><td colspan="2"><table width="100%" style="border-collapse:collapse;font-size:inherit">' +
            '<tr style="border-bottom:1px solid #000"><th style="text-align:left;padding:1px 0;font-size:inherit">Ten</th><th style="text-align:right;padding:1px 0;font-size:inherit">Phi/h</th></tr>';
          orderStaffs.forEach((s) => {
            staffBlock +=
              '<tr><td style="padding:1px 0">' +
              s.name +
              '</td><td style="text-align:right;padding:1px 0">' +
              f(s.price_per_hour) +
              "/h</td></tr>";
          });
          staffBlock +=
            "</table></td></tr>" +
            R(
              "Tong TV (" + orderStaffs.length + "):",
              f(staffTotal) + "d",
              true,
            );
        }

        // Thanh toán
        let payBlock = "";
        if (isPaid) {
          payBlock =
            R("CK ngan hang:", f(bankPay) + "d", false) +
            R("Tien mat:", f(cashPay) + "d", false);
          if (bankPay + cashPay > grandTotal) {
            payBlock += R(
              "Tien thua:",
              f(bankPay + cashPay - grandTotal) + "d",
              true,
            );
          }
        }

        // Lấy khổ giấy đã lưu (mặc định 80mm)
        let savedPaper = "80";
        console.log('PRINT: products block length:', prodBlock.length);
        console.log('PRINT: staffs block length:', staffBlock.length);
        console.log('PRINT: payment block length:', payBlock.length);
        try {
          const sp = localStorage.getItem("kr_paper_size");
          if (sp) savedPaper = sp;
        } catch (e) {}

        const html =
          "<!DOCTYPE html>" +
          '<html><head><meta charset="utf-8"><title>HD ' +
          order.orderCode +
          "</title>" +
          '<style id="pageStyle">' +
          "@page{size:" +
          (savedPaper === "58" ? "58mm" : "80mm") +
          " auto;margin:0}" +
          "<" +
          "/style>" +
          "<style>" +
          "*{box-sizing:border-box;margin:0;padding:0}" +
          'body{font-family:"Courier New",Courier,"Lucida Console",monospace;font-size:12px;color:#000;line-height:1.35;background:#fff;width:100%;padding:2px 4px;-webkit-text-size-adjust:none}' +
          "@media print{.no-print{display:none!important}body{padding:0 1mm;width:100%!important;max-width:none!important}}" +
          "@media screen{body{max-width:280px;margin:0 auto}body.w58{max-width:200px;font-size:11px}}" +
          ".bill{width:100%;border-collapse:collapse}" +
          ".bill td{vertical-align:top;font-size:inherit}" +
          ".ctr{text-align:center}" +
          ".big{font-size:16px;font-weight:bold;padding:3px 0}" +
          "body.w58 .big{font-size:14px}" +
          ".no-print{text-align:center;padding:12px 0;margin-bottom:8px;border-bottom:1px solid #ccc}" +
          ".no-print button,.no-print select{padding:8px 16px;font-size:13px;font-weight:bold;cursor:pointer;border:2px solid #333;background:#fff;margin:3px;border-radius:4px;vertical-align:middle}" +
          ".no-print button.primary{background:#333;color:#fff}" +
          ".no-print .hint{font-size:10px;color:#888;margin-top:6px}" +
          "<" +
          "/style>" +
          "<" +
          "script>" +
          "function setPaper(v){" +
          'try{localStorage.setItem("kr_paper_size",v)}catch(e){}' +
          'document.body.className=v==="58"?"w58":"";' +

                <button
                  onClick={() => setNotification(null)}
                  className="text-white/70 hover:text-white text-xl mt-0.5 flex-shrink-0"
                >
                  ×
                </button>
              </div>
            </div>
          )}

          {/* Room Detail Popup */}
          {showRoomDetailModal && selectedRoom && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-auto">
                {/* Header */}
                <div className="sticky top-0 px-8 py-6 border-b bg-gradient-to-r from-indigo-50 to-blue-50 flex justify-between items-center">
                  <div>
                    <h2 className="text-3xl font-bold text-slate-800">
                      {selectedRoom.roomName || `Phòng ${selectedRoom.roomId}`}
                    </h2>
                    <p className="text-slate-600 mt-1">
                      Order: {selectedRoom.orderCode}
                    </p>
                  </div>
                  <button
                    onClick={closeRoomDetailModal}
                    className="text-3xl text-slate-400 hover:text-slate-600"
                  >
                    ×
                  </button>
                </div>

                {/* Content */}
                <div className="p-8 space-y-8">
                  {/* Thời gian đã sử dụng */}
                  {selectedRoom.startTime && (
                    <div className="text-center p-6 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl text-white">
                      <div className="text-sm opacity-90 mb-2">
                        Thời gian đã sử dụng
                      </div>
                      <ElapsedTimer
                        startTime={selectedRoom.startTime}
                        small={false}
                      />
                    </div>
                  )}

                  {/* Sản phẩm đã dùng */}
                  <div>
                    <h3 className="text-xl font-bold text-slate-800 mb-4">
                      📦 Sản phẩm đã dùng
                    </h3>
                    {selectedRoom.products ? (
                      (() => {
                        const prods =
                          typeof selectedRoom.products === "string"
                            ? JSON.parse(selectedRoom.products)
                            : selectedRoom.products;
                        return prods.length === 0 ? (
                          <div className="text-slate-400 text-center py-6">
                            Không có sản phẩm nào
                          </div>
                        ) : (
                          <div className="space-y-3">
                            {prods.map((p, idx) => (
                              <div
                                key={idx}
                                className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl hover:bg-slate-100"
                              >
                                <div>
                                  <div className="font-semibold text-slate-800">
                                    {p.name}
                                  </div>
                                  <div className="text-sm text-slate-500">
                                    Số lượng: {p.quantity}
                                  </div>
                                </div>
                                <div className="text-right">
                                  <div className="font-bold text-emerald-600">
                                    {(
                                      Number(p.price) * p.quantity
                                    ).toLocaleString()}
                                    đ
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      })()
                    ) : (
                      <div className="text-slate-400 text-center py-6">
                        Không có sản phẩm
                      </div>
                    )}
                  </div>

                  {/* Tiếp viên */}
                  <div>
                    <h3 className="text-xl font-bold text-slate-800 mb-4">
                      👥 Tiếp viên trong phòng
                    </h3>
                    {selectedRoom.staffs ? (
                      (() => {
                        const staffList =
                          typeof selectedRoom.staffs === "string"
                            ? JSON.parse(selectedRoom.staffs)
                            : selectedRoom.staffs;
                        return staffList.length === 0 ? (
                          <div className="text-slate-400 text-center py-6">
                            Không có tiếp viên nào
                          </div>
                        ) : (
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {staffList.map((s, idx) => (
                              <div
                                key={idx}
                                className="p-4 bg-blue-50 rounded-2xl border border-blue-200"
                              >
                                <div className="font-semibold text-slate-800">
                                  {s.name}
                                </div>
                                <div className="text-sm text-slate-600 mt-1">
                                  ⏱ {s.hours || 1} giờ
                                </div>
                                <div className="text-sm text-emerald-600 font-semibold mt-2">
                                  {(
                                    Number(s.price_per_hour || 0) *
                                    (s.hours || 1)
                                  ).toLocaleString()}
                                  đ
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      })()
                    ) : (
                      <div className="text-slate-400 text-center py-6">
                        Không có tiếp viên
                      </div>
                    )}
                  </div>

                  {/* Khách hàng & Ghi chú */}
                  <div className="bg-slate-50 p-6 rounded-2xl">
                    <div className="flex justify-between mb-3">
                      <div>
                        <div className="text-xs text-slate-500 uppercase">
                          Khách hàng
                        </div>
                        <div className="font-semibold text-slate-800">
                          {selectedRoom.customerName || "Vãng lai"}
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-xs text-slate-500 uppercase">
                          Thanh toán
                        </div>
                        <div className="font-bold text-emerald-600 text-lg">
                          {Number(
                            selectedRoom.grandTotal || 0,
                          ).toLocaleString()}
                          đ
                        </div>
                      </div>
                    </div>
                    {selectedRoom.note && (
                      <div className="mt-4 pt-4 border-t">
                        <div className="text-xs text-slate-500 uppercase mb-1">
                          Ghi chú
                        </div>
                        <div className="text-slate-700">
                          {selectedRoom.note}
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Close Button */}
                <div className="border-t p-6 bg-slate-50">
                  <button
                    onClick={closeRoomDetailModal}
                    className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl transition"
                  >
                    Đóng
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
  })();
</script>
