<script type="text/babel">
    (function () {
        const { useEffect, useMemo, useState, useRef } = React;

        window.OrderManagementPage = function OrderManagementPage() {
            const [orders, setOrders] = useState([]);
            const [rooms, setRooms] = useState([]);
            const [products, setProducts] = useState([]);
            const [staffs, setStaffs] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [currentPage, setCurrentPage] = useState(1);
            const PAGE_SIZE = 12;
            const ORDER_CACHE_KEY = "karaoke_order_management_cache_v1";
            const ORDER_CACHE_TTL_MS = 60 * 1000;

            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState("");
            const [success, setSuccess] = useState("");

            // Modal chi tiết order
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [showDetailModal, setShowDetailModal] = useState(false);

            // Dữ liệu tạm trong modal
            const [tempProducts, setTempProducts] = useState([]);
            const [tempStaffs, setTempStaffs] = useState([]);
            const [tempBankPayment, setTempBankPayment] = useState(0);
            const [tempCashPayment, setTempCashPayment] = useState(0);
            const [tempNote, setTempNote] = useState("");

            // Notification popup
            const [notification, setNotification] = useState(null);

            // Room detail popup
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [showRoomDetailModal, setShowRoomDetailModal] = useState(false);
            const [remainingTime, setRemainingTime] = useState(0);

            // Track nhân viên đã được giải phóng + thông báo 10 phút (dùng useRef tránh re-render)
            const releasedStaffsRef = useRef(new Set());
            const notifiedOrdersRef = useRef(new Set());

            const applyUnifiedData = (data, keepCatalogIfMissing = true) => {
                if (!data || typeof data !== "object") return;
                if (Array.isArray(data.orders)) setOrders(data.orders);
                if (Array.isArray(data.rooms)) setRooms(data.rooms);
                if (Array.isArray(data.products)) {
                    setProducts(data.products);
                } else if (!keepCatalogIfMissing) {
                    setProducts([]);
                }
                if (Array.isArray(data.staffs)) {
                    setStaffs(data.staffs);
                } else if (!keepCatalogIfMissing) {
                    setStaffs([]);
                }
            };

            const saveOrderCache = (payload) => {
                try {
                    localStorage.setItem(ORDER_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: payload }));
                } catch (e) {
                    console.warn("Save order cache failed", e);
                }
            };

            const readOrderCache = () => {
                try {
                    const raw = localStorage.getItem(ORDER_CACHE_KEY);
                    if (!raw) return null;
                    const parsed = JSON.parse(raw);
                    if (!parsed || !parsed.ts || !parsed.data) return null;
                    const isExpired = Date.now() - Number(parsed.ts) > ORDER_CACHE_TTL_MS;
                    return { data: parsed.data, isExpired };
                } catch (e) {
                    console.warn("Read order cache failed", e);
                    return null;
                }
            };

            // Auto-dismiss notification
            useEffect(() => {
                if (notification && notification.duration) {
                    const timer = setTimeout(() => {
                        setNotification(null);
                    }, notification.duration);
                    return () => clearTimeout(timer);
                }
            }, [notification]);

            const loadAllData = async () => {
                setIsLoading(true);
                setError("");
                const cached = readOrderCache();
                if (cached?.data) {
                    applyUnifiedData(cached.data, true);
                    setIsLoading(false);
                }
                try {
                    console.log("Starting loadAllData...");

                    const data = await new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .getUnifiedRoomData();
                    });
                    const normalized = {
                        orders: Array.isArray(data.orders) ? data.orders : [],
                        rooms: Array.isArray(data.rooms) ? data.rooms : [],
                        products: Array.isArray(data.products) ? data.products : [],
                        staffs: Array.isArray(data.staffs) ? data.staffs : [],
                    };
                    applyUnifiedData(normalized, false);
                    saveOrderCache(normalized);
                } catch (e) {
                    if (!cached?.data) {
                        setError("Không tải được dữ liệu: " + (e.message || e));
                    }
                    console.error("Load error:", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const loadBackground = async () => {
                try {
                    const data = await new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .getRoomAndOrderData();
                    });
                    const nextOrders = Array.isArray(data.orders) ? data.orders : [];
                    const nextRooms = Array.isArray(data.rooms) ? data.rooms : [];
                    setOrders(nextOrders);
                    setRooms(nextRooms);
                    saveOrderCache({
                        orders: nextOrders,
                        rooms: nextRooms,
                        products,
                        staffs,
                    });
                } catch (e) {
                    console.error("Background load error:", e);
                }
            };

            useEffect(() => {
                loadAllData();
                // Reload dữ liệu mỗi 30s để cập nhật thông tin thanh toán
                const interval = setInterval(() => {
                    loadBackground();
                }, 30000);
                return () => clearInterval(interval);
            }, []);

            // Chỉ giữ danh sách order đã chốt
            const completedOrders = useMemo(() => {
                return orders.filter(o => {
                    // Đã chốt = đã thanh toán HOẶC đã hết giờ
                    return o.paymentStatus === "Đã thanh toán" || (o.endTime && new Date(o.endTime) <= new Date());
                });
            }, [orders]);

            const filteredCompletedOrders = useMemo(() => {
                if (!searchQuery.trim()) return completedOrders;
                const q = searchQuery.toLowerCase();
                return completedOrders.filter(o =>
                    o.orderCode.toLowerCase().includes(q) ||
                    o.customerName?.toLowerCase().includes(q) ||
                    o.roomName?.toLowerCase().includes(q) ||
                    String(o.roomId).includes(q)
                );
            }, [completedOrders, searchQuery]);

            const sortedCompletedOrders = useMemo(() => {
                return [...filteredCompletedOrders].sort((a, b) => {
                    const getOrderTime = (o) => {
                        const t = o?.endTime || o?.updatedAt || o?.createdAt || o?.startTime;
                        const ms = t ? new Date(t).getTime() : 0;
                        return Number.isFinite(ms) ? ms : 0;
                    };
                    return getOrderTime(b) - getOrderTime(a);
                });
            }, [filteredCompletedOrders]);

            const totalPages = useMemo(
                () => Math.max(1, Math.ceil(sortedCompletedOrders.length / PAGE_SIZE)),
                [sortedCompletedOrders.length]
            );

            const paginatedCompletedOrders = useMemo(() => {
                const start = (currentPage - 1) * PAGE_SIZE;
                return sortedCompletedOrders.slice(start, start + PAGE_SIZE);
            }, [sortedCompletedOrders, currentPage]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchQuery, orders.length]);

            useEffect(() => {
                if (currentPage > totalPages) setCurrentPage(totalPages);
            }, [currentPage, totalPages]);

            // Listen for navigation event from room detail to open order edit
            useEffect(() => {
                const handleNavigate = (event) => {
                    const detail = event.detail;
                    if (typeof detail === 'object' && detail.page === 'orderManagement' && detail.orderCode) {
                        setTimeout(() => {
                            const order = orders.find(o => o.orderCode === detail.orderCode);
                            if (order) {
                                openOrderDetail(order);
                            }
                        }, 100);
                    }
                };

                window.addEventListener('navigateToPage', handleNavigate);
                return () => window.removeEventListener('navigateToPage', handleNavigate);
            }, [orders]);

            const openOrderDetail = (order) => {
                setSelectedOrder(order);
                const products = order.products ? (typeof order.products === "string" ? JSON.parse(order.products) : order.products) : [];
                const staffs = order.staffs ? (typeof order.staffs === "string" ? JSON.parse(order.staffs) : order.staffs) : [];
                setTempProducts(products);
                setTempStaffs(staffs);
                setTempBankPayment(order.bankPayment || 0);
                setTempCashPayment(order.cashPayment || 0);
                setTempNote(order.note || "");
                setShowDetailModal(true);
            };

            const closeDetailModal = () => {
                setShowDetailModal(false);
                setSelectedOrder(null);
            };

            // Mở popup chi tiết phòng
            const openRoomDetailModal = (order) => {
                const roomData = {
                    ...order,
                    endTime: order.endTime || new Date(Date.now() + 2 * 3600000).toISOString(),
                    products: order.products || JSON.stringify([]),
                    staffs: order.staffs || JSON.stringify([]),
                    customerName: order.customerName || "Vãng lai"
                };
                setSelectedRoom(roomData);
                setShowRoomDetailModal(true);
                setRemainingTime(0);
            };

            const closeRoomDetailModal = () => {
                setShowRoomDetailModal(false);
                setSelectedRoom(null);
            };

            // Xoá hẳn order
            const deleteOrder = async () => {
                if (!selectedOrder) return;
                if (!window.confirm(`Bạn có chắc muốn XOÁ HẲN order ${selectedOrder.orderCode}? Hành động này không thể hoàn tác!`)) return;

                try {
                    await new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .deleteOrder(selectedOrder.orderCode);
                    });
                    setSuccess(`Đã xoá order ${selectedOrder.orderCode}`);
                    setTimeout(() => setSuccess(""), 2500);
                    loadAllData();
                    closeDetailModal();
                } catch (e) {
                    setError("Xoá order thất bại: " + (e.message || e));
                }
            };

            // State theo dõi thời gian thực để tính ước tính tiền phòng
            const [elapsedTick, setElapsedTick] = useState(0);

            useEffect(() => {
                if (!showDetailModal || selectedOrder?.paymentStatus === "Đã thanh toán") return;

                const interval = setInterval(() => {
                    setElapsedTick(t => t + 1);
                }, 1000);
                return () => clearInterval(interval);
            }, [showDetailModal, selectedOrder?.paymentStatus]);

            // Tính ước tính duration và tiền phòng khi chưa thanh toán
            const estimatedCalc = useMemo(() => {
                if (!selectedOrder?.startTime) return { estimatedDuration: 0, estimatedRoomTotal: 0 };

                const startTime = new Date(selectedOrder.startTime);
                const now = new Date();
                const durationMs = now.getTime() - startTime.getTime();
                const durationMinutes = durationMs / (1000 * 60);
                const durationHours = durationMinutes / 60;
                const estimatedDuration = durationHours.toFixed(2);

                // Lấy room price từ rooms list
                const room = rooms.find(r => String(r.id) === String(selectedOrder.roomId));
                const roomPrice = room ? Number(room.price_per_hour) || 0 : 0;
                const rawRoomTotal = (roomPrice / 60) * durationMinutes;
                const estimatedRoomTotal = Math.round(rawRoomTotal / 1000) * 1000;

                return { estimatedDuration, estimatedRoomTotal };
            }, [selectedOrder?.startTime, rooms, elapsedTick]);

            // Tính tổng tiền realtime trong modal
            const calc = useMemo(() => {
                // Tính tiền hàng hoá + tiếp viên
                const productTotal = tempProducts.reduce((sum, p) => sum + (Number(p.price) * (p.quantity || 1)), 0);
                const staffTotal = tempStaffs.reduce((sum, s) => sum + (Number(s.price_per_hour) || 0), 0);

                // Nếu đã thanh toán, dùng giá trị thực từ order; nếu chưa, dùng ước tính
                const roomTotal = selectedOrder?.paymentStatus === "Đã thanh toán"
                    ? (selectedOrder?.roomTotal || 0)
                    : estimatedCalc.estimatedRoomTotal;

                const serviceTotal = productTotal + staffTotal;
                const subtotal = serviceTotal + roomTotal;
                const grandTotal = Math.max(0, subtotal - (selectedOrder?.discountCustomer || 0) + (selectedOrder?.adjustment || 0));

                return { serviceTotal, roomTotal, grandTotal, prodTotal: productTotal, staffTotal };
            }, [tempProducts, tempStaffs, selectedOrder, estimatedCalc]);



            return (
                <div className="max-w-6xl mx-auto p-4 bg-slate-100/80">
                    <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                        <div className="px-8 py-6 border-b bg-slate-50 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800">Quản lý Order</h1>
                                <p className="text-slate-500">Danh sách order đã chốt thanh toán</p>
                            </div>
                            <button onClick={loadAllData} className="px-5 py-2.5 bg-white border border-slate-300 rounded-2xl flex items-center gap-2 hover:bg-slate-100 text-slate-700">
                                <span className="text-xl">⟳</span> Tải lại
                            </button>
                        </div>

                        {/* Search */}
                        <div className="px-8 py-4 border-b bg-white">
                            <div className="w-full md:max-w-xs">
                                <input
                                    type="text"
                                    placeholder="🔍 Tìm theo Order, khách..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full rounded-2xl border border-slate-200 px-4 py-2.5 focus:outline-none focus:border-slate-400"
                                />
                            </div>
                        </div>

                        {error && <div className="mx-8 mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl">{error}</div>}
                        {success && <div className="mx-8 mt-6 p-4 bg-slate-50 border border-slate-200 text-slate-700 rounded-2xl">{success}</div>}

                        <div className="p-8">
                            {isLoading ? (
                                <div className="text-center py-20">Đang tải danh sách order...</div>
                            ) : filteredCompletedOrders.length === 0 ? (
                                <div className="text-center py-20 text-slate-400">{searchQuery ? "Không tìm thấy order nào" : "Chưa có order nào được chốt"}</div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="border border-slate-200 rounded-2xl overflow-hidden bg-white">
                                        <div className="overflow-x-auto">
                                            <table className="min-w-[980px] w-full">
                                                <thead className="bg-slate-50 border-b border-slate-200">
                                                    <tr className="text-left text-xs uppercase tracking-wide text-slate-500">
                                                        <th className="px-4 py-3 font-semibold">Mã đơn</th>
                                                        <th className="px-4 py-3 font-semibold">Phòng</th>
                                                        <th className="px-4 py-3 font-semibold">Khách</th>
                                                        <th className="px-4 py-3 font-semibold text-right">Tổng tiền</th>
                                                        <th className="px-4 py-3 font-semibold text-right">Đã thanh toán</th>
                                                        <th className="px-4 py-3 font-semibold">Kết thúc</th>
                                                        <th className="px-4 py-3 font-semibold text-center">Trạng thái</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {paginatedCompletedOrders.map(order => (
                                                        <tr
                                                            key={order.orderCode}
                                                            onClick={() => openOrderDetail(order)}
                                                            className="border-b border-slate-100 last:border-0 hover:bg-slate-50 cursor-pointer"
                                                        >
                                                            <td className="px-4 py-3 font-semibold text-slate-800">{order.orderCode}</td>
                                                            <td className="px-4 py-3 text-slate-700">{order.roomName || `Phòng ${order.roomId}`}</td>
                                                            <td className="px-4 py-3 text-slate-700">{order.customerName || "Vãng lai"}</td>
                                                            <td className="px-4 py-3 text-right font-bold text-slate-800">{Number(order.grandTotal || 0).toLocaleString()}đ</td>
                                                            <td className="px-4 py-3 text-right text-slate-700">{(Number(order.bankPayment || 0) + Number(order.cashPayment || 0)).toLocaleString()}đ</td>
                                                            <td className="px-4 py-3 text-slate-600">{order.endTime ? new Date(order.endTime).toLocaleString("vi-VN") : "—"}</td>
                                                            <td className="px-4 py-3 text-center">
                                                                <span className="text-xs text-emerald-700 font-semibold bg-emerald-50 border border-emerald-200 rounded-full px-2 py-0.5">
                                                                    Đã chốt
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-between">
                                        <div className="text-sm text-slate-500">
                                            Trang {currentPage}/{totalPages} • Tổng {sortedCompletedOrders.length} order
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                                disabled={currentPage === 1}
                                                className="px-3 py-2 rounded-xl border border-slate-300 bg-white text-slate-700 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                            >
                                                Trước
                                            </button>
                                            <button
                                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                                disabled={currentPage === totalPages}
                                                className="px-3 py-2 rounded-xl border border-slate-300 bg-white text-slate-700 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                            >
                                                Sau
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ====================== MODAL CHI TIẾT ORDER ====================== */}
                    {showDetailModal && selectedOrder && (
                        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
                                {/* Header modal */}
                                <div className="px-8 py-5 border-b flex items-center justify-between bg-slate-50">
                                    <div>
                                        <h2 className="text-2xl font-bold">Chi tiết Order: {selectedOrder.orderCode}</h2>
                                        <p className="text-slate-500">{selectedOrder.roomName || `Phòng ${selectedOrder.roomId}`}</p>
                                    </div>
                                    <button onClick={closeDetailModal} className="text-3xl leading-none text-slate-400 hover:text-slate-600">×</button>
                                </div>

                                <div className="flex-1 p-8 overflow-auto">
                                    {/* Nội dung modal chi tiết order - chỉ xem */}
                                    <div className="grid grid-cols-2 gap-8">
                                        {/* Cột trái: Hàng hoá */}
                                        <div>
                                            <h3 className="font-semibold mb-3">Hàng hoá</h3>
                                            <div className="space-y-2 mb-6">
                                                {tempProducts.length === 0 ? (
                                                    <div className="text-slate-400 text-sm">Không có hàng hoá</div>
                                                ) : tempProducts.map(item => (
                                                    <div key={item.id} className="flex justify-between items-center bg-slate-50 p-3 rounded-2xl">
                                                        <div>
                                                            <span className="font-medium">{item.name}</span>
                                                            <span className="ml-3 text-emerald-600">× {item.quantity}</span>
                                                        </div>
                                                        <div className="text-slate-600 font-semibold">
                                                            {(Number(item.price) * (item.quantity || 1)).toLocaleString()}đ
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Cột phải: Tiếp viên */}
                                        <div>
                                            <h3 className="font-semibold mb-3">Tiếp viên</h3>
                                            {tempStaffs.length === 0 ? (
                                                <div className="text-slate-400 text-sm mb-6">Chưa có tiếp viên nào</div>
                                            ) : (
                                                <div className="space-y-3 mb-6">
                                                    {tempStaffs.map(s => (
                                                        <div key={s.id} className="bg-slate-100 px-4 py-3 rounded-2xl flex items-center justify-between">
                                                            <div className="flex-1">
                                                                <div className="font-medium">{s.name}</div>
                                                                <div className="text-xs text-slate-500 mt-1">Giá/h: {Number(s.price_per_hour || 0).toLocaleString()}đ</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Tổng kết */}
                                    <div className="mt-10 bg-slate-50 p-6 rounded-3xl">
                                        <div className="flex justify-between text-lg">
                                            <span>Tổng hàng hoá:</span>
                                            <span className="font-semibold">{calc.prodTotal.toLocaleString()} đ</span>
                                        </div>
                                        <div className="flex justify-between text-lg mt-2">
                                            <span>Tổng tiếp viên ({tempStaffs.length} người):</span>
                                            <span className="font-semibold">{calc.staffTotal.toLocaleString()} đ</span>
                                        </div>
                                        {selectedOrder?.paymentStatus === "Chưa thanh toán" && (
                                            <div className="flex justify-between text-lg mt-2 text-amber-700 bg-amber-50 px-3 py-2 rounded-lg">
                                                <span>Tiền phòng ({estimatedCalc.estimatedDuration}h - ước tính):</span>
                                                <span className="font-semibold">{calc.roomTotal.toLocaleString()} đ</span>
                                            </div>
                                        )}
                                        {selectedOrder?.paymentStatus === "Đã thanh toán" && (
                                            <>
                                                <div className="flex justify-between text-lg mt-2">
                                                    <span>Tiền phòng ({selectedOrder?.duration}h):</span>
                                                    <span className="font-semibold">{(selectedOrder?.roomTotal || 0).toLocaleString()} đ</span>
                                                </div>
                                                <div className="flex justify-between text-lg mt-2">
                                                    <span>Bắt đầu:</span>
                                                    <span className="font-semibold">{selectedOrder?.startTime ? new Date(selectedOrder.startTime).toLocaleString('vi-VN') : ''}</span>
                                                </div>
                                                <div className="flex justify-between text-lg mt-2">
                                                    <span>Kết thúc:</span>
                                                    <span className="font-semibold">{selectedOrder?.endTime ? new Date(selectedOrder.endTime).toLocaleString('vi-VN') : ''}</span>
                                                </div>
                                            </>
                                        )}
                                        <div className="flex justify-between text-3xl font-bold mt-6 border-t pt-6">
                                            <span>Tổng thanh toán:</span>
                                            <span className="text-emerald-600">{calc.grandTotal.toLocaleString()} đ</span>
                                        </div>

                                        {/* Thông tin thanh toán - chỉ xem */}
                                        <div className="mt-6 grid grid-cols-2 gap-6">
                                            <div className="bg-white border border-slate-200 rounded-2xl px-4 py-3">
                                                <div className="text-xs text-slate-500 mb-1">Thanh toán ngân hàng</div>
                                                <div className="font-semibold text-slate-800">{Number(selectedOrder?.bankPayment || 0).toLocaleString()} đ</div>
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-2xl px-4 py-3">
                                                <div className="text-xs text-slate-500 mb-1">Thanh toán tiền mặt</div>
                                                <div className="font-semibold text-slate-800">{Number(selectedOrder?.cashPayment || 0).toLocaleString()} đ</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Footer modal */}
                                <div className="border-t p-6 flex gap-4 bg-slate-50">
                                    <button
                                        onClick={closeDetailModal}
                                        className="flex-1 py-4 border border-slate-300 font-medium rounded-2xl hover:bg-slate-100"
                                    >
                                        Đóng
                                    </button>
                                    <button
                                        onClick={deleteOrder}
                                        className="flex-1 py-4 bg-rose-600 hover:bg-rose-700 text-white font-semibold rounded-2xl transition-colors"
                                    >
                                        🗑 Xoá Order
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notification Popup */}
                    {notification && (
                        <div className="fixed top-6 right-6 z-50 animate-in slide-in-from-right-4 duration-300">
                            <div className={`rounded-3xl shadow-2xl p-6 max-w-md text-white flex items-start gap-4 ${notification.type === "warning" ? "bg-amber-500" : "bg-emerald-500"
                                }`}>
                                <div className="text-2xl mt-1">
                                    {notification.type === "warning" ? "⏰" : "✓"}
                                </div>
                                <div className="flex-1">
                                    <div className="font-bold text-lg">{notification.title}</div>
                                    <div className="text-sm opacity-95">{notification.message}</div>
                                </div>
                                <button
                                    onClick={() => setNotification(null)}
                                    className="text-white/70 hover:text-white text-xl mt-0.5 flex-shrink-0"
                                >
                                    ×
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Room Detail Popup */}
                    {showRoomDetailModal && selectedRoom && (
                        <div className="fixed inset-0 bg-slate-900/45 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-xl w-full max-w-2xl max-h-[90vh] overflow-auto">
                                {/* Header */}
                                <div className="sticky top-0 px-8 py-6 border-b bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-3xl font-bold text-slate-800">
                                            {selectedRoom.roomName || `Phòng ${selectedRoom.roomId}`}
                                        </h2>
                                        <p className="text-slate-600 mt-1">Order: {selectedRoom.orderCode}</p>
                                    </div>
                                    <button
                                        onClick={closeRoomDetailModal}
                                        className="text-3xl text-slate-400 hover:text-slate-600"
                                    >
                                        ×
                                    </button>
                                </div>

                                {/* Content */}
                                <div className="p-8 space-y-8">
                                    {/* Thời gian đã sử dụng */}
                                    {selectedRoom.startTime && (
                                        <div className="text-center p-6 bg-slate-800 rounded-3xl text-white">
                                            <div className="text-sm opacity-90 mb-2">Thời gian đã sử dụng</div>
                                            <ElapsedTimer startTime={selectedRoom.startTime} small={false} />
                                        </div>
                                    )}

                                    {/* Sản phẩm đã dùng */}
                                    <div>
                                        <h3 className="text-xl font-bold text-slate-800 mb-4">📦 Sản phẩm đã dùng</h3>
                                        {selectedRoom.products ? (
                                            (() => {
                                                const prods = typeof selectedRoom.products === "string" ? JSON.parse(selectedRoom.products) : selectedRoom.products;
                                                return prods.length === 0 ? (
                                                    <div className="text-slate-400 text-center py-6">Không có sản phẩm nào</div>
                                                ) : (
                                                    <div className="space-y-3">
                                                        {prods.map((p, idx) => (
                                                            <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl hover:bg-slate-100">
                                                                <div>
                                                                    <div className="font-semibold text-slate-800">{p.name}</div>
                                                                    <div className="text-sm text-slate-500">Số lượng: {p.quantity}</div>
                                                                </div>
                                                                <div className="text-right">
                                                                    <div className="font-bold text-emerald-600">
                                                                        {(Number(p.price) * p.quantity).toLocaleString()}đ
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                            })()
                                        ) : (
                                            <div className="text-slate-400 text-center py-6">Không có sản phẩm</div>
                                        )}
                                    </div>

                                    {/* Tiếp viên */}
                                    <div>
                                        <h3 className="text-xl font-bold text-slate-800 mb-4">👥 Tiếp viên trong phòng</h3>
                                        {selectedRoom.staffs ? (
                                            (() => {
                                                const staffList = typeof selectedRoom.staffs === "string" ? JSON.parse(selectedRoom.staffs) : selectedRoom.staffs;
                                                return staffList.length === 0 ? (
                                                    <div className="text-slate-400 text-center py-6">Không có tiếp viên nào</div>
                                                ) : (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                        {staffList.map((s, idx) => (
                                                            <div key={idx} className="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                                                <div className="font-semibold text-slate-800">{s.name}</div>
                                                                <div className="text-sm text-slate-600 mt-1">
                                                                    ⏱ {s.hours || 1} giờ
                                                                </div>
                                                                <div className="text-sm text-emerald-600 font-semibold mt-2">
                                                                    {(Number(s.price_per_hour || 0) * (s.hours || 1)).toLocaleString()}đ
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                            })()
                                        ) : (
                                            <div className="text-slate-400 text-center py-6">Không có tiếp viên</div>
                                        )}
                                    </div>

                                    {/* Khách hàng & Ghi chú */}
                                    <div className="bg-slate-50 p-6 rounded-2xl">
                                        <div className="flex justify-between mb-3">
                                            <div>
                                                <div className="text-xs text-slate-500 uppercase">Khách hàng</div>
                                                <div className="font-semibold text-slate-800">{selectedRoom.customerName || "Vãng lai"}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-xs text-slate-500 uppercase">Thanh toán</div>
                                                <div className="font-bold text-emerald-600 text-lg">
                                                    {Number(selectedRoom.grandTotal || 0).toLocaleString()}đ
                                                </div>
                                            </div>
                                        </div>
                                        {selectedRoom.note && (
                                            <div className="mt-4 pt-4 border-t">
                                                <div className="text-xs text-slate-500 uppercase mb-1">Ghi chú</div>
                                                <div className="text-slate-700">{selectedRoom.note}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Close Button */}
                                <div className="border-t p-6 bg-slate-50">
                                    <button
                                        onClick={closeRoomDetailModal}
                                        className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl transition"
                                    >
                                        Đóng
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
    })();
</script>
