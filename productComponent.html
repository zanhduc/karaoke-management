<script type="text/babel">
  (function () {
    const { useEffect, useMemo, useState } = React;

    const ProductServer = {
      isLocal: !window.google || !google.script || !google.script.run,
      getProducts() {
        if (this.isLocal) {
          return Promise.resolve([
            { id: 1, name: "Bia Tiger", unit: "Lon", price: 20000 },
          ]);
        }
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .getProducts();
        });
      },
      addProduct(p) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .addProduct(p);
        });
      },
      updateProduct(p) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .updateProduct(p);
        });
      },
      deleteProduct(id) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .deleteProduct(id);
        });
      },
    };

    window.ProductPage = function ProductPage() {
      const [products, setProducts] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState("");
      const PRODUCT_CACHE_KEY = "karaoke_product_cache_v1";
      const PRODUCT_CACHE_TTL_MS = 60 * 1000;

      // Modal
      const [showModal, setShowModal] = useState(false);
      const [isEditing, setIsEditing] = useState(false);
      const [currentProduct, setCurrentProduct] = useState(null);

      // Form
      const [name, setName] = useState("");
      const [unit, setUnit] = useState("");
      const [price, setPrice] = useState("");

      // Filter
      const [searchTerm, setSearchTerm] = useState("");
      const [priceFilter, setPriceFilter] = useState("all");

      // Delete
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [deletingId, setDeletingId] = useState(null);

      const canSubmit = useMemo(() => {
        return name.trim() !== "" &&
          price !== "" &&
          !isNaN(Number(price)) &&
          Number(price) >= 0;
      }, [name, price]);

      const saveProductCache = (nextProducts) => {
        try {
          localStorage.setItem(PRODUCT_CACHE_KEY, JSON.stringify({
            ts: Date.now(),
            data: Array.isArray(nextProducts) ? nextProducts : [],
          }));
        } catch (e) {
          console.warn("Save product cache failed", e);
        }
      };

      const readProductCache = () => {
        try {
          const raw = localStorage.getItem(PRODUCT_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.ts || !Array.isArray(parsed.data)) return null;
          const isExpired = Date.now() - Number(parsed.ts) > PRODUCT_CACHE_TTL_MS;
          return { data: parsed.data, isExpired };
        } catch (e) {
          console.warn("Read product cache failed", e);
          return null;
        }
      };

      const load = async () => {
        const cached = readProductCache();
        if (cached?.data && cached.data.length > 0) {
          setProducts(cached.data);
          setIsLoading(false);
        } else {
          setIsLoading(true);
        }
        setError("");
        
        try {
          const data = await ProductServer.getProducts();
          const normalized = Array.isArray(data) ? data : [];
          if (!cached?.data || JSON.stringify(cached.data) !== JSON.stringify(normalized)) {
            setProducts(normalized);
            saveProductCache(normalized);
          }
        } catch (e) {
          if (!cached?.data || cached.data.length === 0) {
            setError(e?.message || "Không tải được danh sách hàng hoá.");
          }
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        load();
      }, []);

      const resetForm = () => {
        setName(""); setUnit(""); setPrice(""); setCurrentProduct(null);
      };

      const openAddModal = () => {
        resetForm();
        setIsEditing(false);
        setShowModal(true);
      };

      const openEditModal = (product) => {
        setCurrentProduct(product);
        setName(product.name || "");
        setUnit(product.unit || "");
        setPrice(String(product.price || ""));
        setIsEditing(true);
        setShowModal(true);
      };

      const closeModal = () => {
        setShowModal(false);
        setTimeout(resetForm, 300);
      };

      const handleSave = async () => {
        if (!canSubmit) return;

        const productData = {
          name: name.trim(),
          unit: unit.trim() || "Cái",
          price: Number(price),
        };

        if (isEditing && currentProduct) {
          const prev = products;
          const updated = { ...currentProduct, ...productData };
          const nextProducts = products.map(p => String(p.id) === String(currentProduct.id) ? updated : p);
          
          setProducts(nextProducts);
          saveProductCache(nextProducts);
          closeModal();

          try {
            await ProductServer.updateProduct({ id: currentProduct.id, ...productData });
          }
          catch (e) { 
            setProducts(prev); 
            saveProductCache(prev);
            setError("Cập nhật thất bại. Đã khôi phục dữ liệu ban đầu."); 
          }
        } else {
          const newProduct = { id: Date.now(), ...productData };
          const prev = products;
          const nextProducts = [...products, newProduct];
          
          setProducts(nextProducts);
          saveProductCache(nextProducts);
          closeModal();

          try {
            await ProductServer.addProduct(newProduct);
          }
          catch (e) { 
            setProducts(prev); 
            saveProductCache(prev);
            setError("Thêm thất bại. Đã khôi phục dữ liệu ban đầu."); 
          }
        }
      };

      const confirmDelete = (id) => {
        setDeletingId(id);
        setShowDeleteConfirm(true);
      };

      const executeDelete = async () => {
        if (!deletingId) return;
        const prev = products;
        const nextProducts = products.filter(p => String(p.id) !== String(deletingId));
        
        setProducts(nextProducts);
        saveProductCache(nextProducts);
        setShowDeleteConfirm(false);
        setDeletingId(null);

        try {
          await ProductServer.deleteProduct(deletingId);
        }
        catch (e) { 
          setProducts(prev);
          saveProductCache(prev); 
          setError("Xoá thất bại. Đã khôi phục dữ liệu ban đầu."); 
        }
      };

      const cancelDelete = () => {
        setShowDeleteConfirm(false);
        setDeletingId(null);
      };

      // Filtered Products
      const filteredProducts = useMemo(() => {
        let result = [...products];

        if (searchTerm.trim()) {
          const term = searchTerm.toLowerCase().trim();
          result = result.filter(p => p.name.toLowerCase().includes(term));
        }

        if (priceFilter !== "all") {
          result = result.filter(p => {
            const pPrice = Number(p.price);
            switch (priceFilter) {
              case "under20k": return pPrice < 20000;
              case "20-50k": return pPrice >= 20000 && pPrice <= 50000;
              case "50-100k": return pPrice > 50000 && pPrice <= 100000;
              case "above100k": return pPrice > 100000;
              default: return true;
            }
          });
        }
        return result;
      }, [products, searchTerm, priceFilter]);

      const Icon = window.Icon;

      return (
        <div className="max-w-4xl mx-auto p-2 md:p-4">
          <div className="bg-white rounded-2xl md:rounded-3xl shadow-xl overflow-hidden">

            {/* Header */}
            <div className="px-4 md:px-6 py-4 md:py-6 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-slate-50">
              <div>
                <h1 className="text-xl md:text-2xl font-bold text-slate-800">Quản lý hàng hoá</h1>
                <p className="text-sm text-slate-500">Thêm, sửa, xoá sản phẩm</p>
              </div>
              <button
                onClick={openAddModal}
                className="px-5 md:px-6 py-2.5 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl flex items-center gap-2 text-sm"
              >
                + Thêm sản phẩm
              </button>
            </div>

            {/* Filter */}
            <div className="p-4 md:p-6 border-b flex flex-col md:flex-row gap-3 md:gap-4 bg-white">
              <div className="flex-1">
                <label className="block text-xs font-medium text-slate-500 mb-1">Tìm kiếm theo tên</label>
                <input
                  type="text"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  placeholder="Nhập tên sản phẩm..."
                  className="w-full rounded-2xl border border-slate-200 px-3 md:px-4 py-2.5 md:py-3 focus:outline-none focus:border-indigo-500 text-sm"
                />
              </div>

              <div className="md:w-72">
                <label className="block text-xs font-medium text-slate-500 mb-1">Lọc theo giá</label>
                <select
                  value={priceFilter}
                  onChange={(e) => setPriceFilter(e.target.value)}
                  className="w-full rounded-2xl border border-slate-200 px-3 md:px-4 py-2.5 md:py-3 focus:outline-none focus:border-indigo-500 bg-white text-sm"
                >
                  <option value="all">Tất cả giá</option>
                  <option value="under20k">Dưới 20.000đ</option>
                  <option value="20-50k">20.000đ - 50.000đ</option>
                  <option value="50-100k">50.000đ - 100.000đ</option>
                  <option value="above100k">Trên 100.000đ</option>
                </select>
              </div>

              <div className="flex items-end">
                <button onClick={load} className="px-4 md:px-5 py-2.5 md:py-3 border border-slate-200 hover:bg-slate-50 rounded-2xl text-slate-600 flex items-center gap-2 text-sm">
                  <Icon name="refresh" /> Tải lại
                </button>
              </div>
            </div>

            {error && <div className="mx-6 mt-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-2xl">{error}</div>}

            {/* Danh sách - Phiên bản đẹp và cân bằng hơn */}
            <div className="p-4 md:p-6">
              <div className="mb-4 flex justify-between items-center">
                <p className="text-slate-600">
                  Hiển thị <span className="font-semibold text-slate-800">{filteredProducts.length}</span> sản phẩm
                </p>
              </div>

              {isLoading ? (
                <div className="text-center py-16 text-slate-500">Đang tải danh sách...</div>
              ) : filteredProducts.length === 0 ? (
                <div className="text-center py-20 text-slate-400">
                  Không tìm thấy sản phẩm nào phù hợp với điều kiện tìm kiếm.
                </div>
              ) : (
                <div className="space-y-4">
                  {filteredProducts.map((p) => (
                    <div
                      key={String(p.id)}
                      className="bg-white border border-slate-200 hover:border-indigo-300 rounded-2xl md:rounded-3xl p-4 md:p-6 transition-all group flex flex-col gap-3"
                    >
                      {/* Thông tin chính */}
                      <div className="flex-1">
                        <div className="text-lg md:text-xl font-semibold text-slate-800 mb-2 md:mb-3">{p.name}</div>

                        <div className="flex flex-wrap items-center gap-3 md:gap-5 text-sm">
                          {p.unit && (
                            <div className="flex items-center gap-2">
                              <span className="text-slate-400">Đơn vị:</span>
                              <span className="px-4 py-1.5 bg-slate-100 text-slate-700 rounded-2xl font-medium">
                                {p.unit}
                              </span>
                            </div>
                          )}
                          <div className="flex items-center gap-2">
                            <span className="text-slate-400">Giá:</span>
                            <span className="text-xl md:text-2xl font-semibold text-emerald-600">
                              {Number(p.price).toLocaleString('vi-VN')} đ
                            </span>
                          </div>
                        </div>
                      </div>

                      {/* Nút hành động - Cân bằng hơn */}
                      <div className="flex gap-2 md:gap-3">
                        <button
                          onClick={() => openEditModal(p)}
                          className="px-4 md:px-7 py-2.5 md:py-3 text-xs md:text-sm font-medium border border-slate-300 hover:border-indigo-400 hover:text-indigo-600 rounded-xl md:rounded-2xl transition-all active:scale-95"
                        >
                          Sửa
                        </button>
                        <button
                          onClick={() => confirmDelete(p.id)}
                          className="px-4 md:px-7 py-2.5 md:py-3 text-xs md:text-sm font-medium bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl md:rounded-2xl transition-all active:scale-95"
                        >
                          Xoá
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Popup Thêm / Sửa */}
          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                <div className="px-6 pt-6 pb-4">
                  <h2 className="text-2xl font-semibold text-slate-800">
                    {isEditing ? "Chỉnh sửa sản phẩm" : "Thêm sản phẩm mới"}
                  </h2>
                </div>

                <div className="px-6 space-y-5 pb-8">
                  <div>
                    <label className="block text-sm font-medium text-slate-600 mb-1.5">Tên hàng hoá <span className="text-red-500">*</span></label>
                    <input
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                      placeholder="Ví dụ: Bia Tiger"
                      className="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-600 mb-1.5">Đơn vị tính</label>
                    <input
                      value={unit}
                      onChange={(e) => setUnit(e.target.value)}
                      placeholder="Ví dụ: Lon, Chai, Gói, Hộp"
                      className="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-600 mb-1.5">Giá bán (VND) <span className="text-red-500">*</span></label>
                    <input
                      type="number"
                      value={price}
                      onChange={(e) => setPrice(e.target.value)}
                      placeholder="Ví dụ: 20000"
                      className="w-full rounded-2xl border border-slate-200 px-4 py-3 focus:outline-none focus:border-indigo-500"
                    />
                  </div>
                </div>

                <div className="border-t px-6 py-5 flex gap-3 bg-slate-50">
                  <button onClick={closeModal} className="flex-1 py-3.5 font-medium border border-slate-200 rounded-2xl hover:bg-white">Huỷ</button>
                  <button
                    onClick={handleSave}
                    disabled={!canSubmit}
                    className="flex-1 py-3.5 font-semibold bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white rounded-2xl"
                  >
                    {isEditing ? "Lưu thay đổi" : "Thêm sản phẩm"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Popup Xác nhận Xoá */}
          {showDeleteConfirm && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
              <div className="bg-white rounded-3xl shadow-2xl max-w-sm w-full mx-4">
                <div className="p-6 text-center">
                  <div className="mx-auto w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-4">
                    <Icon name="trash" className="text-3xl" />
                  </div>
                  <h3 className="text-xl font-semibold">Xác nhận xoá sản phẩm?</h3>
                  <p className="text-slate-500 mt-2">Hành động này không thể hoàn tác.</p>
                </div>
                <div className="border-t px-6 py-4 flex gap-3">
                  <button onClick={cancelDelete} className="flex-1 py-3 font-medium border border-slate-200 rounded-2xl hover:bg-slate-50">Huỷ</button>
                  <button onClick={executeDelete} className="flex-1 py-3 font-semibold bg-rose-600 hover:bg-rose-700 text-white rounded-2xl">Đồng ý xoá</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
  })();
</script>
