<script type="text/babel">
  (function () {
    const { useEffect, useMemo, useState } = React;

    const StaffServer = {
      isLocal: !window.google || !google.script || !google.script.run,
      getStaffs() {
        if (this.isLocal) {
          return Promise.resolve([
            {
              id: 1,
              name: "Lan",
              phone: "0901",
              status: "available",
              current_room_id: "",
              price_per_hour: 120000,
            },
          ]);
        }
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .getStaffs();
        });
      },
      addStaff(s) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .addStaff(s);
        });
      },
      updateStaff(s) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .updateStaff(s);
        });
      },
      deleteStaff(id) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .deleteStaff(id);
        });
      },
      assignStaffToRoom(staffId, roomId) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .assignStaffToRoom(staffId, roomId);
        });
      },
      releaseStaff(staffId) {
        if (this.isLocal) return Promise.resolve(true);
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .releaseStaff(staffId);
        });
      },
    };

    function StatusPill({ status }) {
      const isAvail = status === "available";
      return (
        <span
          className={`inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-semibold ${isAvail
            ? "bg-emerald-50 text-emerald-700 border border-emerald-200"
            : "bg-rose-50 text-rose-700 border border-rose-200"
            }`}
        >
          <span className="text-[10px]">{isAvail ? "🟢" : "🔴"}</span>
          {isAvail ? "Sẵn sàng" : "Đang bận"}
        </span>
      );
    }

    window.StaffPage = function StaffPage() {
      const [staffs, setStaffs] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState("");
      const STAFF_CACHE_KEY = "karaoke_staff_cache_v1";
      const STAFF_CACHE_TTL_MS = 60 * 1000;

      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [pricePerHour, setPricePerHour] = useState("");
      const [editingId, setEditingId] = useState(null);

      const canSubmit = useMemo(() => {
        if (!name.trim()) return false;
        if (pricePerHour !== "" && Number.isNaN(Number(pricePerHour)))
          return false;
        return true;
      }, [name, pricePerHour]);

      const saveStaffCache = (nextStaffs) => {
        try {
          localStorage.setItem(STAFF_CACHE_KEY, JSON.stringify({
            ts: Date.now(),
            data: Array.isArray(nextStaffs) ? nextStaffs : [],
          }));
        } catch (e) {
          console.warn("Save staff cache failed", e);
        }
      };

      const readStaffCache = () => {
        try {
          const raw = localStorage.getItem(STAFF_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.ts || !Array.isArray(parsed.data)) return null;
          const isExpired = Date.now() - Number(parsed.ts) > STAFF_CACHE_TTL_MS;
          return { data: parsed.data, isExpired };
        } catch (e) {
          console.warn("Read staff cache failed", e);
          return null;
        }
      };

      const load = async () => {
        setError("");
        const cached = readStaffCache();
        if (cached?.data) {
          // \u2705 Hi\u1ec7n ngay t\u1eeb cache, kh\u00f4ng ch\u01edd server
          setStaffs(cached.data);
          setIsLoading(false);
        } else {
          setIsLoading(true);
        }
        try {
          // Fetch server ng\u1ea7m
          const data = await StaffServer.getStaffs();
          const normalized = Array.isArray(data) ? data : [];
          setStaffs(normalized);
          saveStaffCache(normalized);
        } catch (e) {
          if (!cached?.data) {
            setError(e?.message || "Kh\u00f4ng t\u1ea3i \u0111\u01b0\u1ee3c danh s\u00e1ch ti\u1ebfp vi\u00ean.");
          }
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        load();
      }, []);

      const resetForm = () => {
        setEditingId(null);
        setName("");
        setPhone("");
        setPricePerHour("");
      };

      const onAdd = async () => {
        if (!canSubmit || editingId) return;

        const newStaff = {
          id: Date.now(),
          name: name.trim(),
          phone: phone.trim(),
          price_per_hour: Number(pricePerHour) || 0,
        };

        const prev = staffs;
        setStaffs([
          ...staffs,
          {
            ...newStaff,
            status: "available",
            current_room_id: "",
          },
        ]);
        resetForm();

        try {
          await StaffServer.addStaff(newStaff);
          saveStaffCache([
            ...staffs,
            {
              ...newStaff,
              status: "available",
              current_room_id: "",
            },
          ]);
        } catch (e) {
          setStaffs(prev);
          setError(e?.message || "Thêm tiếp viên thất bại.");
        }
      };

      const onStartEdit = (s) => {
        setEditingId(s.id);
        setName(s.name || "");
        setPhone(s.phone || "");
        setPricePerHour(String(s.price_per_hour ?? ""));
        setError("");
      };

      const onUpdate = async () => {
        if (!canSubmit || !editingId) return;

        const prev = staffs;
        const patch = {
          id: editingId,
          name: name.trim(),
          phone: phone.trim(),
          price_per_hour: Number(pricePerHour) || 0,
        };

        setStaffs(
          staffs.map((s) =>
            String(s.id) === String(editingId) ? { ...s, ...patch } : s,
          ),
        );
        resetForm();

        try {
          await StaffServer.updateStaff(patch);
          saveStaffCache(
            staffs.map((s) =>
              String(s.id) === String(editingId) ? { ...s, ...patch } : s,
            ),
          );
        } catch (e) {
          setStaffs(prev);
          setError(e?.message || "Cập nhật tiếp viên thất bại.");
        }
      };

      const onDelete = async (id) => {
        const prev = staffs;
        setStaffs(staffs.filter((s) => String(s.id) !== String(id)));
        setError("");

        try {
          await StaffServer.deleteStaff(id);
          saveStaffCache(staffs.filter((s) => String(s.id) !== String(id)));
        } catch (e) {
          setStaffs(prev);
          setError(e?.message || "Xoá tiếp viên thất bại.");
        }
      };

      const toggleStatus = async (s) => {
        const prev = staffs;
        const nextStatus = s.status === "available" ? "busy" : "available";
        setStaffs(
          staffs.map((x) =>
            String(x.id) === String(s.id)
              ? {
                ...x,
                status: nextStatus,
                current_room_id:
                  nextStatus === "available" ? "" : x.current_room_id || "",
              }
              : x,
          ),
        );
        setError("");

        try {
          if (nextStatus === "available") {
            await StaffServer.releaseStaff(s.id);
          } else {
            await StaffServer.assignStaffToRoom(s.id, "");
          }
          saveStaffCache(
            staffs.map((x) =>
              String(x.id) === String(s.id)
                ? {
                  ...x,
                  status: nextStatus,
                  current_room_id:
                    nextStatus === "available" ? "" : x.current_room_id || "",
                }
                : x,
            ),
          );
        } catch (e) {
          setStaffs(prev);
          setError(e?.message || "Cập nhật trạng thái thất bại.");
        }
      };

      const Icon = window.Icon;

      return (
        <div className="max-w-3xl mx-auto p-2 md:p-0">
          <div className="bg-white rounded-xl md:rounded-2xl shadow p-4 md:p-6">
            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
              <div>
                <h2 className="text-xl font-bold text-slate-800">
                  Quản lý tiếp viên
                </h2>
                <p className="text-sm text-slate-500">
                  Quản lý danh sách tiếp viên trong Google Sheet.
                </p>
              </div>
              <button
                onClick={load}
                className="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700"
              >
                <Icon name="refresh" className="text-lg" />
                Tải lại
              </button>
            </div>

            {error && (
              <div className="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">
                {error}
              </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">
                  Tên
                </label>
                <input
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="Ví dụ: Lan"
                  className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                />
              </div>

              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">
                  SĐT
                </label>
                <input
                  value={phone}
                  onChange={(e) => setPhone(e.target.value)}
                  placeholder="090..."
                  className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                />
              </div>

              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">
                  Giá/giờ
                </label>
                <input
                  value={pricePerHour}
                  onChange={(e) => setPricePerHour(e.target.value)}
                  placeholder="120000"
                  inputMode="numeric"
                  className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                />
              </div>
            </div>

            <div className="flex items-center gap-2 mb-6">
              {editingId ? (
                <>
                  <button
                    onClick={onUpdate}
                    disabled={!canSubmit}
                    className="px-4 py-2 rounded-xl bg-amber-500 text-white font-semibold disabled:opacity-60"
                  >
                    Lưu
                  </button>
                  <button
                    onClick={resetForm}
                    className="px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold"
                  >
                    Huỷ
                  </button>
                </>
              ) : (
                <button
                  onClick={onAdd}
                  disabled={!canSubmit}
                  className="px-4 py-2 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-60"
                >
                  Thêm
                </button>
              )}
            </div>

            <div className="border-t border-slate-100 pt-4">
              {isLoading ? (
                <div className="text-sm text-slate-500">Đang tải...</div>
              ) : staffs.length === 0 ? (
                <div className="text-sm text-slate-500">Chưa có tiếp viên.</div>
              ) : (
                <div className="divide-y divide-slate-100">
                  {staffs.map((s) => (
                    <div
                      key={String(s.id)}
                      className="py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2 sm:gap-3"
                    >
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <div className="font-semibold text-slate-800">
                            {s.name}
                          </div>
                          <StatusPill status={s.status} />
                        </div>
                        <div className="text-xs sm:text-sm text-slate-500 truncate">
                          {(s.phone ? `${s.phone} • ` : "") +
                            `Giá/giờ: ${Number(s.price_per_hour || 0).toLocaleString()}đ` +
                            (s.current_room_id ? ` • Room: ${s.current_room_id}` : "")}
                        </div>
                      </div>

                      <div className="flex items-center gap-2 flex-shrink-0">
                        <button
                          onClick={() => toggleStatus(s)}
                          className="px-2.5 md:px-3 py-1.5 md:py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 text-xs md:text-sm"
                          title="Đổi trạng thái"
                        >
                          Trạng thái
                        </button>
                        <button
                          onClick={() => onStartEdit(s)}
                          className="px-2.5 md:px-3 py-1.5 md:py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 text-xs md:text-sm"
                        >
                          Sửa
                        </button>
                        <button
                          onClick={() => onDelete(s.id)}
                          className="px-2.5 md:px-3 py-1.5 md:py-2 rounded-xl bg-rose-600 text-white text-xs md:text-sm"
                        >
                          Xoá
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };
  })();
</script>
