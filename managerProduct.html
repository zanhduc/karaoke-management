<!doctype html>
<html lang="vi">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý hàng hoá</title>

    <script src="https://cdn.tailwindcss.com/3.3.5"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="p-4">
    <div id="product-root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const ProductServer = {
        isLocal: !window.google || !google.script || !google.script.run,
        getProducts() {
          if (this.isLocal) {
            return Promise.resolve([
              { id: 1, name: "Bia Tiger", unit: "Lon", price: 20000, quantity: 10 },
            ]);
          }
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .getProducts();
          });
        },
        addProduct(p) {
          if (this.isLocal) return Promise.resolve(true);
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .addProduct(p);
          });
        },
        updateProduct(p) {
          if (this.isLocal) return Promise.resolve(true);
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .updateProduct(p);
          });
        },
        deleteProduct(id) {
          if (this.isLocal) return Promise.resolve(true);
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)
              .deleteProduct(id);
          });
        },
      };

      function Icon({ name, className = "" }) {
        return (
          <span className={`material-icons-round ${className}`}>{name}</span>
        );
      }

      function ProductPage() {
        const [products, setProducts] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [error, setError] = useState("");

        const [name, setName] = useState("");
        const [unit, setUnit] = useState("");
        const [price, setPrice] = useState("");
        const [quantity, setQuantity] = useState("");
        const [editingId, setEditingId] = useState(null);

        const canSubmit = useMemo(() => {
          if (!name.trim()) return false;
          if (price === "" || Number.isNaN(Number(price))) return false;
          if (!editingId) {
            if (quantity === "" || Number.isNaN(Number(quantity))) return false;
          }
          return true;
        }, [editingId, name, price, quantity]);

        const load = async () => {
          setIsLoading(true);
          setError("");
          try {
            const data = await ProductServer.getProducts();
            setProducts(Array.isArray(data) ? data : []);
          } catch (e) {
            setError(e?.message || "Không tải được danh sách hàng hoá.");
          } finally {
            setIsLoading(false);
          }
        };

        useEffect(() => {
          load();
        }, []);

        const resetForm = () => {
          setEditingId(null);
          setName("");
          setUnit("");
          setPrice("");
          setQuantity("");
        };

        const onAdd = async () => {
          if (!canSubmit || editingId) return;

          const newItem = {
            id: Date.now(),
            name: name.trim(),
            unit: unit.trim(),
            price: Number(price) || 0,
            quantity: Number(quantity) || 0,
          };

          const prev = products;
          setProducts([...products, newItem]);
          resetForm();

          try {
            await ProductServer.addProduct(newItem);
          } catch (e) {
            setProducts(prev);
            setError(e?.message || "Thêm hàng hoá thất bại.");
          }
        };

        const onStartEdit = (p) => {
          setEditingId(p.id);
          setName(p.name || "");
          setUnit(p.unit || "");
          setPrice(String(p.price ?? ""));
          setQuantity(String(p.quantity ?? ""));
          setError("");
        };

        const onUpdate = async () => {
          if (!canSubmit || !editingId) return;

          const prev = products;
          const patch = {
            id: editingId,
            name: name.trim(),
            price: Number(price) || 0,
          };

          setProducts(
            products.map((p) =>
              String(p.id) === String(editingId) ? { ...p, ...patch } : p,
            ),
          );
          resetForm();

          try {
            await ProductServer.updateProduct(patch);
          } catch (e) {
            setProducts(prev);
            setError(e?.message || "Cập nhật hàng hoá thất bại.");
          }
        };

        const onDelete = async (id) => {
          const prev = products;
          setProducts(products.filter((p) => String(p.id) !== String(id)));
          setError("");

          try {
            await ProductServer.deleteProduct(id);
          } catch (e) {
            setProducts(prev);
            setError(e?.message || "Xoá hàng hoá thất bại.");
          }
        };

        return (
          <div className="max-w-3xl mx-auto">
            <div className="bg-white rounded-2xl shadow p-6">
              <div className="flex items-center justify-between gap-3 mb-4">
                <div>
                  <h2 className="text-xl font-bold text-slate-800">
                    Quản lý hàng hoá
                  </h2>
                  <p className="text-sm text-slate-500">
                    Thêm/sửa/xoá danh mục hàng hoá trong Google Sheet.
                  </p>
                </div>
                <button
                  onClick={load}
                  className="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700"
                >
                  <Icon name="refresh" className="text-lg" />
                  Tải lại
                </button>
              </div>

              {error && (
                <div className="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">
                  {error}
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-12 gap-3 mb-4">
                <div className="md:col-span-4">
                  <label className="block text-xs font-semibold text-slate-600 mb-1">
                    Tên hàng
                  </label>
                  <input
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder="Ví dụ: Bia Tiger"
                    className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                  />
                </div>

                <div className="md:col-span-2">
                  <label className="block text-xs font-semibold text-slate-600 mb-1">
                    Đơn vị
                  </label>
                  <input
                    value={unit}
                    onChange={(e) => setUnit(e.target.value)}
                    placeholder="Lon/Chai"
                    className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                    disabled={!!editingId}
                    title={
                      editingId
                        ? "Hiện `mã.js` chỉ update tên và giá. Muốn sửa đơn vị/số lượng cần mở rộng hàm updateProduct."
                        : ""
                    }
                  />
                </div>

                <div className="md:col-span-3">
                  <label className="block text-xs font-semibold text-slate-600 mb-1">
                    Giá
                  </label>
                  <input
                    value={price}
                    onChange={(e) => setPrice(e.target.value)}
                    placeholder="20000"
                    inputMode="numeric"
                    className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                  />
                </div>

                <div className="md:col-span-3">
                  <label className="block text-xs font-semibold text-slate-600 mb-1">
                    Số lượng
                  </label>
                  <input
                    value={quantity}
                    onChange={(e) => setQuantity(e.target.value)}
                    placeholder="10"
                    inputMode="numeric"
                    className="w-full rounded-xl border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                    disabled={!!editingId}
                    title={
                      editingId
                        ? "Hiện `mã.js` chỉ update tên và giá. Muốn sửa đơn vị/số lượng cần mở rộng hàm updateProduct."
                        : ""
                    }
                  />
                </div>
              </div>

              <div className="flex items-center gap-2 mb-6">
                {editingId ? (
                  <>
                    <button
                      onClick={onUpdate}
                      disabled={!canSubmit}
                      className="px-4 py-2 rounded-xl bg-amber-500 text-white font-semibold disabled:opacity-60"
                    >
                      Lưu
                    </button>
                    <button
                      onClick={resetForm}
                      className="px-4 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold"
                    >
                      Huỷ
                    </button>
                  </>
                ) : (
                  <button
                    onClick={onAdd}
                    disabled={!canSubmit}
                    className="px-4 py-2 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-60"
                  >
                    Thêm
                  </button>
                )}
              </div>

              <div className="border-t border-slate-100 pt-4">
                {isLoading ? (
                  <div className="text-sm text-slate-500">Đang tải...</div>
                ) : products.length === 0 ? (
                  <div className="text-sm text-slate-500">
                    Chưa có hàng hoá.
                  </div>
                ) : (
                  <div className="divide-y divide-slate-100">
                    {products.map((p) => (
                      <div
                        key={String(p.id)}
                        className="py-3 flex items-center justify-between gap-3"
                      >
                        <div>
                          <div className="font-semibold text-slate-800">
                            {p.name}
                          </div>
                          <div className="text-sm text-slate-500">
                            {(p.unit ? `${p.unit} • ` : "") +
                              `${Number(p.price || 0).toLocaleString()}đ` +
                              (p.quantity != null
                                ? ` • SL: ${Number(p.quantity || 0).toLocaleString()}`
                                : "")}
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <button
                            onClick={() => onStartEdit(p)}
                            className="px-3 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700"
                          >
                            Sửa
                          </button>
                          <button
                            onClick={() => onDelete(p.id)}
                            className="px-3 py-2 rounded-xl bg-rose-600 text-white"
                          >
                            Xoá
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("product-root")).render(
        <ProductPage />,
      );
    </script>
  </body>
</html>
