<script type="text/babel">
    (function () {
        const { useEffect, useMemo, useState } = React;

        const CustomerServer = {
            isLocal: !window.google || !google.script || !google.script.run,

            getCustomers() {
                if (this.isLocal) {
                    return Promise.resolve([
                        { id: 1, name: "Nguyễn Văn A", phone: "0988888888", discountPercent: 10 },
                    ]);
                }
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .getCustomers();
                });
            },

            addCustomer(c) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .addCustomer(c);
                });
            },

            updateCustomer(c) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .updateCustomer(c);
                });
            },

            deleteCustomer(id) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .deleteCustomer(id);
                });
            },
        };

        window.CustomerPage = function CustomerPage() {
            const [customers, setCustomers] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState("");

            // Modal
            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [currentCustomer, setCurrentCustomer] = useState(null);

            // Form
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [discount, setDiscount] = useState("");

            // Search
            const [searchTerm, setSearchTerm] = useState("");

            // Delete
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [deletingId, setDeletingId] = useState(null);

            const canSubmit = useMemo(() => {
                return name.trim() !== "" &&
                    (discount === "" || (!isNaN(Number(discount)) && Number(discount) >= 0 && Number(discount) <= 100));
            }, [name, discount]);

            const load = async () => {
                setIsLoading(true);
                setError("");
                try {
                    const data = await CustomerServer.getCustomers();
                    setCustomers(Array.isArray(data) ? data : []);
                } catch (e) {
                    setError("Không tải được khách hàng.");
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { load(); }, []);

            const resetForm = () => {
                setName(""); setPhone(""); setDiscount(""); setCurrentCustomer(null);
            };

            const openAddModal = () => {
                resetForm();
                setIsEditing(false);
                setShowModal(true);
            };

            const openEditModal = (c) => {
                setCurrentCustomer(c);
                setName(c.name || "");
                setPhone(c.phone || "");
                setDiscount(String(c.discountPercent || ""));
                setIsEditing(true);
                setShowModal(true);
            };

            const closeModal = () => {
                setShowModal(false);
                setTimeout(resetForm, 300);
            };

            const handleSave = async () => {
                if (!canSubmit) return;

                const data = {
                    name: name.trim(),
                    phone: phone.trim(),
                    discountPercent: discount === "" ? 0 : Number(discount),
                };

                if (isEditing && currentCustomer) {
                    const prev = customers;
                    const updated = { ...currentCustomer, ...data };
                    setCustomers(customers.map(c => c.id === currentCustomer.id ? updated : c));

                    try {
                        await CustomerServer.updateCustomer({ id: currentCustomer.id, ...data });
                    } catch {
                        setCustomers(prev);
                        setError("Cập nhật thất bại");
                    }
                } else {
                    const newCus = { id: Date.now(), ...data };
                    const prev = customers;
                    setCustomers([...customers, newCus]);

                    try {
                        await CustomerServer.addCustomer(newCus);
                    } catch {
                        setCustomers(prev);
                        setError("Thêm thất bại");
                    }
                }

                closeModal();
            };

            const confirmDelete = (id) => {
                setDeletingId(id);
                setShowDeleteConfirm(true);
            };

            const executeDelete = async () => {
                const prev = customers;
                setCustomers(customers.filter(c => c.id !== deletingId));

                try {
                    await CustomerServer.deleteCustomer(deletingId);
                } catch {
                    setCustomers(prev);
                    setError("Xoá thất bại");
                }

                setShowDeleteConfirm(false);
                setDeletingId(null);
            };

            const filtered = useMemo(() => {
                if (!searchTerm.trim()) return customers;
                const t = searchTerm.toLowerCase();
                return customers.filter(c =>
                    (c.name || "").toLowerCase().includes(t) ||
                    (c.phone || "").includes(t)
                );
            }, [customers, searchTerm]);

            const Icon = window.Icon;

            return (
                <div className="max-w-4xl mx-auto p-4">
                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden">

                        {/* Header */}
                        <div className="px-6 py-6 border-b flex justify-between bg-slate-50">
                            <div>
                                <h1 className="text-2xl font-bold">Quản lý khách hàng</h1>
                                <p className="text-slate-500">Thêm, sửa, xoá khách</p>
                            </div>
                            <button onClick={openAddModal}
                                className="px-6 py-3 bg-indigo-600 text-white rounded-2xl">
                                + Thêm khách
                            </button>
                        </div>

                        {/* Search */}
                        <div className="p-6 border-b">
                            <input
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                                placeholder="Tìm theo tên hoặc SĐT..."
                                className="w-full rounded-2xl border px-4 py-3"
                            />
                        </div>

                        {error && <div className="p-4 text-red-600">{error}</div>}

                        {/* List */}
                        <div className="p-6 space-y-4">
                            {isLoading ? "Đang tải..." : filtered.map(c => (
                                <div key={c.id} className="border p-4 rounded-2xl flex justify-between">
                                    <div>
                                        <div className="font-semibold">{c.name}</div>
                                        <div className="text-sm text-slate-500">{c.phone}</div>
                                        <div className="text-emerald-600 font-medium">
                                            Giảm: {c.discountPercent || 0}%
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => openEditModal(c)}>Sửa</button>
                                        <button onClick={() => confirmDelete(c.id)}>Xoá</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center">
                            <div className="bg-white p-6 rounded-2xl w-96 space-y-3">
                                <h2 className="text-xl font-semibold">
                                    {isEditing ? "Sửa khách" : "Thêm khách"}
                                </h2>

                                <input value={name} onChange={e => setName(e.target.value)} placeholder="Tên khách" className="w-full border p-2 rounded" />
                                <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="SĐT" className="w-full border p-2 rounded" />
                                <input type="number" value={discount} onChange={e => setDiscount(e.target.value)} placeholder="% giảm" className="w-full border p-2 rounded" />

                                <div className="flex gap-2">
                                    <button onClick={closeModal}>Huỷ</button>
                                    <button onClick={handleSave} disabled={!canSubmit}>Lưu</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };
    })();
</script>
