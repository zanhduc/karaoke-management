<script type="text/babel">
    (function () {
        const { useEffect, useMemo, useState } = React;

        const CustomerServer = {
            isLocal: !window.google || !google.script || !google.script.run,

            getCustomers() {
                if (this.isLocal) {
                    return Promise.resolve([
                        { id: 1, name: "Nguyễn Văn A", phone: "0988888888", discountPercent: 10 },
                    ]);
                }
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .getCustomers();
                });
            },

            addCustomer(c) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .addCustomer(c);
                });
            },

            updateCustomer(c) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .updateCustomer(c);
                });
            },

            deleteCustomer(id) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .deleteCustomer(id);
                });
            },
        };

        window.CustomerPage = function CustomerPage() {
            const [customers, setCustomers] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState("");
            const CUSTOMER_CACHE_KEY = "karaoke_customer_cache_v1";
            const CUSTOMER_CACHE_TTL_MS = 60 * 1000;

            // Modal
            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [currentCustomer, setCurrentCustomer] = useState(null);

            // Form
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [discount, setDiscount] = useState("");

            // Search
            const [searchTerm, setSearchTerm] = useState("");

            // Delete
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [deletingId, setDeletingId] = useState(null);

            const canSubmit = useMemo(() => {
                return name.trim() !== "" &&
                    (discount === "" || (!isNaN(Number(discount)) && Number(discount) >= 0 && Number(discount) <= 100));
            }, [name, discount]);

            const saveCustomerCache = (nextCustomers) => {
                try {
                    localStorage.setItem(CUSTOMER_CACHE_KEY, JSON.stringify({
                        ts: Date.now(),
                        data: Array.isArray(nextCustomers) ? nextCustomers : [],
                    }));
                } catch (e) {
                    console.warn("Save customer cache failed", e);
                }
            };

            const readCustomerCache = () => {
                try {
                    const raw = localStorage.getItem(CUSTOMER_CACHE_KEY);
                    if (!raw) return null;
                    const parsed = JSON.parse(raw);
                    if (!parsed || !parsed.ts || !Array.isArray(parsed.data)) return null;
                    const isExpired = Date.now() - Number(parsed.ts) > CUSTOMER_CACHE_TTL_MS;
                    return { data: parsed.data, isExpired };
                } catch (e) {
                    console.warn("Read customer cache failed", e);
                    return null;
                }
            };

            const load = async () => {
                setError("");
                const cached = readCustomerCache();
                if (cached?.data) {
                    // \u2705 Hi\u1ec7n ngay t\u1eeb cache, kh\u00f4ng ch\u01edd server
                    setCustomers(cached.data);
                    setIsLoading(false);
                } else {
                    setIsLoading(true);
                }
                try {
                    // Fetch server ng\u1ea7m
                    const data = await CustomerServer.getCustomers();
                    const normalized = Array.isArray(data) ? data : [];
                    setCustomers(normalized);
                    saveCustomerCache(normalized);
                } catch (e) {
                    if (!cached?.data) {
                        setError("Kh\u00f4ng t\u1ea3i \u0111\u01b0\u1ee3c kh\u00e1ch h\u00e0ng.");
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { load(); }, []);

            const resetForm = () => {
                setName(""); setPhone(""); setDiscount(""); setCurrentCustomer(null);
            };

            const openAddModal = () => {
                resetForm();
                setIsEditing(false);
                setShowModal(true);
            };

            const openEditModal = (c) => {
                setCurrentCustomer(c);
                setName(c.name || "");
                setPhone(c.phone || "");
                setDiscount(String(c.discountPercent || ""));
                setIsEditing(true);
                setShowModal(true);
            };

            const closeModal = () => {
                setShowModal(false);
                setTimeout(resetForm, 300);
            };

            const handleSave = async () => {
                if (!canSubmit) return;

                const data = {
                    name: name.trim(),
                    phone: phone.trim(),
                    discountPercent: discount === "" ? 0 : Number(discount),
                };

                if (isEditing && currentCustomer) {
                    const prev = customers;
                    const updated = { ...currentCustomer, ...data };
                    setCustomers(customers.map(c => c.id === currentCustomer.id ? updated : c));

                    try {
                        await CustomerServer.updateCustomer({ id: currentCustomer.id, ...data });
                        saveCustomerCache(customers.map(c => c.id === currentCustomer.id ? updated : c));
                    } catch {
                        setCustomers(prev);
                        setError("Cập nhật thất bại");
                    }
                } else {
                    const newCus = { id: Date.now(), ...data };
                    const prev = customers;
                    setCustomers([...customers, newCus]);

                    try {
                        await CustomerServer.addCustomer(newCus);
                        saveCustomerCache([...customers, newCus]);
                    } catch {
                        setCustomers(prev);
                        setError("Thêm thất bại");
                    }
                }

                closeModal();
            };

            const confirmDelete = (id) => {
                setDeletingId(id);
                setShowDeleteConfirm(true);
            };

            const executeDelete = async () => {
                const prev = customers;
                setCustomers(customers.filter(c => c.id !== deletingId));

                try {
                    await CustomerServer.deleteCustomer(deletingId);
                    saveCustomerCache(customers.filter(c => c.id !== deletingId));
                } catch {
                    setCustomers(prev);
                    setError("Xoá thất bại");
                }

                setShowDeleteConfirm(false);
                setDeletingId(null);
            };

            const filtered = useMemo(() => {
                if (!searchTerm.trim()) return customers;
                const t = searchTerm.toLowerCase();
                return customers.filter(c =>
                    (c.name || "").toLowerCase().includes(t) ||
                    (c.phone || "").includes(t)
                );
            }, [customers, searchTerm]);

            const Icon = window.Icon;

            return (
                <div className="max-w-4xl mx-auto p-2 md:p-4">
                    <div className="bg-white rounded-2xl md:rounded-3xl shadow-xl overflow-hidden">

                        {/* Header */}
                        <div className="px-4 md:px-6 py-4 md:py-6 border-b flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-slate-50">
                            <div>
                                <h1 className="text-xl md:text-2xl font-bold">Quản lý khách hàng</h1>
                                <p className="text-sm text-slate-500">Thêm, sửa, xoá khách</p>
                            </div>
                            <button onClick={openAddModal}
                                className="px-5 md:px-6 py-2.5 md:py-3 bg-indigo-600 text-white rounded-2xl text-sm font-semibold">
                                + Thêm khách
                            </button>
                        </div>

                        {/* Search */}
                        <div className="p-4 md:p-6 border-b">
                            <input
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                                placeholder="Tìm theo tên hoặc SĐT..."
                                className="w-full rounded-2xl border px-3 md:px-4 py-2.5 md:py-3 text-sm"
                            />
                        </div>

                        {error && <div className="p-3 md:p-4 mx-4 mt-3 text-red-600 bg-red-50 rounded-xl text-sm">{error}</div>}

                        {/* List */}
                        <div className="p-4 md:p-6 space-y-3 md:space-y-4">
                            {isLoading ? "Đang tải..." : filtered.map(c => (
                                <div key={c.id} className="border border-slate-200 p-3 md:p-4 rounded-xl md:rounded-2xl flex flex-col sm:flex-row justify-between gap-3">
                                    <div className="flex-1 min-w-0">
                                        <div className="font-semibold text-slate-800">{c.name}</div>
                                        <div className="text-xs sm:text-sm text-slate-500">{c.phone}</div>
                                        <div className="text-emerald-600 font-medium text-sm">
                                            Giảm: {c.discountPercent || 0}%
                                        </div>
                                    </div>
                                    <div className="flex gap-2 flex-shrink-0">
                                        <button onClick={() => openEditModal(c)}
                                            className="px-4 py-2 text-xs md:text-sm border border-slate-200 rounded-xl hover:bg-slate-50 font-medium">Sửa</button>
                                        <button onClick={() => confirmDelete(c.id)}
                                            className="px-4 py-2 text-xs md:text-sm bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 font-medium">Xoá</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-5 md:p-6 rounded-2xl w-full max-w-sm space-y-4">
                                <h2 className="text-lg md:text-xl font-semibold">
                                    {isEditing ? "Sửa khách" : "Thêm khách"}
                                </h2>

                                <input value={name} onChange={e => setName(e.target.value)} placeholder="Tên khách" className="w-full border border-slate-200 p-2.5 rounded-xl text-sm" />
                                <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="SĐT" className="w-full border border-slate-200 p-2.5 rounded-xl text-sm" />
                                <input type="number" value={discount} onChange={e => setDiscount(e.target.value)} placeholder="% giảm" className="w-full border border-slate-200 p-2.5 rounded-xl text-sm" />

                                <div className="flex gap-3 pt-2">
                                    <button onClick={closeModal}
                                        className="flex-1 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 text-sm font-medium">Huỷ</button>
                                    <button onClick={handleSave} disabled={!canSubmit}
                                        className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl disabled:opacity-50 text-sm font-semibold">Lưu</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };
    })();
</script>
