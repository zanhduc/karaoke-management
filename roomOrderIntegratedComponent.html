<script type="text/babel">
    (function () {
        const { useEffect, useMemo, useState, useRef, useCallback } = React;
        const ROOM_ORDER_BUILD = "2026-04-19-json-flow-v2";
        console.log("[ROOM_ORDER_BUILD]", ROOM_ORDER_BUILD);

        // ═════════════════════════════════════════════════════════════════════
        // HELPER COMPONENTS & FUNCTIONS
        // ═════════════════════════════════════════════════════════════════════

        // Format tiền Việt Nam
        const fmt = (n) => Number(n || 0).toLocaleString("vi-VN");

        // Trạng thái phòng
        function StatusPill({ status, startTime }) {
            if (status === "available") return <span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700">🟢 Trống</span>;
            if (status === "occupied") return <span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-rose-100 text-rose-700">🔴 Đang dùng</span>;
            return <span className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-700">🟡 Đang dọn</span>;
        }

        function getElapsed(startTime) {
            if (!startTime) return "";
            const elapsed = Date.now() - new Date(startTime).getTime();
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            return `${hours}h ${minutes < 10 ? "0" : ""}${minutes}m`;
        }

        function formatDurationClock(durationMs) {
            const safeMs = Math.max(0, Number(durationMs || 0));
            const totalMinutes = Math.floor(safeMs / 60000);
            const hh = Math.floor(totalMinutes / 60);
            const mm = totalMinutes % 60;
            return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
        }

        function normalizeStaffTimer(staff) {
            // Initialize sessions if not present (for old format compatibility)
            if (!staff.sessions) {
                // If startTime exists, create a session from it
                const sessions = staff.startTime ? [{ startTime: staff.startTime, endTime: staff.endTime || null }] : [];
                return {
                    ...staff,
                    sessions,
                    isPaused: Boolean(staff?.isPaused),
                    pauseStartedAt: staff?.pauseStartedAt || null,
                    totalPausedMs: Number(staff?.totalPausedMs || 0),
                };
            }
            return {
                ...staff,
                isPaused: Boolean(staff?.isPaused),
                pauseStartedAt: staff?.pauseStartedAt || null,
                totalPausedMs: Number(staff?.totalPausedMs || 0),
            };
        }

        function normalizeListPayload(payload, preferredKeys = []) {
            if (Array.isArray(payload)) return payload;
            if (!payload || typeof payload !== "object") return [];

            const candidateKeys = [...preferredKeys, "result", "data", "orders", "items", "list", "rows", "values"];
            for (const key of candidateKeys) {
                if (!(key in payload)) continue;
                const nested = payload[key];
                if (Array.isArray(nested)) return nested;
                if (nested && typeof nested === "object") {
                    const normalizedNested = normalizeListPayload(nested, []);
                    if (normalizedNested.length > 0) return normalizedNested;
                }
            }

            const numericKeys = Object.keys(payload)
                .filter(key => /^\d+$/.test(key))
                .sort((a, b) => Number(a) - Number(b));
            if (numericKeys.length > 0) {
                return numericKeys
                    .map(key => payload[key])
                    .filter(item => item !== null && item !== undefined);
            }

            if (payload.orderCode || payload.id) {
                return [payload];
            }

            return [];
        }

        function parseServerJsonPayload(payload) {
            if (typeof payload !== "string") return payload;
            try {
                return JSON.parse(payload);
            } catch (e) {
                console.warn("Could not parse server JSON payload:", e, payload);
                return payload;
            }
        }

        // API abstraction
        const RoomServer = {
            isLocal: !window.google || !google.script || !google.script.run,
            getRooms() {
                if (this.isLocal) return Promise.resolve([
                    { id: 101, name: "Phòng 101", type: "VIP", price_per_hour: 300000, status: "available", start_time: null, current_order_id: "" },
                    { id: 102, name: "Phòng 102", type: "thường", price_per_hour: 150000, status: "occupied", start_time: Date.now() - 5400000, current_order_id: "ORD-2026-001" },
                    { id: 103, name: "Phòng 103", type: "VIP", price_per_hour: 350000, status: "cleaning", start_time: null, current_order_id: "" },
                ]);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getRooms();
                });
            },
            getOrders(limit = 50) {
                console.log("🚀 RoomServer.getOrders() called, isLocal:", this.isLocal);
                if (this.isLocal) {
                    const sampleOrders = [
                        { orderCode: "ORD-2026-001", roomId: 101, roomName: "Phòng 101", startTime: new Date(Date.now() - 3600000).toISOString(), endTime: new Date(Date.now() - 1800000).toISOString(), paymentStatus: "Đã thanh toán", grandTotal: 500000, products: [], staffs: [], bankPayment: 500000, cashPayment: 0 },
                        { orderCode: "ORD-2026-002", roomId: 102, roomName: "Phòng 102", startTime: new Date(Date.now() - 7200000).toISOString(), endTime: new Date(Date.now() - 3600000).toISOString(), paymentStatus: "Đã thanh toán", grandTotal: 750000, products: [], staffs: [], bankPayment: 750000, cashPayment: 0 },
                        { orderCode: "ORD-2026-003", roomId: 103, roomName: "Phòng 103", startTime: new Date(Date.now() - 1800000).toISOString(), endTime: null, paymentStatus: "Chưa thanh toán", grandTotal: 300000, products: [], staffs: [], bankPayment: 0, cashPayment: 0 },
                    ];
                    console.log("📦 LOCAL mode - returning sample orders:", sampleOrders);
                    return Promise.resolve(sampleOrders);
                }
                return new Promise((resolve, reject) => {
                    console.log("📡 Calling backend getOrders with limit:", limit);
                    google.script.run.withSuccessHandler((rawData) => {
                        const data = parseServerJsonPayload(rawData);
                        // 🔍 DETAILED LOG - Dump toàn bộ response
                        console.log("🔍 === BACKEND RESPONSE DEBUG ===");
                        console.log("Type:", typeof data);
                        console.log("Is Array?:", Array.isArray(data));
                        console.log("Raw value:", data);
                        try {
                            console.log("JSON string:", JSON.stringify(data).substring(0, 500)); // First 500 chars
                        } catch (e) {
                            console.warn("Could not stringify backend response:", e);
                        }
                        if (data && typeof data === 'object') {
                            console.log("Keys:", Object.keys(data));
                            console.log("Has 'result'?:", data.result !== undefined);
                            console.log("Has 'data'?:", data.data !== undefined);
                            console.log("Has 'orders'?:", data.orders !== undefined);
                        }
                        console.log("🔍 === END DEBUG ===");

                        const orders = normalizeListPayload(data, ["orders"]);
                        console.log("✅ Final orders array:", { count: orders.length, sample: orders[0] || null });
                        if (orders.length === 0 && data && typeof data === "object") {
                            console.warn("⚠️ Response did not match expected order list shape. Keys:", Object.keys(data));
                        }
                        resolve(orders);
                    }).withFailureHandler((err) => {
                        console.warn("getOrdersJson failed, fallback to getOrders:", err);
                        google.script.run.withSuccessHandler((fallbackRawData) => {
                            const fallbackData = parseServerJsonPayload(fallbackRawData);
                            const orders = normalizeListPayload(fallbackData, ["orders"]);
                            console.log("✅ Fallback getOrders resolved:", { count: orders.length, sample: orders[0] || null });
                            resolve(orders);
                        }).withFailureHandler((fallbackErr) => {
                            console.error("❌ Backend getOrders failed:", fallbackErr);
                            console.log("💡 Falling back to sample data");
                            const fallbackOrders = [
                                { orderCode: "ORD-2026-001", roomId: 101, roomName: "Phòng 101", startTime: new Date(Date.now() - 3600000).toISOString(), endTime: new Date(Date.now() - 1800000).toISOString(), paymentStatus: "Đã thanh toán", grandTotal: 500000, products: [], staffs: [], bankPayment: 500000, cashPayment: 0 },
                                { orderCode: "ORD-2026-002", roomId: 102, roomName: "Phòng 102", startTime: new Date(Date.now() - 7200000).toISOString(), endTime: new Date(Date.now() - 3600000).toISOString(), paymentStatus: "Đã thanh toán", grandTotal: 750000, products: [], staffs: [], bankPayment: 750000, cashPayment: 0 },
                                { orderCode: "ORD-2026-003", roomId: 103, roomName: "Phòng 103", startTime: new Date(Date.now() - 1800000).toISOString(), endTime: null, paymentStatus: "Chưa thanh toán", grandTotal: 300000, products: [], staffs: [], bankPayment: 0, cashPayment: 0 },
                            ];
                            resolve(fallbackOrders);
                        }).getOrders(limit);
                    }).getOrdersJson(limit);
                });
            },
            getProducts() {
                if (this.isLocal) return Promise.resolve([
                    { id: 1, name: "Bia Heineken", unit: "lon", price: 50000 },
                    { id: 2, name: "Nước ngọt Coca", unit: "chai", price: 30000 },
                    { id: 3, name: "Rượu vang Pháp", unit: "chai", price: 300000 },
                    { id: 4, name: "Nước lọc", unit: "chai", price: 10000 },
                    { id: 5, name: "Khoai tây chiên", unit: "bộ", price: 80000 },
                ]);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getProducts();
                });
            },
            getStaffs() {
                if (this.isLocal) return Promise.resolve([
                    { id: 1, name: "Hoa", status: "available", price_per_hour: 100000 },
                    { id: 2, name: "Linh", status: "available", price_per_hour: 120000 },
                    { id: 3, name: "Tú", status: "busy", price_per_hour: 100000 },
                    { id: 4, name: "Nhung", status: "available", price_per_hour: 110000 },
                ]);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getStaffs();
                });
            },
            getCustomers() {
                if (this.isLocal) return Promise.resolve([]);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getCustomers();
                });
            },
            addRoom(r) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).addRoom(r);
                });
            },
            updateRoom(r) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).updateRoom(r);
                });
            },
            deleteRoom(id) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteRoom(id);
                });
            },
            updateRoomStatus(roomId, status) {
                if (this.isLocal) return Promise.resolve(true);
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).updateRoomStatus(roomId, status);
                });
            },
            createOrder(data) {
                if (this.isLocal) return Promise.resolve({ success: true, orderCode: "TEST-001" });
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).createOrder(data);
                });
            },
            getUnifiedRoomData() {
                if (this.isLocal) return Promise.resolve({ rooms: [], orders: [], products: [], staffs: [] });
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler((rawData) => {
                        const data = parseServerJsonPayload(rawData);
                        resolve({
                            ...data,
                            rooms: normalizeListPayload(data?.rooms, ["rooms"]),
                            orders: normalizeListPayload(data?.orders, ["orders"]),
                            products: normalizeListPayload(data?.products, ["products"]),
                            staffs: normalizeListPayload(data?.staffs, ["staffs"]),
                        });
                    }).withFailureHandler((err) => {
                        console.warn("getUnifiedRoomDataJson failed, fallback to getUnifiedRoomData:", err);
                        google.script.run.withSuccessHandler((fallbackRawData) => {
                            const data = parseServerJsonPayload(fallbackRawData);
                            resolve({
                                ...data,
                                rooms: normalizeListPayload(data?.rooms, ["rooms"]),
                                orders: normalizeListPayload(data?.orders, ["orders"]),
                                products: normalizeListPayload(data?.products, ["products"]),
                                staffs: normalizeListPayload(data?.staffs, ["staffs"]),
                            });
                        }).withFailureHandler(reject).getUnifiedRoomData();
                    }).getUnifiedRoomDataJson();
                });
            },
            getRoomAndOrderData() {
                if (this.isLocal) return Promise.resolve({ rooms: [], orders: [] });
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler((rawData) => {
                        const data = parseServerJsonPayload(rawData);
                        resolve({
                            ...data,
                            rooms: normalizeListPayload(data?.rooms, ["rooms"]),
                            orders: normalizeListPayload(data?.orders, ["orders"]),
                        });
                    }).withFailureHandler((err) => {
                        console.warn("getRoomAndOrderDataJson failed, fallback to getRoomAndOrderData:", err);
                        google.script.run.withSuccessHandler((fallbackRawData) => {
                            const data = parseServerJsonPayload(fallbackRawData);
                            resolve({
                                ...data,
                                rooms: normalizeListPayload(data?.rooms, ["rooms"]),
                                orders: normalizeListPayload(data?.orders, ["orders"]),
                            });
                        }).withFailureHandler(reject).getRoomAndOrderData();
                    }).getRoomAndOrderDataJson();
                });
            }
        };

        // ═════════════════════════════════════════════════════════════════════
        // MAIN INTEGRATED COMPONENT
        // ═════════════════════════════════════════════════════════════════════

        window.RoomPage = function RoomOrderIntegratedPage() {
            // ──── Data Loading States ────
            const [rooms, setRooms] = useState([]);
            const [orders, setOrders] = useState([]);
            const [products, setProducts] = useState([]);
            const [staffs, setStaffs] = useState([]);

            const [isLoading, setIsLoading] = useState(true);
            const [tick, setTick] = useState(0);

            // ──── Overall UI States ────
            const [error, setError] = useState("");
            const [success, setSuccess] = useState("");

            // ──── Room Management States ────
            const [statusFilter, setStatusFilter] = useState("all");
            const [typeFilter, setTypeFilter] = useState("all");

            // Room modals
            const [showAddModal, setShowAddModal] = useState(false);
            const [addName, setAddName] = useState("");
            const [addType, setAddType] = useState("thường");
            const [addPrice, setAddPrice] = useState("");

            const [showEditModal, setShowEditModal] = useState(false);
            const [editingRoom, setEditingRoom] = useState(null);
            const [editName, setEditName] = useState("");
            const [editType, setEditType] = useState("");
            const [editPrice, setEditPrice] = useState("");

            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
            const [deletingId, setDeletingId] = useState(null);

            const [showStatusConfirm, setShowStatusConfirm] = useState(false);
            const [targetRoom, setTargetRoom] = useState(null);
            const [newStatus, setNewStatus] = useState("");

            const [showRoomDetail, setShowRoomDetail] = useState(false);
            const [selectedRoomDetail, setSelectedRoomDetail] = useState(null);
            const [currentOrderDetail, setCurrentOrderDetail] = useState(null);

            // Room Detail - Order Editing States
            const [tempProducts, setTempProducts] = useState([]);
            const [tempStaffs, setTempStaffs] = useState([]);
            const [tempBankPayment, setTempBankPayment] = useState(0);
            const [tempCashPayment, setTempCashPayment] = useState(0);
            const [tempNote, setTempNote] = useState("");
            const [showOrderDetailModal, setShowOrderDetailModal] = useState(false);
            const [isPausedTime, setIsPausedTime] = useState(false);
            const [pausedTimeMs, setPausedTimeMs] = useState(0);
            const [totalPausedMs, setTotalPausedMs] = useState(0);
            const [timeTick, setTimeTick] = useState(0);
            const [showAddProductToOrderModal, setShowAddProductToOrderModal] = useState(false);
            const [showAddStaffToOrderModal, setShowAddStaffToOrderModal] = useState(false);
            const [pickProductQtyForOrder, setPickProductQtyForOrder] = useState(1);
            const [pickProductForOrder, setPickProductForOrder] = useState(null);
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [selectedRoomIdForOrder, setSelectedRoomIdForOrder] = useState("");
            const [orderStartTime] = useState(new Date());
            const [isSubmittingOrder, setIsSubmittingOrder] = useState(false);
            const [showStaffModal, setShowStaffModal] = useState(false);
            const [note, setNote] = useState("");
            const [orderItems, setOrderItems] = useState([]);
            const [pickProductId, setPickProductId] = useState("");
            const [pickQty, setPickQty] = useState(1);
            const [orderStaffs, setOrderStaffs] = useState([]);
            const [pickStaffId, setPickStaffId] = useState("");
            const [adjustment, setAdjustment] = useState(0);

            // ──── Order Completed Table States ────
            const [searchQuery, setSearchQuery] = useState("");
            const [currentPage, setCurrentPage] = useState(1);
            const PAGE_SIZE = 12;
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [showOrderCompletedModal, setShowOrderCompletedModal] = useState(false);
            const [showReopenConfirm, setShowReopenConfirm] = useState(false);
            const [elapsedTick, setElapsedTick] = useState(0);
            const [notification, setNotification] = useState(null);

            const DATA_CACHE_KEY = "karaoke_room_unified_cache_v1";
            const DATA_CACHE_TTL_MS = 60 * 1000;

            const applyUnifiedDataToState = useCallback((data, keepCatalogIfMissing = true) => {
                if (!data || typeof data !== "object") return;
                const nextRooms = normalizeListPayload(data.rooms, ["rooms"]);
                const nextOrders = normalizeListPayload(data.orders, ["orders"]);
                const nextProducts = normalizeListPayload(data.products, ["products"]);
                const nextStaffs = normalizeListPayload(data.staffs, ["staffs"]);

                if (nextRooms.length || Array.isArray(data.rooms)) setRooms(nextRooms);
                if (nextOrders.length || Array.isArray(data.orders)) setOrders(nextOrders);
                if (nextProducts.length || Array.isArray(data.products)) {
                    setProducts(nextProducts);
                } else if (!keepCatalogIfMissing) {
                    setProducts([]);
                }
                if (nextStaffs.length || Array.isArray(data.staffs)) {
                    setStaffs(nextStaffs);
                } else if (!keepCatalogIfMissing) {
                    setStaffs([]);
                }
            }, []);

            const saveUnifiedCache = useCallback((payload) => {
                try {
                    localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({
                        ts: Date.now(),
                        data: payload
                    }));
                } catch (e) {
                    console.warn("Save cache failed", e);
                }
            }, []);

            const loadUnifiedCache = useCallback(() => {
                try {
                    const raw = localStorage.getItem(DATA_CACHE_KEY);
                    if (!raw) return null;
                    const parsed = JSON.parse(raw);
                    if (!parsed || !parsed.ts || !parsed.data) return null;
                    const isExpired = Date.now() - Number(parsed.ts) > DATA_CACHE_TTL_MS;
                    return { data: parsed.data, isExpired };
                } catch (e) {
                    console.warn("Read cache failed", e);
                    return null;
                }
            }, []);

            // ──── Load Data ────
            // ── Order Draft (lưu tạm khi đóng popup, khôi phục khi mở lại) ──
            const ORDER_DRAFT_PREFIX = "karaoke_order_draft_v1_";
            const saveOrderDraft = useCallback((orderCode, state) => {
                if (!orderCode) return;
                try {
                    localStorage.setItem(ORDER_DRAFT_PREFIX + orderCode, JSON.stringify({ ...state, savedAt: Date.now() }));
                } catch (e) { }
            }, []);
            const loadOrderDraft = (orderCode) => {
                try {
                    const raw = localStorage.getItem(ORDER_DRAFT_PREFIX + orderCode);
                    return raw ? JSON.parse(raw) : null;
                } catch (e) { return null; }
            };
            const clearOrderDraft = (orderCode) => {
                try { localStorage.removeItem(ORDER_DRAFT_PREFIX + orderCode); } catch (e) { }
            };

            const load = async () => {
                setError("");
                const cached = loadUnifiedCache();
                if (cached?.data) {
                    // ✅ Ưu tiên giao diện: hiện ngay từ cache, không chờ server
                    applyUnifiedDataToState(cached.data, true);
                    setIsLoading(false);
                } else {
                    setIsLoading(true);
                }

                try {
                    // Fetch từ server trong nền
                    const timeoutPromise = new Promise((_, reject) =>
                        setTimeout(() => reject(new Error("Load timeout")), 8000)
                    );

                    const loadPromise = (async () => {
                        const rooms = await RoomServer.getRooms().catch(err => {
                            console.error("❌ Load rooms failed:", err);
                            return [];
                        });
                        console.log("✅ Rooms loaded:", rooms);
                        let orders = await RoomServer.getOrders().catch(err => {
                            console.error("❌ Load orders failed:", err);
                            return [];
                        });
                        orders = Array.isArray(orders) ? orders : [];
                        console.log("✅ Orders loaded:", orders.length);
                        const [products, staffs] = await Promise.all([
                            RoomServer.getProducts().catch(() => []),
                            RoomServer.getStaffs().catch(() => [])
                        ]);
                        return { rooms, orders, products, staffs };
                    })();

                    const data = await Promise.race([loadPromise, timeoutPromise]);
                    applyUnifiedDataToState(data, false);
                    saveUnifiedCache({
                        rooms: Array.isArray(data.rooms) ? data.rooms : [],
                        orders: Array.isArray(data.orders) ? data.orders : [],
                        products: Array.isArray(data.products) ? data.products : [],
                        staffs: Array.isArray(data.staffs) ? data.staffs : []
                    });
                } catch (e) {
                    if (!cached?.data) {
                        setError(e?.message || "Không tải được dữ liệu.");
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const loadBackground = useCallback(async () => {
                try {
                    const data = await RoomServer.getRoomAndOrderData();
                    if (!data || typeof data !== "object") {
                        console.warn("Background load: invalid data response", data);
                        return;
                    }
                    const nextRooms = Array.isArray(data.rooms) ? data.rooms : [];
                    const nextOrders = Array.isArray(data.orders) ? data.orders : [];
                    setRooms(nextRooms);
                    setOrders(nextOrders);
                } catch (e) {
                    console.warn("Background load failed:", e);
                }
            }, []);

            useEffect(() => { load(); }, []);
            useEffect(() => {
                // Giảm interval từ 30s xuống 10s để sync nhanh hơn
                const interval = setInterval(() => { loadBackground(); setTick(t => t + 1); }, 10000);
                return () => clearInterval(interval);
            }, [loadBackground]);

            // ──── Room CRUD ────
            const canAdd = useMemo(() => {
                return addName.trim() !== "" && addPrice !== "" && !isNaN(Number(addPrice)) && Number(addPrice) > 0;
            }, [addName, addPrice]);

            const openAddModal = () => {
                setAddName("");
                setAddType("thường");
                setAddPrice("");
                setShowAddModal(true);
            };

            const closeAddModal = () => setShowAddModal(false);

            const handleAdd = async () => {
                if (!canAdd) {
                    setError("Vui lòng nhập đầy đủ Tên phòng và Giá/giờ hợp lệ.");
                    return;
                }
                const newRoom = {
                    id: Date.now(),
                    name: addName.trim(),
                    type: addType,
                    price_per_hour: Number(addPrice),
                    status: "available",
                    start_time: null,
                    current_order_id: "",
                };
                const prev = [...rooms];
                setRooms([...rooms, newRoom]);
                closeAddModal();
                try {
                    await RoomServer.addRoom(newRoom);
                    setSuccess("Thêm phòng thành công!");
                    setTimeout(() => setSuccess(""), 3000);
                } catch (e) {
                    setRooms(prev);
                    setError("Thêm phòng thất bại.");
                }
            };

            const openEditModal = (room) => {
                if (room.status === "occupied") {
                    setError("Không thể chỉnh sửa phòng đang sử dụng.");
                    return;
                }
                setEditingRoom(room);
                setEditName(room.name || "");
                setEditType(room.type || "thường");
                setEditPrice(String(room.price_per_hour || ""));
                setShowEditModal(true);
            };

            const closeEditModal = () => {
                setShowEditModal(false);
                setEditingRoom(null);
            };

            const handleUpdate = async () => {
                if (!editingRoom) return;
                if (!editName.trim() || !editPrice || isNaN(Number(editPrice)) || Number(editPrice) <= 0) {
                    setError("Tên phòng và Giá/giờ không hợp lệ.");
                    return;
                }
                const prev = [...rooms];
                const patch = {
                    id: editingRoom.id,
                    name: editName.trim(),
                    type: editType,
                    price_per_hour: Number(editPrice),
                };
                setRooms(rooms.map(r => String(r.id) === String(editingRoom.id) ? { ...r, ...patch } : r));
                closeEditModal();
                try {
                    await RoomServer.updateRoom(patch);
                    setSuccess("Cập nhật phòng thành công!");
                    setTimeout(() => setSuccess(""), 3000);
                } catch (e) {
                    setRooms(prev);
                    setError("Cập nhật phòng thất bại.");
                }
            };

            const changeStatus = (room) => {
                if (room.status === "occupied") {
                    setError("Không thể thay đổi trạng thái của phòng đang sử dụng.");
                    return;
                }
                const nextStatus = room.status === "available" ? "cleaning" : "available";
                setTargetRoom(room);
                setNewStatus(nextStatus);
                setShowStatusConfirm(true);
            };

            const confirmChangeStatus = async () => {
                if (!targetRoom) return;
                const prev = [...rooms];
                setRooms(rooms.map(r => String(r.id) === String(targetRoom.id) ? { ...r, status: newStatus } : r));
                try {
                    await RoomServer.updateRoomStatus(targetRoom.id, newStatus);
                    setSuccess(`Đã chuyển sang ${newStatus === "cleaning" ? "Đang dọn" : "Trống"}`);
                    setTimeout(() => setSuccess(""), 3000);
                } catch (e) {
                    setRooms(prev);
                    setError("Không thể thay đổi trạng thái.");
                }
                setShowStatusConfirm(false);
                setTargetRoom(null);
            };

            const openRoomDetail = async (room) => {
                if (room.status !== "occupied") {
                    setError("Phòng không đang sử dụng.");
                    return;
                }
                setSelectedRoomDetail(room);
                if (room.current_order_id) {
                    let order = orders.find(o => String(o.orderCode) === String(room.current_order_id));
                    if (!order) {
                        try {
                            order = await new Promise((res, rej) =>
                                google.script.run
                                    .withSuccessHandler((rawData) => res(parseServerJsonPayload(rawData)))
                                    .withFailureHandler(() => {
                                        google.script.run
                                            .withSuccessHandler((fallbackRawData) => res(parseServerJsonPayload(fallbackRawData)))
                                            .withFailureHandler(() => rej(new Error("Không thể lấy order")))
                                            .getOrderByCode(room.current_order_id);
                                    })
                                    .getOrderByCodeJson(room.current_order_id)
                            );
                        } catch (e) {
                            setCurrentOrderDetail(null);
                            setShowOrderDetailModal(true);
                            return;
                        }
                    }
                    if (!order) {
                        setCurrentOrderDetail(null);
                        setShowOrderDetailModal(true);
                        return;
                    }
                    const products = order.products ? (typeof order.products === "string" ? JSON.parse(order.products) : order.products) : [];
                    let staffs = order.staffs
                        ? (typeof order.staffs === "string" ? JSON.parse(order.staffs) : order.staffs)
                        : [];
                    staffs = Array.isArray(staffs) ? staffs : [];
                    const endTime = order.endTime || new Date(Date.now() + 2 * 3600000).toISOString();
                    setCurrentOrderDetail({ ...order, products, staffs, endTime });

                    // ✅ Khôi phục draft nếu đã lưu trước đó
                    const draft = loadOrderDraft(order.orderCode);
                    if (draft && draft.savedAt && (Date.now() - draft.savedAt < 4 * 3600000)) {
                        console.log("📂 Khôi phục draft cho order:", order.orderCode);
                        setTempProducts(draft.tempProducts || products);
                        setTempStaffs(draft.tempStaffs || staffs.map(normalizeStaffTimer));
                        setTempBankPayment(draft.tempBankPayment || order.bankPayment || 0);
                        setTempCashPayment(draft.tempCashPayment || order.cashPayment || 0);
                        setTempNote(draft.tempNote || order.note || "");
                        setIsPausedTime(draft.isPausedTime || false);
                        setPausedTimeMs(draft.pausedTimeMs || 0);
                        setTotalPausedMs(draft.totalPausedMs || 0);
                    } else {
                        const normalizedStaffs = staffs.map(normalizeStaffTimer);
                        setTempProducts(products);
                        setTempStaffs(normalizedStaffs);
                        setTempBankPayment(order.bankPayment || 0);
                        setTempCashPayment(order.cashPayment || 0);
                        setTempNote(order.note || "");
                        setIsPausedTime(false);
                        setPausedTimeMs(0);
                        setTotalPausedMs(0);
                    }
                    setTimeTick(0);
                    setShowOrderDetailModal(true);
                } else {
                    setCurrentOrderDetail(null);
                    setShowOrderDetailModal(true);
                }
            };

            const closeRoomDetail = () => {
                setShowRoomDetail(false);
                setSelectedRoomDetail(null);
                setCurrentOrderDetail(null);
                setShowOrderDetailModal(false);
            };

            const closeOrderDetailModal = (clearDraft = false) => {
                // Lưu draft vào localStorage trước khi đóng (để khôi phục khi mở lại)
                if (currentOrderDetail?.orderCode && !clearDraft) {
                    saveOrderDraft(currentOrderDetail.orderCode, {
                        tempProducts,
                        tempStaffs,
                        tempBankPayment,
                        tempCashPayment,
                        tempNote,
                        isPausedTime,
                        pausedTimeMs,
                        totalPausedMs,
                    });
                }
                setShowOrderDetailModal(false);
                setCurrentOrderDetail(null);
                setTempProducts([]);
                setTempStaffs([]);
                setTempBankPayment(0);
                setTempCashPayment(0);
                setTempNote("");
                setIsPausedTime(false);
                setPausedTimeMs(0);
                setTotalPausedMs(0);
            };

            // Functions for managing products in order detail
            const removeProductFromOrder = (id) => {
                setTempProducts(tempProducts.filter(p => p.id !== id));
            };

            const updateProductQty = (id, qty) => {
                if (qty < 1) return;
                setTempProducts(tempProducts.map(p => p.id === id ? { ...p, quantity: qty } : p));
            };

            const addProductToCurrentOrder = (product) => {
                const existing = tempProducts.findIndex(p => p.id === product.id);
                if (existing >= 0) {
                    const updated = [...tempProducts];
                    updated[existing].quantity = (updated[existing].quantity || 1) + 1;
                    setTempProducts(updated);
                } else {
                    setTempProducts([...tempProducts, { ...product, quantity: 1 }]);
                }
            };

            // Functions for managing staff in order detail
            const setStaffAvailabilityLocal = (staffId, status, currentRoomId = "") => {
                setStaffs(prev => prev.map(staff =>
                    String(staff.id) === String(staffId)
                        ? { ...staff, status, current_room_id: currentRoomId }
                        : staff
                ));
            };

            // Đánh dấu tiếp viên đã rời phòng: ghi endTime cho session cuối, isLeft=true
            // Không xóa khỏi tempStaffs để vẫn hiển thị trong chi tiết thanh toán
            const endStaffSession = (staffId) => {
                const now = new Date().toISOString();
                setTempStaffs(prev => prev.map(s => {
                    if (String(s.id) !== String(staffId)) return s;
                    // Đóng session cuối cùng chưa có endTime
                    const updatedSessions = (s.sessions || []).map((sess, idx, arr) => {
                        if (idx === arr.length - 1 && !sess.endTime) {
                            return { ...sess, endTime: now };
                        }
                        return sess;
                    });
                    return { ...s, sessions: updatedSessions, isLeft: true };
                }));
                // Giải phóng trạng thái tiếp viên trong danh mục
                setStaffAvailabilityLocal(staffId, "available", "");
            };

            // Xóa hẳn tiếp viên khỏi đơn (dùng cho nút × bên cạnh tên)
            const removeStaffFromOrder = (id) => {
                setTempStaffs(prev => prev.filter(s => String(s.id) !== String(id)));
                setStaffAvailabilityLocal(id, "available", "");
            };

            const addStaffToCurrentOrder = (staff) => {
                const now = new Date().toISOString();
                const existingStaff = tempStaffs.find(s => String(s.id) === String(staff.id));
                if (existingStaff) {
                    // Tiếp viên đã có (kể cả đã rời): thêm session mới, bỏ isLeft
                    setTempStaffs(prev => prev.map(s =>
                        String(s.id) === String(staff.id)
                            ? { ...s, sessions: [...(s.sessions || []), { startTime: now, endTime: null }], isLeft: false }
                            : s
                    ));
                } else {
                    // Tiếp viên hoàn toàn mới
                    setTempStaffs(prev => [
                        ...prev,
                        { ...staff, sessions: [{ startTime: now, endTime: null }], isLeft: false }
                    ]);
                }
                setStaffAvailabilityLocal(
                    staff.id,
                    "busy",
                    currentOrderDetail?.roomId || selectedRoomDetail?.id || selectedRoomIdForOrder || ""
                );
            };

            const availableStaffsForOrder = useMemo(() => {
                // Chỉ loại trừ tiếp viên đang trong phòng (isLeft=false hoặc chưa có isLeft)
                const busyIds = new Set(
                    tempStaffs.filter(s => !s.isLeft).map(s => String(s.id))
                );
                return staffs.filter(s =>
                    String(s.status || "available").toLowerCase() === "available" &&
                    !busyIds.has(String(s.id))
                );
            }, [staffs, tempStaffs]);

            // Toggle pause time
            const togglePauseTime = () => {
                if (isPausedTime) {
                    // Tiếp tục: cộng thêm thời gian đã tạm dừng vào totalPausedMs
                    const newTotalPaused = totalPausedMs + (Date.now() - pausedTimeMs);
                    setTotalPausedMs(newTotalPaused);
                    setIsPausedTime(false);
                } else {
                    // Tạm dừng: lưu thời gian hiện tại
                    setPausedTimeMs(Date.now());
                    setIsPausedTime(true);
                }
            };

            const toggleStaffPause = (staffId) => {
                const now = Date.now();
                setTempStaffs(prev => prev.map((s) => {
                    if (String(s.id) !== String(staffId)) return s;
                    const currentPaused = Boolean(s.isPaused);
                    const pauseStartedAtMs = s.pauseStartedAt ? new Date(s.pauseStartedAt).getTime() : now;
                    if (currentPaused) {
                        return {
                            ...s,
                            isPaused: false,
                            pauseStartedAt: null,
                            totalPausedMs: Number(s.totalPausedMs || 0) + Math.max(0, now - pauseStartedAtMs),
                        };
                    }
                    return {
                        ...s,
                        isPaused: true,
                        pauseStartedAt: new Date(now).toISOString(),
                    };
                }));
            };

            // Calculate estimated duration from startTime to endTime
            const estimatedCalc = useMemo(() => {
                if (!currentOrderDetail?.startTime) return { estimatedDuration: "00:00", estimatedRoomTotal: 0 };

                const startTime = new Date(currentOrderDetail.startTime);
                let endTime;
                if (isPausedTime) {
                    // Nếu đang tạm dừng, sử dụng thời gian khi tạm dừng
                    endTime = new Date(pausedTimeMs);
                } else {
                    // Nếu đang chạy, luôn dùng thời gian hiện tại
                    endTime = new Date();
                }

                let durationMs = endTime.getTime() - startTime.getTime() - totalPausedMs;
                if (durationMs < 0) durationMs = 0;

                const durationMinutes = durationMs / (1000 * 60);
                const estimatedDuration = formatDurationClock(durationMs);

                // Fix: Check nếu roomPriceById là Map trước khi gọi .get()
                const roomPrice = (roomPriceById && typeof roomPriceById.get === 'function') ? (roomPriceById.get(String(currentOrderDetail.roomId)) || 0) : 0;
                const rawRoomTotal = (roomPrice / 60) * durationMinutes;
                const estimatedRoomTotal = Math.round(rawRoomTotal / 1000) * 1000;

                return { estimatedDuration, estimatedRoomTotal };
            }, [currentOrderDetail?.startTime, currentOrderDetail?.endTime, roomPriceById, isPausedTime, pausedTimeMs, totalPausedMs, timeTick]);

            // Update time every second when modal is open and not paused
            useEffect(() => {
                if (!showOrderDetailModal || currentOrderDetail?.paymentStatus === "Đã thanh toán") return;

                const interval = setInterval(() => {
                    setTimeTick(t => t + 1);
                }, 15000);

                return () => clearInterval(interval);
            }, [showOrderDetailModal, currentOrderDetail?.paymentStatus]);

            // Calculate totals for order detail
            const orderDetailCalc = useMemo(() => {
                const productTotal = tempProducts.reduce((sum, p) => sum + (Number(p.price) * (p.quantity || 1)), 0);

                let calcEndTime = new Date();
                if (currentOrderDetail?.paymentStatus === "Đã thanh toán") {
                    calcEndTime = new Date(currentOrderDetail.endTime || new Date());
                } else if (isPausedTime) {
                    calcEndTime = new Date(pausedTimeMs);
                }

                // Tính riêng cho từng tiếp viên với sessions (có tiền riêng từng đợt)
                const pricePerMin = (pricePerHour) => (Number(pricePerHour) || 0) / 60;
                const staffBreakdown = tempStaffs.map(s => {
                    const sessions = s.sessions || [];
                    let totalStaffDurationMs = 0;
                    let sessionsDisplay = [];
                    let sessionsData = []; // { display, durationMs, money } cho từng session

                    if (sessions.length === 0 && s.startTime) {
                        const startTime = new Date(s.startTime).getTime();
                        const endTime = s.endTime ? new Date(s.endTime).getTime() : calcEndTime.getTime();
                        const durationMs = Math.max(0, endTime - startTime);
                        totalStaffDurationMs = durationMs;
                        const startStr = new Date(s.startTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                        const endStr = s.endTime ? new Date(s.endTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) : '—';
                        const display = `${startStr} - ${endStr}`;
                        sessionsDisplay.push(display);
                        sessionsData.push({ display, durationMs, money: Math.round(pricePerMin(s.price_per_hour) * (durationMs / 60000) / 1000) * 1000 });
                    } else {
                        sessions.forEach(session => {
                            if (!session || !session.startTime) return;
                            const startTime = new Date(session.startTime).getTime();
                            const endTime = session.endTime ? new Date(session.endTime).getTime() : calcEndTime.getTime();
                            const durationMs = Math.max(0, endTime - startTime);
                            totalStaffDurationMs += durationMs;
                            const startStr = new Date(session.startTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                            const endStr = session.endTime ? new Date(session.endTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) : '—';
                            const display = `${startStr} - ${endStr}`;
                            sessionsDisplay.push(display);
                            sessionsData.push({ display, durationMs, money: Math.round(pricePerMin(s.price_per_hour) * (durationMs / 60000) / 1000) * 1000 });
                        });
                    }

                    const durationMinutes = totalStaffDurationMs / (1000 * 60);
                    const durationHours = durationMinutes / 60;
                    const money = sessionsData.reduce((sum, sd) => sum + sd.money, 0);
                    const hh = Math.floor(durationHours);
                    const mm = Math.floor(durationMinutes % 60);
                    const durationLabel = `${hh}h ${mm < 10 ? '0' : ''}${mm}m`;

                    return { ...s, durationMs: totalStaffDurationMs, durationMinutes, durationHours, durationLabel, money, sessions, sessionsDisplay, sessionsData };
                });

                const staffTotal = staffBreakdown.reduce((sum, s) => sum + s.money, 0);

                const roomTotal = currentOrderDetail?.paymentStatus === "Đã thanh toán"
                    ? (currentOrderDetail?.roomTotal || 0)
                    : estimatedCalc.estimatedRoomTotal;

                const serviceTotal = productTotal + staffTotal;
                const subtotal = serviceTotal + roomTotal;
                const rawGrandTotal = Math.max(0, subtotal + (currentOrderDetail?.adjustment || 0));
                const grandTotal = Math.round(rawGrandTotal / 1000) * 1000;

                return { serviceTotal, roomTotal, grandTotal, prodTotal: productTotal, staffTotal, staffBreakdown };
            }, [tempProducts, tempStaffs, currentOrderDetail, estimatedCalc, isPausedTime, pausedTimeMs, timeTick]);

            // Save order changes
            const saveOrderChanges = async () => {
                if (!currentOrderDetail) return;

                const updatedOrder = {
                    ...currentOrderDetail,
                    products: tempProducts,
                    staffs: tempStaffs,
                    bankPayment: tempBankPayment,
                    cashPayment: tempCashPayment,
                    note: tempNote,
                    grandTotal: orderDetailCalc.grandTotal
                };

                try {
                    await new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            .updateOrderWithStaffSync(currentOrderDetail.orderCode, updatedOrder);
                    });

                    // Cập nhật local state ngay thay vì reload
                    const updatedOrders = orders.map(o => o.orderCode === currentOrderDetail.orderCode ? updatedOrder : o);
                    setOrders(updatedOrders);
                    setCurrentOrderDetail(updatedOrder);

                    // Lưu vào cache
                    saveUnifiedCache({
                        rooms,
                        orders: updatedOrders,
                        products,
                        staffs
                    });

                    setSuccess("Đã lưu thay đổi vào đơn hàng");
                    setTimeout(() => setSuccess(""), 2500);
                    clearOrderDraft(currentOrderDetail.orderCode);
                    closeOrderDetailModal(true); // clearDraft=true: không ghi đè draft mới
                } catch (e) {
                    setError("Lưu thay đổi thất bại");
                }
            };

            // Complete payment
            const completePayment = async (paymentOverride = null, opts = {}) => {
                if (!currentOrderDetail) return;
                const { closeQrAfter = false } = opts;

                if (currentOrderDetail?.paymentStatus === "Đã thanh toán") {
                    setError("Đơn hàng này đã được chốt thanh toán rồi!");
                    return;
                }

                const bankPayment = paymentOverride?.bankPayment ?? tempBankPayment;
                const cashPayment = paymentOverride?.cashPayment ?? tempCashPayment;
                const totalPaid = Number(bankPayment || 0) + Number(cashPayment || 0);
                if (totalPaid < orderDetailCalc.grandTotal) {
                    setError(`Số tiền thanh toán chưa đủ! Còn thiếu ${(orderDetailCalc.grandTotal - totalPaid).toLocaleString()}đ`);
                    return;
                }

                try {
                    const updatedOrder = {
                        ...currentOrderDetail,
                        products: tempProducts,
                        staffs: tempStaffs,
                        bankPayment,
                        cashPayment,
                        note: tempNote,
                        grandTotal: orderDetailCalc.grandTotal
                    };

                    await new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            .updateOrderWithStaffSync(currentOrderDetail.orderCode, updatedOrder);
                    });

                    await new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            .markOrderAsPaid(currentOrderDetail.orderCode, {
                                bankPayment,
                                cashPayment,
                                paymentStatus: "Đã thanh toán"
                            });
                    });

                    setSuccess(`Hoàn tất thanh toán đơn ${currentOrderDetail.orderCode}`);
                    setTimeout(() => setSuccess(""), 3000);

                    // Cập nhật local state ngay thay vì reload
                    const paidOrder = {
                        ...currentOrderDetail,
                        endTime: new Date().toISOString(),
                        paymentStatus: "Đã thanh toán",
                        bankPayment,
                        cashPayment
                    };
                    const updatedOrders = orders.map(o => o.orderCode === currentOrderDetail.orderCode ? paidOrder : o);
                    setOrders(updatedOrders);
                    setCurrentOrderDetail(paidOrder);

                    // Lưu vào cache
                    saveUnifiedCache({
                        rooms,
                        orders: updatedOrders,
                        products,
                        staffs
                    });

                    setTempBankPayment(bankPayment);
                    setTempCashPayment(cashPayment);
                    clearOrderDraft(currentOrderDetail.orderCode); // xoá draft sau khi thanh toán xong
                    if (closeQrAfter) setShowQrModal(false);
                    closeOrderDetailModal(true); // clearDraft=true: không tạo draft mới
                } catch (e) {
                    setError("Thanh toán thất bại");
                }
            };

            // Delete order
            const deleteOrder = async () => {
                if (!currentOrderDetail) return;

                if (window.confirm(`Bạn có chắc chắn muốn xoá đơn hàng ${currentOrderDetail.orderCode}?`)) {
                    try {
                        await google.script.run
                            .withSuccessHandler(() => { })
                            .withFailureHandler(() => { })
                            .deleteOrder(currentOrderDetail.orderCode);

                        setSuccess(`Đã xoá đơn hàng ${currentOrderDetail.orderCode}`);
                        setTimeout(() => setSuccess(""), 3000);

                        // Cập nhật local state ngay thay vì reload
                        const updatedOrders = orders.filter(o => o.orderCode !== currentOrderDetail.orderCode);
                        const updatedRooms = rooms.map(r =>
                            String(r.current_order_id) === String(currentOrderDetail.orderCode)
                                ? { ...r, status: 'available', start_time: null, current_order_id: '' }
                                : r
                        );
                        setOrders(updatedOrders);
                        setRooms(updatedRooms);

                        // Lưu vào cache
                        saveUnifiedCache({
                            rooms: updatedRooms,
                            orders: updatedOrders,
                            products,
                            staffs
                        });

                        closeOrderDetailModal();
                    } catch (e) {
                        setError("Xoá đơn hàng thất bại: " + (e.message || e));
                    }
                }
            };

            const filteredRooms = useMemo(() => {
                let result = [...rooms];
                if (statusFilter !== "all") result = result.filter(r => r.status === statusFilter);
                if (typeFilter !== "all") result = result.filter(r => r.type === typeFilter);
                return result;
            }, [rooms, statusFilter, typeFilter]);

            const roomPriceById = useMemo(() => {
                const map = new Map();
                rooms.forEach((r) => map.set(String(r.id), Number(r.price_per_hour) || 0));
                return map;
            }, [rooms]);

            const orderByCodeMap = useMemo(() => {
                const map = new Map();
                orders.forEach((o) => {
                    if (!o) return;
                    if (o.orderCode) map.set(String(o.orderCode), o);
                    if (o.code) map.set(String(o.code), o);
                });
                return map;
            }, [orders]);

            // ──── Completed Orders Table Logic ────
            const completedOrders = useMemo(() => {
                // Chỉ hiển thị đơn Đã thanh toán
                return orders.filter(o => o && o.orderCode && o.paymentStatus === "Đã thanh toán");
            }, [orders]);

            const filteredCompletedOrders = useMemo(() => {
                if (!searchQuery.trim()) return completedOrders;
                const q = searchQuery.toLowerCase();
                return completedOrders.filter(o =>
                    o.orderCode?.toLowerCase().includes(q) ||
                    o.roomName?.toLowerCase().includes(q) ||
                    String(o.roomId).includes(q)
                );
            }, [completedOrders, searchQuery]);

            const sortedCompletedOrders = useMemo(() => {
                return [...filteredCompletedOrders].sort((a, b) => {
                    const getOrderTime = (o) => {
                        const t = o?.endTime || o?.updatedAt || o?.createdAt || o?.startTime;
                        const ms = t ? new Date(t).getTime() : 0;
                        return Number.isFinite(ms) ? ms : 0;
                    };
                    return getOrderTime(b) - getOrderTime(a);
                });
            }, [filteredCompletedOrders]);

            const totalPages = useMemo(
                () => Math.max(1, Math.ceil(sortedCompletedOrders.length / PAGE_SIZE)),
                [sortedCompletedOrders.length]
            );

            const paginatedCompletedOrders = useMemo(() => {
                const start = (currentPage - 1) * PAGE_SIZE;
                return sortedCompletedOrders.slice(start, start + PAGE_SIZE);
            }, [sortedCompletedOrders, currentPage]);

            useEffect(() => {
                setCurrentPage(1);
            }, [searchQuery, orders.length]);

            useEffect(() => {
                if (currentPage > totalPages) setCurrentPage(totalPages);
            }, [currentPage, totalPages]);

            // Auto-dismiss notification
            useEffect(() => {
                if (notification && notification.duration) {
                    const timer = setTimeout(() => {
                        setNotification(null);
                    }, notification.duration);
                    return () => clearTimeout(timer);
                }
            }, [notification]);

            // Update elapsed time for real-time calculation
            useEffect(() => {
                if (!showOrderCompletedModal || selectedOrder?.paymentStatus === "Đã thanh toán") return;

                const interval = setInterval(() => {
                    setElapsedTick(t => t + 1);
                }, 1000);
                return () => clearInterval(interval);
            }, [showOrderCompletedModal, selectedOrder?.paymentStatus]);

            const openOrderCompletedDetail = (order) => {
                setSelectedOrder(order);
                const products = order.products ? (typeof order.products === "string" ? JSON.parse(order.products) : order.products) : [];
                const staffs = order.staffs ? (typeof order.staffs === "string" ? JSON.parse(order.staffs) : order.staffs) : [];
                setTempProducts(products);
                setTempStaffs(staffs);
                setTempBankPayment(order.bankPayment || 0);
                setTempCashPayment(order.cashPayment || 0);
                setTempNote(order.note || "");
                setShowOrderCompletedModal(true);
            };

            const closeOrderCompletedModal = () => {
                setShowOrderCompletedModal(false);
                setSelectedOrder(null);
            };

            // Tính ước tính duration và tiền phòng khi chưa thanh toán
            const estimatedCalcForCompleted = useMemo(() => {
                if (!selectedOrder?.startTime) return { estimatedDuration: 0, estimatedRoomTotal: 0 };

                const startTime = new Date(selectedOrder.startTime);
                const now = new Date();
                const durationMs = now.getTime() - startTime.getTime();
                const durationMinutes = durationMs / (1000 * 60);
                const durationHours = durationMinutes / 60;
                const estimatedDuration = durationHours.toFixed(2);

                // Lấy room price từ rooms list
                const room = rooms.find(r => String(r.id) === String(selectedOrder.roomId));
                const roomPrice = room ? Number(room.price_per_hour) || 0 : 0;
                const rawRoomTotal = (roomPrice / 60) * durationMinutes;
                const estimatedRoomTotal = Math.round(rawRoomTotal / 1000) * 1000;

                return { estimatedDuration, estimatedRoomTotal };
            }, [selectedOrder?.startTime, rooms, elapsedTick]);

            // Tính tổng tiền realtime trong modal
            const calcForCompleted = useMemo(() => {
                // Tính tiền hàng hoá + tiếp viên
                const productTotal = tempProducts.reduce((sum, p) => sum + (Number(p.price) * (p.quantity || 1)), 0);
                const staffTotal = tempStaffs.reduce((sum, s) => sum + (Number(s.price_per_hour) || 0), 0);

                // Nếu đã thanh toán, dùng giá trị thực từ order; nếu chưa, dùng ước tính
                const roomTotal = selectedOrder?.paymentStatus === "Đã thanh toán"
                    ? (selectedOrder?.roomTotal || 0)
                    : estimatedCalcForCompleted.estimatedRoomTotal;

                const serviceTotal = productTotal + staffTotal;
                const subtotal = serviceTotal + roomTotal;
                const grandTotal = Math.max(0, subtotal + (selectedOrder?.adjustment || 0));

                return { serviceTotal, roomTotal, grandTotal, prodTotal: productTotal, staffTotal };
            }, [tempProducts, tempStaffs, selectedOrder, estimatedCalcForCompleted]);

            // Xoá order từ completed table
            const deleteOrderFromCompleted = async () => {
                if (!selectedOrder) return;
                if (!window.confirm(`Bạn có chắc muốn XOÁ HẲN order ${selectedOrder.orderCode}? Hành động này không thể hoàn tác!`)) return;

                try {
                    await new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .deleteOrder(selectedOrder.orderCode);
                    });
                    setSuccess(`Đã xoá order ${selectedOrder.orderCode}`);
                    setTimeout(() => setSuccess(""), 2500);
                    const updatedOrders = orders.filter(o => o.orderCode !== selectedOrder.orderCode);
                    setOrders(updatedOrders);
                    saveUnifiedCache({ rooms, orders: updatedOrders, products, staffs });
                    closeOrderCompletedModal();
                } catch (e) {
                    setError("Xoá order thất bại: " + (e.message || e));
                }
            };

            // ──── Order Modal Functions ────
            const openOrderModal = async (roomId) => {
                setSelectedRoomIdForOrder(roomId);
                resetOrderForm();

                // Nếu products/staffs chưa có, load từ backend
                if (!products || products.length === 0 || !staffs || staffs.length === 0) {
                    try {
                        const [prodData, staffData] = await Promise.all([
                            RoomServer.getProducts().catch(() => []),
                            RoomServer.getStaffs().catch(() => [])
                        ]);
                        if (Array.isArray(prodData)) setProducts(prodData);
                        if (Array.isArray(staffData)) setStaffs(staffData);
                    } catch (e) {
                        console.warn("Load products/staffs failed:", e);
                    }
                }

                setShowOrderModal(true);
            };

            const closeOrderModal = () => {
                setShowOrderModal(false);
                resetOrderForm();
            };

            const resetOrderForm = () => {
                setNote("");
                setOrderItems([]);
                setPickProductId("");
                setPickQty(1);
                setOrderStaffs([]);
                setPickStaffId("");
                setAdjustment(0);
            };

            const selectedRoom = useMemo(() => rooms.find(r => String(r.id) === selectedRoomIdForOrder) || null, [rooms, selectedRoomIdForOrder]);

            const orderCalc = useMemo(() => {
                const productTotal = orderItems.reduce((s, i) => s + i.price * i.quantity, 0);
                const staffTotal = orderStaffs.reduce((s, i) => s + (Number(i.price_per_hour) || 0), 0);
                const serviceTotal = productTotal + staffTotal;
                const rawGrandTotal = Math.max(0, serviceTotal + Number(adjustment || 0));
                const grandTotal = Math.round(rawGrandTotal / 1000) * 1000;
                return { productTotal, staffTotal, serviceTotal, grandTotal, discount: 0 };
            }, [orderItems, orderStaffs, adjustment]);

            const addProduct = useCallback(() => {
                if (!pickProductId) return;
                const prod = products.find(p => String(p.id) === String(pickProductId));
                if (!prod) return;
                setOrderItems(prev => {
                    const idx = prev.findIndex(i => i.id === prod.id);
                    if (idx >= 0) {
                        const next = [...prev];
                        next[idx] = { ...next[idx], quantity: next[idx].quantity + Number(pickQty) };
                        return next;
                    }
                    return [...prev, { ...prod, quantity: Number(pickQty) }];
                });
                setPickProductId("");
                setPickQty(1);
            }, [pickProductId, pickQty, products]);

            const removeItem = id => setOrderItems(prev => prev.filter(i => i.id !== id));
            const updateItemQty = (id, q) => {
                const qty = Number(q);
                if (qty < 1) return;
                setOrderItems(prev => prev.map(i => i.id === id ? { ...i, quantity: qty } : i));
            };

            const addStaff = useCallback(() => {
                if (!pickStaffId) return;
                const staff = staffs.find(s => String(s.id) === String(pickStaffId));
                if (!staff) return;
                setOrderStaffs(prev => {
                    if (prev.find(s => s.id === staff.id)) return prev;
                    return [...prev, { ...staff, startTime: orderStartTime.toISOString(), isPaused: false, pauseStartedAt: null, totalPausedMs: 0 }];
                });
                setPickStaffId("");
            }, [pickStaffId, staffs, orderStartTime]);

            const removeStaff = id => setOrderStaffs(prev => prev.filter(s => s.id !== id));

            const handleCreateOrder = async () => {
                if (isSubmittingOrder) return;
                if (!selectedRoomIdForOrder) {
                    setError("Vui lòng chọn phòng");
                    return;
                }

                const orderData = {
                    roomId: selectedRoomIdForOrder,
                    roomName: selectedRoom?.name || "",
                    customerName: "",
                    startTime: orderStartTime.toISOString(),
                    endTime: "",
                    duration: "",
                    serviceTotal: orderCalc.serviceTotal,
                    roomTotal: 0,
                    products: orderItems.map(({ id, name, quantity, price }) => ({ id, name, quantity, price })),
                    staffs: orderStaffs.map(({ id, name, price_per_hour, startTime, isPaused, pauseStartedAt, totalPausedMs }) => ({
                        id,
                        name,
                        price_per_hour,
                        startTime: startTime || orderStartTime.toISOString(),
                        isPaused: Boolean(isPaused),
                        pauseStartedAt: pauseStartedAt || null,
                        totalPausedMs: Number(totalPausedMs || 0),
                    })),
                    grandTotal: orderCalc.grandTotal,
                    discountCustomer: 0,
                    adjustment: Number(adjustment || 0),
                    cashPayment: 0,
                    bankPayment: 0,
                    paymentStatus: "Chưa thanh toán",
                    note: note.trim(),

                setIsSubmittingOrder(true);
                try {
                    const res = await new Promise((resolve, reject) =>
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            .createOrder(orderData)

                    if (res.success) {

                        const newOrder = {
                            ...orderData,
                            orderCode: res.orderCode,
                            startTime: orderData.startTime,
                            endTime: "",
                            paymentStatus: "Chưa thanh toán"

                        const updatedOrders = [newOrder, ...orders];

                        // Dùng room data từ backend thay vì optimistic
                        const updatedRooms = rooms.map(r =>
                            String(r.id) === String(selectedRoomIdForOrder)
                                ? res.room // Trả từ backend, update ngay!
                                : r

                        setOrders(updatedOrders);
                        setRooms(updatedRooms);

                        // Lưu vào cache ngay

                            rooms: updatedRooms,
                            orders: updatedOrders,

                            staffs
                        });

                    payBlock += R("Chuyển khoản:", f(bankPay) + "đ");
                    payBlock += R("Tiền mặt:", f(cashPay) + "đ");
                    if (change > 0) payBlock += R("Tiền thừa:", f(change) + "đ", true);
                }

</table>

<table>
  <tr><td colspan="2" class="bold">🍺 Hàng hoá / Đồ uống</td></tr>
  ${prodRows || "<tr><td colspan='2' class='indent' style='color:#aaa'>Không có</td></tr>"}
  <tr><td class="bold">Tổng HH:</td><td class="right bold">${f(prodTotal)}đ</td></tr>
</table>
<div class="sep"></div>
<table>
  <tr><td colspan="2" class="bold">👥 Tiếp viên</td></tr>
  ${staffRows || "<tr><td colspan='2' class='indent' style='color:#aaa'>Không có</td></tr>"}
</table>
<div class="sep"></div>
<table>
  ${R("🏠 Tiền phòng:", f(roomTotal) + "đ")}

  ${(order.adjustment && order.adjustment !== 0) ? R("Điều chỉnh:", f(order.adjustment) + "đ") : ""}
  <tr><td colspan="2" class="ctr big">TỔNG: ${f(grandTotal)}đ</td></tr>
  ${payBlock}
</table>
${change > 0 ? "" : ""}
<div class="status">${isPaid ? "✅ ĐÃ THANH TOÁN" : "⏳ CHƯA THANH TOÁN"}</div>
<div class="sep" style="margin-top:8px"></div>
<div class="ctr" style="font-size:11px;color:#888">Cảm ơn quý khách!<br>Hẹn gặp lại 🎤</div>
</body></html>`;

                const pw = window.open("", "_blank", "width=370,height=720");
                if (pw) {
                    pw.document.write(html);
                    pw.document.close();
                    pw.focus();
                    setTimeout(() => pw.print(), 400);
                }

            // ─────────────────────────────────────────────────────────────
            // QR CHUYỂN KHOẢN (dùng api.qrserver.com — free, không cần key)
            // Format: BANK_ID|ACCOUNT|AMOUNT|CONTENT
            // ─────────────────────────────────────────────────────────────
            const QR_BANK_ID = "MB";          // Mã ngân hàng (MBBank, vietcombank, techcombank...)
            const QR_ACCOUNT = "0123456789";  // Số tài khoản của quán
            const QR_BANK_NAME = "MB Bank";     // Tên hiển thị

            const buildQrUrl = (amount, content) => {
                // Dùng VietQR API (miễn phí, chuẩn NAPAS)
                const encoded = encodeURIComponent(content || "Thanh toan karaoke");
                return `https://img.vietqr.io/image/${QR_BANK_ID}-${QR_ACCOUNT}-compact2.png?amount=${amount}&addInfo=${encoded}&accountName=QUAN+KARAOKE`;

            const Icon = window.Icon;

            const btnNeutral = `${btnBase} border border-slate-300 bg-white text-slate-700 hover:bg-slate-100`;

            const btnDanger = `${btnBase} bg-rose-600 text-white hover:bg-rose-700`;

            return (
                <div className="w-full min-h-screen bg-white flex flex-col overflow-x-hidden">
                    <div className="flex-1 flex flex-col">

                                <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden flex flex-col h-full">
