                                <div className="p-6 space-y-3">
                                    {availableStaffsForOrder.length === 0 ? (
                                        <div className="text-center py-8 text-slate-400">Tất cả tiếp viên đã được thêm</div>
                                    ) : (
                                        availableStaffsForOrder.map(staff => (
                                            <button
                                                key={staff.id}
                                                onClick={() => {
                                                    addStaffToCurrentOrder(staff);
                                                    setShowAddStaffToOrderModal(false);
                                                }}
                                                className="w-full text-left p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors"
                                            >
                                                <div className="font-semibold text-slate-800">{staff.name}</div>
                                                <div className="text-sm text-slate-500 mt-1">{fmt(staff.price_per_hour)}đ/giờ</div>
                                            </button>
                                        ))
                                    )}
                                </div>
                                <div className="border-t px-6 py-4 bg-slate-50">
                                    <button
                                        onClick={() => setShowAddStaffToOrderModal(false)}
                                        className="w-full py-3 font-semibold bg-slate-300 hover:bg-slate-400 text-slate-800 rounded-2xl"
                                    >
                                        Đóng
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */}
                    {/* COMPLETED ORDER DETAIL MODAL */}
                    {/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */}
                    {showOrderCompletedModal && selectedOrder && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-2 md:p-4">
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-2xl w-full max-w-2xl max-h-[95vh] overflow-hidden flex flex-col">

                                {/* Header */}
                                <div className="px-6 py-4 border-b flex items-start justify-between bg-gradient-to-r from-slate-800 to-slate-700">
                                    <div>
                                        <div className="flex items-center gap-2 mb-0.5">
                                            <h2 className="text-xl font-bold text-white">{selectedOrder.orderCode}</h2>
                                            {selectedOrder.paymentStatus === "Đã thanh toán"
                                                ? <span className="text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-medium">✅ Đã thanh toán</span>
                                                : <span className="text-xs bg-amber-400 text-slate-900 px-2 py-0.5 rounded-full font-medium">⏳ Chưa thanh toán</span>
                                            }
                                        </div>
                                        <p className="text-slate-300 text-sm">{rooms.find(r => String(r.id) === String(selectedOrder.roomId))?.name || selectedOrder.roomName || `Phòng ${selectedOrder.roomId}`}</p>
                                    </div>
                                    <button onClick={closeOrderCompletedModal} className="text-3xl leading-none text-white/60 hover:text-white mt-1">×</button>
                                </div>

                                {/* Body */}
                                <div className="flex-1 overflow-auto">
                                    {/* Thời gian */}
                                    <div className="grid grid-cols-2 gap-px bg-slate-100">
                                        <div className="bg-white px-5 py-3">
                                            <div className="text-xs text-slate-400 mb-0.5">Bắt đầu</div>
                                            <div className="text-sm font-semibold text-slate-800">{selectedOrder?.startTime ? new Date(selectedOrder.startTime).toLocaleString('vi-VN') : '—'}</div>
                                        </div>
                                        <div className="bg-white px-5 py-3">
                                            <div className="text-xs text-slate-400 mb-0.5">Kết thúc</div>
                                            <div className="text-sm font-semibold text-slate-800">{selectedOrder?.endTime ? new Date(selectedOrder.endTime).toLocaleString('vi-VN') : '—'}</div>
                                        </div>
                                    </div>

                                    {/* Hàng hoá */}
                                    {tempProducts.length > 0 && (
                                        <div className="px-5 py-4 border-b">
                                            <div className="text-sm font-semibold text-slate-600 mb-2">🛒 Hàng hoá</div>
                                            <div className="space-y-1.5">
                                                {tempProducts.map(item => (
                                                    <div key={item.id} className="flex justify-between items-center bg-slate-50 rounded-xl px-3 py-2">
                                                        <div>
                                                            <span className="font-medium text-slate-800 text-sm">{item.name}</span>
                                                            <span className="text-slate-400 text-xs ml-2">× {item.quantity}</span>
                                                        </div>
                                                        <span className="text-sm font-semibold text-slate-700">{(Number(item.price) * (item.quantity || 1)).toLocaleString()}đ</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Tiếp viên + sessions (tính tiền riêng từng đợt) */}
                                    {tempStaffs.length > 0 && (() => {
                                        const getSessionsData = (s) => {
                                            const sessions = s.sessions || [];
                                            const ppm = (Number(s.price_per_hour) || 0) / 60;
                                            const fallbackEnd = selectedOrder.endTime || new Date().toISOString();
                                            if (sessions.length === 0 && s.startTime) {
                                                const endT = s.endTime || fallbackEnd;
                                                const durationMs = Math.max(0, new Date(endT) - new Date(s.startTime));
                                                const money = Math.round(ppm * (durationMs / 60000) / 1000) * 1000;
                                                const startStr = new Date(s.startTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                                const endStr = new Date(endT).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                                return [{ display: startStr + ' - ' + endStr, money }];
                                            }
                                            return sessions.map(ss => {
                                                if (!ss?.startTime) return null;
                                                const endT = ss.endTime || fallbackEnd;
                                                const durationMs = Math.max(0, new Date(endT) - new Date(ss.startTime));
                                                const money = Math.round(ppm * (durationMs / 60000) / 1000) * 1000;
                                                const startStr = new Date(ss.startTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                                const endStr = new Date(endT).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                                return { display: startStr + ' - ' + endStr, money };
                                            }).filter(Boolean);
                                        };
                                        return (
                                            <div className="px-5 py-4 border-b">
                                                <div className="text-sm font-semibold text-slate-600 mb-2">👥 Tiếp viên</div>
                                                <div className="space-y-1.5">
                                                    {tempStaffs.map(s => {
                                                        const sData = getSessionsData(s);
                                                        return sData.map((sd, idx) => (
                                                            <div key={s.id + '-' + idx} className="flex justify-between items-center bg-slate-50 rounded-xl px-3 py-2">
                                                                <div>
                                                                    <div className="font-medium text-slate-800 text-sm">{s.name}</div>
                                                                    <div className="text-xs text-slate-400 font-mono">{sd.display}</div>
                                                                </div>
                                                                <span className="text-sm font-semibold text-slate-700">{sd.money.toLocaleString()}đ</span>
                                                            </div>
                                                        ));
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })()}

                                    {/* Tổng kết */}
                                    <div className="px-5 py-4 bg-slate-50 border-b space-y-2">
                                        <div className="flex justify-between text-sm text-slate-600">
                                            <span>🏠 Tiền phòng ({selectedOrder?.duration || '—'}h)</span>
                                            <span className="font-semibold">{(selectedOrder?.roomTotal || calcForCompleted.roomTotal || 0).toLocaleString()}đ</span>
                                        </div>
                                        <div className="flex justify-between text-sm text-slate-600">
                                            <span>🛒 Tổng hàng hoá</span>
                                            <span className="font-semibold">{calcForCompleted.prodTotal.toLocaleString()}đ</span>
                                        </div>
                                        <div className="flex justify-between text-sm text-slate-600">
                                            <span>👥 Tổng tiếp viên</span>
                                            <span className="font-semibold">{calcForCompleted.staffTotal.toLocaleString()}đ</span>
                                        </div>

                                        <div className="flex justify-between text-lg font-bold border-t pt-2 mt-1">
                                            <span>Tổng thanh toán</span>
                                            <span className="text-emerald-600">{calcForCompleted.grandTotal.toLocaleString()}đ</span>
                                        </div>
                                    </div>

                                    {/* Phương thức thanh toán */}
                                    <div className="px-5 py-4 grid grid-cols-2 gap-3">
                                        <div className="bg-blue-50 border border-blue-100 rounded-2xl px-4 py-3">
                                            <div className="text-xs text-blue-400 mb-1">💳 Chuyển khoản</div>
                                            <div className="font-bold text-blue-700">{Number(selectedOrder?.bankPayment || 0).toLocaleString()}đ</div>
                                        </div>
                                        <div className="bg-emerald-50 border border-emerald-100 rounded-2xl px-4 py-3">
                                            <div className="text-xs text-emerald-400 mb-1">💵 Tiền mặt</div>
                                            <div className="font-bold text-emerald-700">{Number(selectedOrder?.cashPayment || 0).toLocaleString()}đ</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Footer */}
                                <div className="border-t p-4 flex flex-wrap gap-3 bg-slate-50">
                                    <button
                                        onClick={() => setShowReopenConfirm(true)}
                                        className="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-2xl transition-colors text-sm"
                                    >
                                        ↩ Đẩy về phòng
                                    </button>
                                    <button
                                        onClick={() => printInvoice(selectedOrder, calcForCompleted)}
                                        className="flex-1 py-3 border border-slate-300 hover:bg-slate-100 font-medium rounded-2xl text-sm"
                                    >
                                        🖨️ In hoá đơn
                                    </button>
                                    <button
                                        onClick={deleteOrderFromCompleted}
                                        className="py-3 px-5 bg-rose-600 hover:bg-rose-700 text-white font-semibold rounded-2xl transition-colors text-sm"
                                    >
                                        🗑 Xoá
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Reopen Confirm Popup */}
                    {showReopenConfirm && selectedOrder && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[70] p-4">
                            <div className="bg-white rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl animate-in fade-in zoom-in-95 duration-200 border-2 border-amber-200">
                                <div className="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                    ↩
                                </div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Đẩy về lại phòng?</h3>
                                <p className="text-slate-500 mb-6 text-sm">
                                    Đơn <b>{selectedOrder.orderCode}</b> sẽ bị Huỷ Thanh Toán và chuyển về lại trạng thái đang hoạt động.
                                </p>
                                <div className="flex gap-3">
                                    <button
                                        onClick={() => setShowReopenConfirm(false)}
                                        className="flex-1 py-3 border border-slate-300 font-medium rounded-xl hover:bg-slate-50 text-slate-700 transition duration-200"
                                    >
                                        Huỷ bỏ
                                    </button>
                                    <button
                                        onClick={async () => {
                                            setShowReopenConfirm(false);
                                            try {
                                                const targetRoom = rooms.find(r => String(r.id) === String(selectedOrder.roomId));
                                                if (targetRoom && targetRoom.status === 'occupied' && targetRoom.current_order_id && String(targetRoom.current_order_id) !== String(selectedOrder.orderCode)) {
                                                    window.alert(`Phòng này đang bận bởi khách khác (${targetRoom.current_order_id})! Không thể đẩy phòng.`);
                                                    return;
                                                }
                                                const reopenedOrder = {
                                                    ...selectedOrder,
                                                    paymentStatus: 'Chưa thanh toán',
                                                    endTime: "",
                                                    duration: "",
                                                    roomTotal: 0,
                                                };
                                                if (!RoomServer.isLocal) {
                                                    await new Promise((res, rej) =>
                                                        google.script.run
                                                            .withSuccessHandler(res)
                                                            .withFailureHandler(rej)
                                                            .reopenOrderAndRoom(selectedOrder.orderCode)
                                                    );
                                                }
                                                const updatedOrders = orders.map(o => o.orderCode === selectedOrder.orderCode ? reopenedOrder : o);
                                                const updatedRooms = rooms.map(r =>
                                                    String(r.id) === String(selectedOrder.roomId)
                                                        ? { ...r, status: 'occupied', current_order_id: selectedOrder.orderCode, start_time: selectedOrder.startTime } : r
                                                );

                                                let updatedStaffs = [...staffs];
                                                try {
                                                    const orderStaffs = JSON.parse(selectedOrder.staffs || "[]");
                                                    orderStaffs.forEach(os => {
                                                        updatedStaffs = updatedStaffs.map(s => String(s.id) === String(os.id) ? { ...s, status: 'busy', current_roomId: selectedOrder.roomId } : s);
                                                    });
                                                } catch (e) { console.error(e) }

                                                setOrders(updatedOrders);
                                                setRooms(updatedRooms);
                                                setStaffs(updatedStaffs);
                                                saveUnifiedCache({ rooms: updatedRooms, orders: updatedOrders, products, staffs: updatedStaffs });
                                                setSuccess('Đã mở lại phòng thành công!');
                                                setTimeout(() => setSuccess(''), 3000);
                                                closeOrderCompletedModal();
                                            } catch (e) {
                                                setError('Mở lại phòng thất bại: ' + (e.message || e));
                                            }
                                        }}
                                        className="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-xl shadow-lg shadow-amber-500/30 transition duration-200"
                                    >
                                        Đồng ý đẩy
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notification Popup */}
                    {notification && (
                        <div className="fixed top-6 right-6 z-50 animate-in slide-in-from-right-4 duration-300">
                            <div className={`rounded-3xl shadow-2xl p-6 max-w-md text-white flex items-start gap-4 ${notification.type === "warning" ? "bg-amber-500" : "bg-emerald-500"}`}>
                                <div className="text-2xl mt-1">
                                    {notification.type === "warning" ? "⏰" : "✓"}
                                </div>
                                <div className="flex-1">
                                    <div className="font-bold text-lg">{notification.title}</div>
                                    <div className="text-sm opacity-95">{notification.message}</div>
                                </div>
                                <button
                                    onClick={() => setNotification(null)}
                                    className="text-white/70 hover:text-white text-xl mt-0.5 flex-shrink-0"
                                >
                                    ×
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
    })();
</script>
