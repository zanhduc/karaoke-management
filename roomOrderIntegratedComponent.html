    function getElapsed(startTime) {
      if (!startTime) return "";
      const elapsed = Date.now() - new Date(startTime).getTime();
      const hours = Math.floor(elapsed / 3600000);
      const minutes = Math.floor((elapsed % 3600000) / 60000);
      return `${hours}h ${minutes < 10 ? "0" : ""}${minutes}m`;
    }

    function formatDurationClock(durationMs) {
      const safeMs = Math.max(0, Number(durationMs || 0));
      const totalMinutes = Math.floor(safeMs / 60000);
      const hh = Math.floor(totalMinutes / 60);
      const mm = totalMinutes % 60;
      return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
    }

    function formatForDateTimeLocal(dateInput) {
      if (!dateInput) return "";
      const d = new Date(dateInput);
      if (isNaN(d.getTime())) return "";
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function formatTimeForInput(dateInput) {

    function isSameDay(dateA, dateB) {
      if (!dateA || !dateB) return false;
      const a = new Date(dateA);
      const b = new Date(dateB);
      if (isNaN(a.getTime()) || isNaN(b.getTime())) return false;
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    function mergeTimeIntoIso(baseDateInput, timeValue) {
      if (!timeValue) return null;
      const baseDate = baseDateInput ? new Date(baseDateInput) : new Date();
      if (isNaN(baseDate.getTime())) return null;
      const [h, m] = String(timeValue).split(":");
      const hh = Number(h);
      const mm = Number(m);
      if (!Number.isFinite(hh) || !Number.isFinite(mm)) return null;
      const next = new Date(baseDate);
      next.setHours(hh, mm, 0, 0);
      return next.toISOString();
    }

    function normalizeStaffTimer(staff) {
      // Ép buộc luôn phải có mảng sessions
      let sessions = Array.isArray(staff.sessions) ? [...staff.sessions] : [];

      // Nếu mảng trống (do lỗi dữ liệu cũ), tự động tạo 1 dòng thời gian mặc định
      if (sessions.length === 0) {
        sessions = [
          {
            startTime: staff.startTime || new Date().toISOString(),
            endTime: staff.endTime || null,
          },
        ];
      }

      const firstSessionStart =
        sessions[0]?.startTime || staff.startTime || null;
      const lastSession = sessions[sessions.length - 1] || null;
      const lastSessionEnd =
        (lastSession && lastSession.endTime) || staff.endTime || null;

      return {
        ...staff,
        sessions,
        startTime: firstSessionStart,
        endTime: lastSessionEnd,
        isPaused: Boolean(staff?.isPaused),
        pauseStartedAt: staff?.pauseStartedAt || null,
        totalPausedMs: Number(staff?.totalPausedMs || 0),
      };
    }
    function sanitizeStaffsData(rawStaffs) {
      if (!rawStaffs || !Array.isArray(rawStaffs)) return [];
      const staffMap = new Map();

      rawStaffs.forEach((s) => {
        const id = String(s.id);
        if (!staffMap.has(id)) {
          staffMap.set(id, {
            ...s,
            sessions: s.sessions ? [...s.sessions] : [],
          });
        } else {
          const existing = staffMap.get(id);
          if (s.sessions) existing.sessions.push(...s.sessions);
          if (s.startTime) {
            const isDupe = existing.sessions.find(
              (x) => x.startTime === s.startTime,
            );
            if (!isDupe)
              existing.sessions.push({
                startTime: s.startTime,
                endTime: s.endTime || null,
              });
          }
          if (s.isLeft === false) existing.isLeft = false;
        }
      });

      return Array.from(staffMap.values()).map((s) => {
        let cleanSessions = s.sessions.filter((sess) => sess.startTime);
        cleanSessions.sort(
          (a, b) =>
            new Date(a.startTime).getTime() - new Date(b.startTime).getTime(),
        );

        // Lọc bỏ session rác do lỗi lặp (dưới 1 phút)
        cleanSessions = cleanSessions.filter((sess) => {
          if (!sess.endTime) return true;
          const dur =
            new Date(sess.endTime).getTime() -
            new Date(sess.startTime).getTime();
          return dur >= 60000;
        });
        const uniqueSessions = [];
        cleanSessions.forEach((sess) => {
          const exists = uniqueSessions.find(
            (x) => x.startTime === sess.startTime && x.endTime === sess.endTime,
          );
          if (!exists) uniqueSessions.push(sess);
        });

        // BỔ SUNG: Đảm bảo luôn có ít nhất 1 phiên để giao diện hiển thị ô nhập Vào/Ra
        if (uniqueSessions.length === 0) {
          uniqueSessions.push({
            startTime: s.startTime || new Date().toISOString(),
            endTime: s.endTime || null,
          });
        }

        const firstSessionStart =
          uniqueSessions[0]?.startTime || s.startTime || null;
        const lastSession = uniqueSessions[uniqueSessions.length - 1] || null;
        const lastSessionEnd =
          (lastSession && lastSession.endTime) || s.endTime || null;

        return {
          ...s,
          sessions: uniqueSessions,
          startTime: firstSessionStart,
          endTime: lastSessionEnd,
        };
      });
    }

    function normalizeListPayload(payload, preferredKeys = []) {
      if (Array.isArray(payload)) return payload;
      if (!payload || typeof payload !== "object") return [];

      const candidateKeys = [
        ...preferredKeys,
        "result",
        "data",
        "orders",
        "items",
        "list",
        "rows",
        "values",
      ];
      for (const key of candidateKeys) {
        if (!(key in payload)) continue;
        const nested = payload[key];
        if (Array.isArray(nested)) return nested;
        if (nested && typeof nested === "object") {
          const normalizedNested = normalizeListPayload(nested, []);
          if (normalizedNested.length > 0) return normalizedNested;
        }
      }

      const numericKeys = Object.keys(payload)
        .filter((key) => /^\d+$/.test(key))
        .sort((a, b) => Number(a) - Number(b));
      if (numericKeys.length > 0) {
        return numericKeys
          .map((key) => payload[key])
          .filter((item) => item !== null && item !== undefined);
      }

      if (payload.orderCode || payload.id) {
        return [payload];
      }

      return [];
    }

      const lastCreateTimeRef = useRef(0);
      const isCreatingOrderRef = useRef(false);

      const applyUnifiedDataToState = useCallback(
        (data, keepCatalogIfMissing = true) => {
          if (!data || typeof data !== "object") return;
          const nextRooms = normalizeListPayload(data.rooms, ["rooms"]);
          const nextOrders = normalizeListPayload(data.orders, ["orders"]);
          const nextProducts = normalizeListPayload(data.products, [
            "products",
          ]);
          const nextStaffs = normalizeListPayload(data.staffs, ["staffs"]);

          if (nextRooms.length || Array.isArray(data.rooms))
            setRooms(nextRooms);
          if (nextOrders.length || Array.isArray(data.orders))
            setOrders(nextOrders);
          if (nextProducts.length || Array.isArray(data.products)) {
            setProducts(nextProducts);
          } else if (!keepCatalogIfMissing) {
            setProducts([]);
          }
          if (nextStaffs.length || Array.isArray(data.staffs)) {
            setStaffs(nextStaffs);
          } else if (!keepCatalogIfMissing) {
            setStaffs([]);
          }
        },
        [],
      );

      const saveUnifiedCache = useCallback((payload) => {
        try {
          localStorage.setItem(
            DATA_CACHE_KEY,
            JSON.stringify({
              ts: Date.now(),
              data: payload,
            }),
          );
        } catch (e) {
          console.warn("Save cache failed", e);
        }
      }, []);

      const loadUnifiedCache = useCallback(() => {
        try {
          const raw = localStorage.getItem(DATA_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.ts || !parsed.data) return null;
          const isExpired = Date.now() - Number(parsed.ts) > DATA_CACHE_TTL_MS;
          return { data: parsed.data, isExpired };
        } catch (e) {
          console.warn("Read cache failed", e);
          return null;
        }
      }, []);

      // ──── Load Data ────
      // ── Order Draft (lưu tạm khi đóng popup, khôi phục khi mở lại) ──
      const ORDER_DRAFT_PREFIX = "karaoke_order_draft_v1_";
      const saveOrderDraft = useCallback((orderCode, state) => {
        if (!orderCode) return;
        try {
          localStorage.setItem(
            ORDER_DRAFT_PREFIX + orderCode,
            JSON.stringify({ ...state, savedAt: Date.now() }),
          );
        } catch (e) {}
      }, []);
      const loadOrderDraft = (orderCode) => {
        try {
          const raw = localStorage.getItem(ORDER_DRAFT_PREFIX + orderCode);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          return null;
        }
      };
      const clearOrderDraft = (orderCode) => {
        try {
          localStorage.removeItem(ORDER_DRAFT_PREFIX + orderCode);
        } catch (e) {}
      };

      const load = async () => {
        setError("");
        const cached = loadUnifiedCache();
        if (cached?.data) {
          // ✅ Ưu tiên giao diện: hiện ngay từ cache, không chờ server
          applyUnifiedDataToState(cached.data, true);
          setIsLoading(false);
        } else {
          setIsLoading(true);
        }

        try {
          // Fetch từ server trong nền
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Load timeout")), 15000),
          );

          const loadPromise = (async () => {
            const rooms = await RoomServer.getRooms().catch((err) => {
              console.error("❌ Load rooms failed:", err);
              return [];
            });
            console.log("✅ Rooms loaded:", rooms);
            let orders = await RoomServer.getOrders().catch((err) => {
              console.error("❌ Load orders failed:", err);
              return [];
            });
            orders = Array.isArray(orders) ? orders : [];
            console.log("✅ Orders loaded:", orders.length);
            const [products, staffs] = await Promise.all([
              RoomServer.getProducts().catch(() => []),
              RoomServer.getStaffs().catch(() => []),
            ]);
            return { rooms, orders, products, staffs };
          })();

          const data = await Promise.race([loadPromise, timeoutPromise]);
          applyUnifiedDataToState(data, false);
          saveUnifiedCache({
            rooms: Array.isArray(data.rooms) ? data.rooms : [],
            orders: Array.isArray(data.orders) ? data.orders : [],
            products: Array.isArray(data.products) ? data.products : [],
            staffs: Array.isArray(data.staffs) ? data.staffs : [],
          });
        } catch (e) {
          if (!cached?.data) {
            setError(e?.message || "Không tải được dữ liệu.");
          }
        } finally {
          hasHydratedDataRef.current = true;
          setIsLoading(false);
        }
      };
      useEffect(() => {
        if (!hasHydratedDataRef.current) return;
        saveUnifiedCache({ rooms, orders, products, staffs });
      }, [rooms, orders, products, staffs, saveUnifiedCache]);

      const loadBackground = useCallback(async () => {
        // Nếu đang mở modal chi tiết và đơn CHƯA thanh toán -> KHÔNG refresh để tránh mất dữ liệu đang chỉnh sửa
        if (
          showOrderDetailModal &&
          currentOrderDetail?.paymentStatus !== "Đã thanh toán"
        ) {
          return;
        }

        // Nếu mới tạo đơn trong vòng 3 giây gần đây -> tạm hoãn refresh để tránh conflict
        if (
          lastCreateTimeRef.current &&
          Date.now() - lastCreateTimeRef.current < 3000
        ) {
          return;
        }

        try {
          const data = await RoomServer.getRoomAndOrderData();
          if (!data || typeof data !== "object") {
            console.warn("Background load: invalid data response", data);
            return;
          }

          const nextRooms = Array.isArray(data.rooms) ? data.rooms : [];
          const nextOrders = Array.isArray(data.orders) ? data.orders : [];

          setRooms(nextRooms);
          setOrders(nextOrders);

          const cached = loadUnifiedCache();
          saveUnifiedCache({
            rooms: nextRooms,
            orders: nextOrders,
            products:
              (Array.isArray(products) && products.length > 0
                ? products
                : cached?.data?.products) || [],
            staffs:
              (Array.isArray(staffs) && staffs.length > 0
                ? staffs
                : cached?.data?.staffs) || [],
          });
        } catch (e) {
          console.warn("Background load failed:", e);
        }
      }, [
        showOrderDetailModal,
        currentOrderDetail?.paymentStatus,
        products,
        staffs,
        loadUnifiedCache,
        saveUnifiedCache,
      ]);

      useEffect(() => {
        load();
      }, []);
      // useEffect(() => {
      //   // Giảm interval từ 30s xuống 10s để sync nhanh hơn
      //   const interval = setInterval(() => {
      //     loadBackground();
      //     setTick((t) => t + 1);
      //   }, 10000);
      //   return () => clearInterval(interval);
      // }, [loadBackground]);

      // ──── Room CRUD ────
      const canAdd = useMemo(() => {
        return (
          addName.trim() !== "" &&
          addPrice !== "" &&
          !isNaN(Number(addPrice)) &&
          Number(addPrice) > 0
        );
      }, [addName, addPrice]);

      const openAddModal = () => {
        setAddName("");
        setAddType("thường");
        setAddPrice("");
        setShowAddModal(true);
      };

      const closeAddModal = () => setShowAddModal(false);

      const handleAdd = async () => {
        if (!canAdd) {
          setError("Vui lòng nhập đầy đủ Tên phòng và Giá/giờ hợp lệ.");
          return;
        }
        const newRoom = {
          id: Date.now(),
          name: addName.trim(),
          type: addType,
          price_per_hour: Number(addPrice),
          status: "available",
          start_time: null,
          current_order_id: "",
        };
        const prev = [...rooms];
        setRooms([...rooms, newRoom]);
        closeAddModal();
        try {
          await RoomServer.addRoom(newRoom);
          setSuccess("Thêm phòng thành công!");
          setTimeout(() => setSuccess(""), 3000);
        } catch (e) {
          setRooms(prev);
          setError("Thêm phòng thất bại.");
        }
      };

      const openEditModal = (room) => {
        if (room.status === "occupied") {
          setError("Không thể chỉnh sửa phòng đang sử dụng.");
          return;
        }
        setEditingRoom(room);
        setEditName(room.name || "");
        setEditType(room.type || "thường");
        setEditPrice(String(room.price_per_hour || ""));
        setShowEditModal(true);
      };

      const closeEditModal = () => {
        setShowEditModal(false);
        setEditingRoom(null);
      };

      const handleUpdate = async () => {
        if (!editingRoom) return;
        if (
          !editName.trim() ||
          !editPrice ||
          isNaN(Number(editPrice)) ||
          Number(editPrice) <= 0
        ) {
          setError("Tên phòng và Giá/giờ không hợp lệ.");
          return;
        }
        const prev = [...rooms];
        const patch = {
          id: editingRoom.id,
          name: editName.trim(),
          type: editType,
          price_per_hour: Number(editPrice),
        };
        setRooms(
          rooms.map((r) =>
            String(r.id) === String(editingRoom.id) ? { ...r, ...patch } : r,
          ),
        );
        closeEditModal();
        try {
          await RoomServer.updateRoom(patch);
          setSuccess("Cập nhật phòng thành công!");
          setTimeout(() => setSuccess(""), 3000);
        } catch (e) {
          setRooms(prev);
          setError("Cập nhật phòng thất bại.");
        }
      };

      const changeStatus = (room) => {
        if (room.status === "occupied") {
          setError("Không thể thay đổi trạng thái của phòng đang sử dụng.");
          return;
        }
        const nextStatus =
          room.status === "available" ? "cleaning" : "available";
        setTargetRoom(room);
        setNewStatus(nextStatus);
        setShowStatusConfirm(true);
      };

      const confirmChangeStatus = async () => {
        if (!targetRoom) return;
        const prev = [...rooms];
        setRooms(
          rooms.map((r) =>
            String(r.id) === String(targetRoom.id)
              ? { ...r, status: newStatus }
              : r,
          ),
        );
        try {
          await RoomServer.updateRoomStatus(targetRoom.id, newStatus);
          setSuccess(
            `Đã chuyển sang ${newStatus === "cleaning" ? "Đang dọn" : "Trống"}`,
          );
          setTimeout(() => setSuccess(""), 3000);
        } catch (e) {
          setRooms(prev);
          setError("Không thể thay đổi trạng thái.");
        }
        setShowStatusConfirm(false);
        setTargetRoom(null);
      };

      const openRoomDetail = async (room) => {
        if (room.status !== "occupied") {
          setError("Phòng không đang sử dụng.");
          return;
        }
        setSelectedRoomDetail(room);
        if (room.current_order_id) {
          let order = orders.find(
            (o) => String(o.orderCode) === String(room.current_order_id),
          );
          if (!order) {
            try {
              order = await new Promise((res, rej) =>
                google.script.run
                  .withSuccessHandler((rawData) =>
                    res(parseServerJsonPayload(rawData)),
                  )
                  .withFailureHandler(() => {
                    google.script.run
                      .withSuccessHandler((fallbackRawData) =>
                        res(parseServerJsonPayload(fallbackRawData)),
                      )
                      .withFailureHandler(() =>
                        rej(new Error("Không thể lấy order")),
                      )
                      .getOrderByCode(room.current_order_id);
                  })
                  .getOrderByCodeJson(room.current_order_id),
              );
            } catch (e) {
              setCurrentOrderDetail(null);
              setShowOrderDetailModal(true);
              return;
            }
          }
          if (!order) {
            setCurrentOrderDetail(null);
            setShowOrderDetailModal(true);
            return;
          }
          const products = order.products
            ? typeof order.products === "string"
              ? JSON.parse(order.products)
              : order.products
            : [];
          let staffs = order.staffs
            ? typeof order.staffs === "string"
              ? JSON.parse(order.staffs)
              : order.staffs
            : [];
          staffs = Array.isArray(staffs) ? staffs : [];
          staffs = sanitizeStaffsData(staffs); // Dọn dẹp rác trước khi nạp vào UI
          const endTime =
            order.endTime || new Date(Date.now() + 2 * 3600000).toISOString();
          setCurrentOrderDetail({ ...order, products, staffs, endTime });

          // ✅ Khôi phục draft nếu đã lưu trước đó
          const draft = loadOrderDraft(order.orderCode);
          if (
            draft &&
            draft.savedAt &&
            Date.now() - draft.savedAt < 4 * 3600000
          ) {
            console.log("📂 Khôi phục draft cho order:", order.orderCode);
            const draftStartTime =
              draft.currentOrderStartTime || order.startTime;
            const draftEndTime =
              draft.currentOrderEndTime !== undefined
                ? draft.currentOrderEndTime
                : endTime;
            setTempProducts(draft.tempProducts || products);
            setTempStaffs(
              (draft.tempStaffs || staffs).map(normalizeStaffTimer),
            );
            setTempBankPayment(draft.tempBankPayment || order.bankPayment || 0);
            setTempCashPayment(draft.tempCashPayment || order.cashPayment || 0);
            setTempNote(draft.tempNote || order.note || "");
            setIsPausedTime(draft.isPausedTime || false);
            setPausedTimeMs(draft.pausedTimeMs || 0);
            setTotalPausedMs(draft.totalPausedMs || 0);
            setCurrentOrderDetail((prev) => ({
              ...prev,
              startTime: draftStartTime,
              endTime: draftEndTime,
            }));
          } else {
            const normalizedStaffs = staffs.map(normalizeStaffTimer);
            setTempProducts(products);
            setTempStaffs(normalizedStaffs);
            setTempBankPayment(order.bankPayment || 0);
            setTempCashPayment(order.cashPayment || 0);
            setTempNote(order.note || "");
            setIsPausedTime(false);
            setPausedTimeMs(0);
            setTotalPausedMs(0);
          }
          setTimeTick(0);
          setShowOrderDetailModal(true);
        } else {
          setCurrentOrderDetail(null);
          setShowOrderDetailModal(true);
        }
      };

      const closeRoomDetail = () => {
        setShowRoomDetail(false);
        setSelectedRoomDetail(null);
        setCurrentOrderDetail(null);
        setShowOrderDetailModal(false);
      };

      const closeOrderDetailModal = (clearDraft = false) => {
        // Lưu draft vào localStorage trước khi đóng (để khôi phục khi mở lại)
        if (currentOrderDetail?.orderCode && !clearDraft) {
          saveOrderDraft(currentOrderDetail.orderCode, {
            tempProducts,
            tempStaffs,
            tempBankPayment,
            tempCashPayment,
            tempNote,
            currentOrderStartTime: currentOrderDetail.startTime || null,
            currentOrderEndTime:
              currentOrderDetail.endTime !== undefined
                ? currentOrderDetail.endTime
                : null,
            isPausedTime,
            pausedTimeMs,
            totalPausedMs,
          });
        }
        setShowOrderDetailModal(false);
        setCurrentOrderDetail(null);
        setTempProducts([]);
        setTempStaffs([]);
        setTempBankPayment(0);
        setTempCashPayment(0);
        setTempNote("");
        setIsPausedTime(false);
        setPausedTimeMs(0);
        setTotalPausedMs(0);
      };

      // Functions for managing products in order detail
      const removeProductFromOrder = (id) => {
        if (
          !window.confirm("Bạn có chắc chắn muốn xoá hàng hoá này khỏi order?")
        )
          return;
        setTempProducts(tempProducts.filter((p) => p.id !== id));
      };

      const updateProductQty = (id, qty) => {
        if (qty < 1) return;
        setTempProducts(
          tempProducts.map((p) => (p.id === id ? { ...p, quantity: qty } : p)),
        );
      };

      const addProductToCurrentOrder = (product, qty = 1) => {
        setTempProducts((prev) => {
          const existingIdx = prev.findIndex((p) => p.id === product.id);
          if (existingIdx >= 0) {
            const updated = [...prev];
            updated[existingIdx] = {
              ...updated[existingIdx],
              quantity: (updated[existingIdx].quantity || 0) + qty,
            };
            return updated;
          } else {
            return [...prev, { ...product, quantity: qty }];
          }
        });
      };

      // Functions for managing staff in order detail
      const updateStaffSessionTime = (staffId, sessionIdx, field, val) => {
        setTempStaffs((prev) =>
          prev.map((staff) => {
            if (String(staff.id) !== String(staffId)) return staff;
            const newSessions = [...(staff.sessions || [])];
            let nextStartTime = staff.startTime || null;
            let nextEndTime = staff.endTime || null;
            if (newSessions[sessionIdx]) {
              let newTime = null;
              if (!val) {
                newTime = null;
              } else {
                const session = newSessions[sessionIdx];
                const hasDateInInput = String(val).includes("T");
                const fallbackBase =
                  field === "startTime"
                    ? session.startTime ||
                      currentOrderDetail?.startTime ||
                      new Date().toISOString()
                    : session.endTime ||
                      session.startTime ||
                      currentOrderDetail?.startTime ||
                      new Date().toISOString();
                newTime = hasDateInInput
                  ? new Date(val).toISOString()
                  : mergeTimeIntoIso(fallbackBase, val);
              }
              newSessions[sessionIdx] = {
                ...newSessions[sessionIdx],
                [field]: newTime,
              };

              if (field === "startTime" && sessionIdx === 0) {
                nextStartTime =
                  newTime ||
                  newSessions.find((sess) => sess?.startTime)?.startTime ||
                  currentOrderDetail?.startTime ||
                  null;
              }

              if (
                field === "endTime" &&
                sessionIdx === Math.max(0, newSessions.length - 1)
              ) {
                nextEndTime = newTime;
              }
            }
            return {
              ...staff,
              sessions: newSessions,
              startTime: nextStartTime,
              endTime: nextEndTime,
            };
          }),
        );
      };

      const setStaffAvailabilityLocal = (
        staffId,
        status,
        currentRoomId = "",
      ) => {
        setStaffs((prev) =>
          prev.map((staff) =>
            String(staff.id) === String(staffId)
              ? { ...staff, status, current_room_id: currentRoomId }
              : staff,
          ),
        );
      };

      // Đánh dấu tiếp viên đã rời phòng: ghi endTime cho session cuối, isLeft=true
      // Không xóa khỏi tempStaffs để vẫn hiển thị trong chi tiết thanh toán
      const endStaffSession = (staffId) => {
        if (!window.confirm("Xác nhận tiếp viên rời phòng?")) return;
        const now = new Date().toISOString();
        setTempStaffs((prev) =>
          prev.map((s) => {
            if (String(s.id) !== String(staffId)) return s;
            // Đóng session cuối cùng chưa có endTime
            const updatedSessions = (s.sessions || []).map((sess, idx, arr) => {
              if (idx === arr.length - 1 && !sess.endTime) {
                return { ...sess, endTime: now };
              }
              return sess;
            });
            return {
              ...s,
              sessions: updatedSessions,
              isLeft: true,
              endTime: now,
            };
          }),
        );
        // Giải phóng trạng thái tiếp viên trong danh mục
        setStaffAvailabilityLocal(staffId, "available", "");
      };

      // Xóa hẳn tiếp viên khỏi đơn (dùng cho nút × bên cạnh tên)
      const removeStaffFromOrder = (id) => {
        if (
          !window.confirm("Bạn có chắc chắn muốn xoá tiếp viên này khỏi order?")
        )
          return;
        setTempStaffs((prev) =>
          prev.filter((s) => String(s.id) !== String(id)),
        );
        setStaffAvailabilityLocal(id, "available", "");
      };

      const addStaffToCurrentOrder = (staff) => {
        const now = new Date().toISOString();
        const existingStaff = tempStaffs.find(
          (s) => String(s.id) === String(staff.id),
        );
        if (existingStaff) {
          // Tiếp viên đã có (kể cả đã rời): thêm session mới, bỏ isLeft
          setTempStaffs((prev) =>
            prev.map((s) =>
              String(s.id) === String(staff.id)
                ? {
                    ...s,
                    sessions: [
                      ...(s.sessions || []),
                      { startTime: now, endTime: null },
                    ],
                    isLeft: false,
                    endTime: null,
                  }
                : s,
            ),
          );
        } else {
          // Tiếp viên hoàn toàn mới
          setTempStaffs((prev) => [
            ...prev,
            {
              ...staff,
              startTime: now,
              sessions: [{ startTime: now, endTime: null }],
              isLeft: false,
              endTime: null,
            },
          ]);
        }
        setStaffAvailabilityLocal(
          staff.id,
          "busy",
          currentOrderDetail?.roomId ||
            selectedRoomDetail?.id ||
            selectedRoomIdForOrder ||
            "",
        );
      };

      const availableStaffsForOrder = useMemo(() => {
        // Hiển thị toàn bộ tiếp viên, chỉ loại trừ người đang có mặt trong order hiện tại
        const busyIds = new Set(
          tempStaffs.filter((s) => !s.isLeft).map((s) => String(s.id)),
        );
        return staffs.filter((s) => !busyIds.has(String(s.id)));
      }, [staffs, tempStaffs]);

      // Toggle pause time
      const togglePauseTime = () => {
        if (isPausedTime) {
          // Tiếp tục: cộng thêm thời gian đã tạm dừng vào totalPausedMs
          const newTotalPaused = totalPausedMs + (Date.now() - pausedTimeMs);
          setTotalPausedMs(newTotalPaused);
          setIsPausedTime(false);
        } else {
          // Tạm dừng: lưu thời gian hiện tại
          setPausedTimeMs(Date.now());
          setIsPausedTime(true);
        }
      };

      const toggleStaffPause = (staffId) => {
        const now = new Date().toISOString();
        setTempStaffs((prev) =>
          prev.map((s) => {
            if (String(s.id) !== String(staffId)) return s;
            const isCurrentlyPaused = Boolean(s.isPaused);
            const sessions = [...(s.sessions || [])];
            const lastIdx = sessions.length - 1;

            if (isCurrentlyPaused) {
              // ĐANG DỪNG -> TIẾP TỤC: Xoá giờ ra (endTime) của dòng cũ để đồng hồ chạy tiếp, KHÔNG tạo dòng mới
              if (lastIdx >= 0) {
                sessions[lastIdx] = { ...sessions[lastIdx], endTime: null };
              } else {
                sessions.push({ startTime: now, endTime: null });
              }
              return {
                ...s,
                isPaused: false,
                pauseStartedAt: null,
                sessions,
              };
            } else {
              // ĐANG CHẠY -> DỪNG: Chốt tạm giờ ra (endTime)
              if (lastIdx >= 0 && !sessions[lastIdx]?.endTime) {
                sessions[lastIdx] = { ...sessions[lastIdx], endTime: now };
              }
              return {
                ...s,
                isPaused: true,
                pauseStartedAt: now,
                sessions,
              };
            }
          }),
        );
      };
      // Update time every second when modal is open and not paused
      useEffect(() => {
        if (
          !showOrderDetailModal ||
          currentOrderDetail?.paymentStatus === "Đã thanh toán"
        )
          return;

        const interval = setInterval(() => {
          setTimeTick((t) => t + 1);
        }, 15000);

        return () => clearInterval(interval);
      }, [showOrderDetailModal, currentOrderDetail?.paymentStatus]);

      // Calculate totals for order detail & estimated time (GỘP CHUNG)
      const orderDetailCalc = useMemo(() => {
        // 1. Tiền hàng hóa
        const prodTotal = tempProducts.reduce(
          (sum, p) => sum + Number(p.price) * (p.quantity || 1),
          0,
        );

        // 2. Chốt mốc thời gian chung
        let calcEndTime = new Date();
        if (currentOrderDetail?.paymentStatus === "Đã thanh toán") {
          calcEndTime = new Date(currentOrderDetail.endTime || new Date());
        } else if (isPausedTime) {
          calcEndTime = new Date(pausedTimeMs);
        }

        // 3. Tiền phòng (Chưa làm tròn)
        let roomTotal = 0;
        let estimatedDuration = "00:00";
        if (currentOrderDetail?.paymentStatus === "Đã thanh toán") {
          roomTotal = currentOrderDetail.roomTotal || 0;
          estimatedDuration = currentOrderDetail.duration
            ? `${currentOrderDetail.duration}h`
            : "—";
        } else if (currentOrderDetail?.startTime) {
          const startTime = new Date(currentOrderDetail.startTime);
          let durationMs =
            calcEndTime.getTime() - startTime.getTime() - totalPausedMs;
          if (durationMs < 0) durationMs = 0;

          estimatedDuration = formatDurationClock(durationMs);
          const room = rooms.find(
            (r) => String(r.id) === String(currentOrderDetail.roomId),
          );
          const roomPrice = room ? Number(room.price_per_hour) || 0 : 0;

          roomTotal = (roomPrice / 60) * (durationMs / 60000); // KHÔNG làm tròn
        }

        // 4. Tiền tiếp viên (Tính tiền liên tục từ lúc vào đến lúc ra hẳn, khách hàng chịu phí cả lúc nghỉ)
        const pricePerMin = (pricePerHour) => (Number(pricePerHour) || 0) / 60;
        const staffBreakdown = tempStaffs.map((s) => {
          // Lấy giờ vào đầu tiên của tiếp viên
          const firstStartTime =
            s.sessions && s.sessions.length > 0 && s.sessions[0].startTime
              ? s.sessions[0].startTime
              : s.startTime || currentOrderDetail?.startTime;

          if (!firstStartTime)
            return { ...s, rawMoney: 0, money: 0, durationMs: 0 };

          const startMs = new Date(firstStartTime).getTime();

          // Lấy giờ ra: Nếu đã chốt thanh toán thì lấy calcEndTime, nếu đã Rời phòng hẳn thì lấy giờ rời phòng
          let endMs = calcEndTime.getTime();
          if (s.isLeft && s.sessions && s.sessions.length > 0) {
            const lastSession = s.sessions[s.sessions.length - 1];
            if (lastSession.endTime) {
              endMs = new Date(lastSession.endTime).getTime();
            }
          } else if (
            s.endTime &&
            currentOrderDetail?.paymentStatus === "Đã thanh toán"
          ) {
            endMs = new Date(s.endTime).getTime();
          }

          // Tổng thời gian thông suốt (không trừ thời gian nghỉ)
          const totalStaffDurationMs = Math.max(0, endMs - startMs);
          const totalStaffRawMoney =
            pricePerMin(s.price_per_hour) * (totalStaffDurationMs / 60000);

          const durMins = totalStaffDurationMs / 60000;
          const displayIn = new Date(startMs).toLocaleTimeString("vi-VN", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const displayOut =
            s.isLeft || currentOrderDetail?.paymentStatus === "Đã thanh toán"
              ? new Date(endMs).toLocaleTimeString("vi-VN", {
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "—";

          return {
            ...s,
            durationMs: totalStaffDurationMs,
            durationLabel: `${Math.floor(durMins / 60)}h ${Math.floor(durMins % 60) < 10 ? "0" : ""}${Math.floor(durMins % 60)}m`,
            rawMoney: totalStaffRawMoney,
            money: Math.round(totalStaffRawMoney / 1000) * 1000,

            // Tạo 1 dòng session duy nhất để in ra Bill cho đẹp (Vào lúc... Ra lúc...)
            sessionsData: [
              {
                display: `${displayIn} - ${displayOut}`,
                money: Math.round(totalStaffRawMoney / 1000) * 1000,
                rawMoney: totalStaffRawMoney,
              },
            ],
          };
        });

        const staffTotalRaw = staffBreakdown.reduce(
          (sum, s) => sum + s.rawMoney,
          0,
        );

        // 5. TỔNG KẾT VÀ LÀM TRÒN CUỐI CÙNG
        const subtotalRaw = prodTotal + staffTotalRaw + roomTotal;
        const grandTotalRaw = Math.max(
          0,
          subtotalRaw + (currentOrderDetail?.adjustment || 0),
        );

        // Output các biến đã làm tròn để UI gốc của bạn gọi không bị lỗi
        return {
          estimatedDuration,
          estimatedRoomTotal: Math.round(roomTotal / 1000) * 1000,
          roomTotal: Math.round(roomTotal / 1000) * 1000,
          prodTotal,
          staffTotal: Math.round(staffTotalRaw / 1000) * 1000,
          serviceTotal: Math.round((prodTotal + staffTotalRaw) / 1000) * 1000,
          grandTotal: Math.round(grandTotalRaw / 1000) * 1000,
          staffBreakdown,
        };
      }, [
        tempProducts,
        tempStaffs,
        currentOrderDetail,
        rooms,
        isPausedTime,
        pausedTimeMs,
        totalPausedMs,
        timeTick,
      ]);

      // Ánh xạ lại biến estimatedCalc để các component UI cũ dùng không bị lỗi crash
      const estimatedCalc = orderDetailCalc;
      // Save order changes
      const saveOrderChanges = () => {
        if (!currentOrderDetail) return;
        const normalizedTempStaffs = tempStaffs.map(normalizeStaffTimer);

        const updatedOrder = {
          ...currentOrderDetail,
          products: tempProducts,
          staffs: normalizedTempStaffs,
          bankPayment: tempBankPayment,
          cashPayment: tempCashPayment,
          note: tempNote,
          grandTotal: orderDetailCalc.grandTotal,
        };

        // 1. CẬP NHẬT GIAO DIỆN NGAY LẬP TỨC (Optimistic UI)
        const updatedOrders = orders.map((o) =>
          o.orderCode === currentOrderDetail.orderCode ? updatedOrder : o,
        );
        // Đảm bảo đồng bộ giờ bắt đầu ra bảng danh sách phòng bên ngoài (Tránh UI bị sai giờ)
        const updatedRooms = rooms.map((r) =>
          String(r.current_order_id) === String(currentOrderDetail.orderCode)
            ? { ...r, start_time: updatedOrder.startTime }
            : r,
        );

        setOrders(updatedOrders);
        setRooms(updatedRooms);
        setCurrentOrderDetail(updatedOrder);
        setTempStaffs(normalizedTempStaffs);
        clearOrderDraft(currentOrderDetail.orderCode);
        saveUnifiedCache({
          rooms: updatedRooms,
          orders: updatedOrders,
          products,
          staffs,
        });

        // 2. SERVER CHẠY NGẦM KHÔNG CHỜ
        if (!RoomServer.isLocal) {
          google.script.run
            .withFailureHandler((e) =>
              console.error("Lưu thay đổi thất bại", e),
            )
            .updateOrderWithStaffSync(
              currentOrderDetail.orderCode,
              updatedOrder,
            );
        }
      };
      // Complete payment
      const completePayment = (paymentOverride = null, opts = {}) => {
        const originalOrder = { ...currentOrderDetail };
        const originalOrders = [...orders];
        if (!currentOrderDetail) return;
        const { closeQrAfter = false } = opts;

        // 🚫 Chặn nếu đơn đang được tạo (chưa có mã thật)
        if (isCreatingOrderRef.current) {
          setError(
            "Đơn hàng đang được xử lý, vui lòng đợi vài giây rồi thử lại.",
          );
          return;
        }

        // 🚫 Chặn nếu mã đơn là tạm
        if (String(currentOrderDetail.orderCode).startsWith("TEMP-")) {
          setError("Đơn hàng chưa được tạo xong, vui lòng đợi vài giây.");
          return;
        }

        if (currentOrderDetail?.paymentStatus === "Đã thanh toán") {
          setError("Đơn hàng này đã được chốt thanh toán rồi!");
          return;
        }

        const bankPayment = paymentOverride?.bankPayment ?? tempBankPayment;
        const cashPayment = paymentOverride?.cashPayment ?? tempCashPayment;
        const totalPaid = Number(bankPayment || 0) + Number(cashPayment || 0);
        const normalizedTempStaffs = tempStaffs.map(normalizeStaffTimer);
        if (totalPaid < orderDetailCalc.grandTotal) {
          setError(
            `Số tiền thanh toán chưa đủ! Còn thiếu ${(orderDetailCalc.grandTotal - totalPaid).toLocaleString()}đ`,
          );
          return;
        }

        const nowIso = new Date().toISOString();

        // 1. TẠO OBJECT ĐÃ CHỐT VỚI ĐẦY ĐỦ THÔNG SỐ (Sửa lỗi mất tiền 0đ)
        const paidOrder = {
          ...currentOrderDetail,
          products: tempProducts,
          staffs: normalizedTempStaffs,
          note: tempNote,
          duration: String(orderDetailCalc.estimatedDuration)
            .replace("h", "")
            .trim(),
          roomTotal: orderDetailCalc.roomTotal,
          grandTotal: orderDetailCalc.grandTotal,
          serviceTotal: orderDetailCalc.serviceTotal,
          endTime: nowIso,
          paymentStatus: "Đã thanh toán",
          bankPayment,
          cashPayment,
        };

        // 2. OPTIMISTIC UI: ĐỔI GIAO DIỆN NGAY LẬP TỨC TRONG 0.1s (Sửa lỗi chờ lâu)
        const updatedOrders = orders.map((o) =>
          o.orderCode === currentOrderDetail.orderCode ? paidOrder : o,
        );
        setOrders(updatedOrders);
        setCurrentOrderDetail(paidOrder);
        saveUnifiedCache({
          rooms,
          orders: updatedOrders,
          products,
          staffs,
        });

        setTempBankPayment(bankPayment);
        setTempCashPayment(cashPayment);
        setTempStaffs(normalizedTempStaffs);
        clearOrderDraft(currentOrderDetail.orderCode);

        if (closeQrAfter) setShowQrModal(false);
        setSuccess(
          `Đang chốt thanh toán đơn ${currentOrderDetail.orderCode}...`,
        );

        // 3. GỌI SERVER CHẠY NGẦM VÀ XẾP HÀNG (Sửa lỗi mất tiền và cập nhật Giờ Vào)
        if (!RoomServer.isLocal) {
          // 3. GỌI SERVER CHẠY NGẦM VÀ XẾP HÀNG
          if (!RoomServer.isLocal) {
            google.script.run
              .withSuccessHandler(() => {
                // Lưu chi tiết thành công -> tiếp tục chốt thanh toán
                google.script.run
                  .withSuccessHandler(() => {
                    setSuccess(
                      `Đã chốt xong đơn ${currentOrderDetail.orderCode}. Bạn có thể In Bill hoặc Hoàn thành đơn.`,
                    );
                    setTimeout(() => setSuccess(""), 4000);
                  })
                  .withFailureHandler((err) => {
                    // Nếu markOrderAsPaid lỗi -> rollback UI
                    setError("Lỗi chốt thanh toán Server: " + err);
                    // Rollback: đặt lại trạng thái cũ của order và phòng
                    setOrders(orders); // orders cũ trước khi optimistic update
                    setCurrentOrderDetail(originalOrder); // cần lưu bản gốc trước đó
                  })
                  .markOrderAsPaid(currentOrderDetail.orderCode, {
                    bankPayment,
                    cashPayment,
                    paymentStatus: "Đã thanh toán",
                    endTime: nowIso,
                    duration: paidOrder.duration,
                    roomTotal: paidOrder.roomTotal,
                    grandTotal: paidOrder.grandTotal,
                    startTime: paidOrder.startTime,
                    note: paidOrder.note,
                  });
              })
              .withFailureHandler((err) => {
                // Lỗi ở updateOrderWithStaffSync -> rollback UI
                setError("Lưu chi tiết đơn thất bại: " + err.message);
                setOrders(orders);
                setCurrentOrderDetail(originalOrder);
              })
              .updateOrderWithStaffSync(
                currentOrderDetail.orderCode,
                paidOrder,
              );
          }
        } else {
          setTimeout(() => setSuccess(""), 3000);
        }
      };
      const finalizePaidOrder = () => {
        if (!currentOrderDetail) return;
        if (currentOrderDetail.paymentStatus !== "Đã thanh toán") {
          setError("Cần chốt thanh toán trước khi hoàn thành đơn.");
          return;
        }

        const updatedRooms = rooms.map((r) =>
          String(r.current_order_id) === String(currentOrderDetail.orderCode)
            ? {
                ...r,
                status: "available",
                start_time: null,
                current_order_id: "",
              }
            : r,
        );
        setRooms(updatedRooms);
        saveUnifiedCache({
          rooms: updatedRooms,
          orders,
          products,
          staffs,
        });
        clearOrderDraft(currentOrderDetail.orderCode);
        closeOrderDetailModal(true);
        setSuccess(`Đã hoàn thành đơn ${currentOrderDetail.orderCode}.`);
        setTimeout(() => setSuccess(""), 2500);

        // BỔ SUNG GỌI SERVER: Giải phóng phòng thực tế trên Google Sheets
        if (!RoomServer.isLocal) {
          google.script.run.updateRoomStatus(
            currentOrderDetail.roomId,
            "available",
          );
        }
      };
      // Xoá từ modal chi tiết đang chạy
      const deleteOrder = () => {
        if (!currentOrderDetail) return;
        if (
          !window.confirm(
            `Bạn có chắc chắn muốn xoá đơn hàng ${currentOrderDetail.orderCode}?`,
          )
        )
          return;

        const updatedOrders = orders.filter(
          (o) => o.orderCode !== currentOrderDetail.orderCode,
        );
        const updatedRooms = rooms.map((r) =>
          String(r.current_order_id) === String(currentOrderDetail.orderCode)
            ? {
                ...r,
                status: "available",
                start_time: null,
                current_order_id: "",
              }
            : r,
        );
        setOrders(updatedOrders);
        setRooms(updatedRooms);
        saveUnifiedCache({
          rooms: updatedRooms,
          orders: updatedOrders,
          products,
          staffs,
        });

        setSuccess(`Đã xoá đơn hàng ${currentOrderDetail.orderCode}`);
        setTimeout(() => setSuccess(""), 3000);
        closeOrderDetailModal();

        if (!RoomServer.isLocal) {
          google.script.run
            .withFailureHandler(console.error)
            .deleteOrder(currentOrderDetail.orderCode);
        }
      };

      // Xoá từ danh sách đã hoàn thành
      const deleteOrderFromCompleted = () => {
        if (!selectedOrder) return;
        if (
          !window.confirm(
            `Bạn có chắc muốn XOÁ HẲN order ${selectedOrder.orderCode}? Hành động này không thể hoàn tác!`,
          )
        )
          return;

        const updatedOrders = orders.filter(
          (o) => o.orderCode !== selectedOrder.orderCode,
        );
        setOrders(updatedOrders);
        saveUnifiedCache({ rooms, orders: updatedOrders, products, staffs });

        setSuccess(`Đã xoá order ${selectedOrder.orderCode}`);
        setTimeout(() => setSuccess(""), 2500);
        closeOrderCompletedModal();

        if (!RoomServer.isLocal) {
          google.script.run
            .withFailureHandler(console.error)
            .deleteOrder(selectedOrder.orderCode);
        }
      };
      const filteredRooms = useMemo(() => {
        let result = [...rooms];
        if (statusFilter !== "all")
          result = result.filter((r) => r.status === statusFilter);
        if (typeFilter !== "all")
          result = result.filter((r) => r.type === typeFilter);
        return result;
      }, [rooms, statusFilter, typeFilter]);

      const roomPriceById = useMemo(() => {
        const map = new Map();
        rooms.forEach((r) =>
          map.set(String(r.id), Number(r.price_per_hour) || 0),
        );
        return map;
      }, [rooms]);

      const orderByCodeMap = useMemo(() => {
        const map = new Map();
        orders.forEach((o) => {
          if (!o) return;
          if (o.orderCode) map.set(String(o.orderCode), o);
          if (o.code) map.set(String(o.code), o);
        });
        return map;
      }, [orders]);

      // HÀM TÍNH LẠI TỔNG TIỀN CHUẨN XÁC ĐỂ HIỂN THỊ RA BẢNG BÊN NGOÀI
      const calculateAccurateTotal = useCallback((order) => {
        if (!order) return 0;

        let prods = [];
        try {
          prods =
            typeof order.products === "string"
              ? JSON.parse(order.products)
              : order.products || [];
        } catch (e) {}
        const prodTotal = prods.reduce(
          (sum, p) => sum + Number(p.price) * (p.quantity || 1),
          0,
        );

        const roomTotal = Number(order.roomTotal || 0);

        let stfs = [];
        try {
          stfs =
            typeof order.staffs === "string"
              ? JSON.parse(order.staffs)
              : order.staffs || [];
        } catch (e) {}
        stfs = sanitizeStaffsData(Array.isArray(stfs) ? stfs : []);

        const pricePerMin = (pricePerHour) => (Number(pricePerHour) || 0) / 60;
        const staffTotal = stfs.reduce((sum, s) => {
          const firstStartTime =
            s.sessions && s.sessions.length > 0 && s.sessions[0].startTime
              ? s.sessions[0].startTime
              : s.startTime || order.startTime;
          if (!firstStartTime) return sum;

          const startMs = new Date(firstStartTime).getTime();
          let endMs = new Date().getTime();

          if (order.paymentStatus === "Đã thanh toán" && order.endTime) {
            endMs = new Date(order.endTime).getTime();
          } else if (s.isLeft && s.sessions && s.sessions.length > 0) {
            const lastSession = s.sessions[s.sessions.length - 1];
            if (lastSession.endTime)
              endMs = new Date(lastSession.endTime).getTime();
          } else if (s.endTime) {
            endMs = new Date(s.endTime).getTime();
          }

          const durationMs = Math.max(0, endMs - startMs);
          const money =
            Math.round(
              (pricePerMin(s.price_per_hour) * (durationMs / 60000)) / 1000,
            ) * 1000;
          return sum + money;
        }, 0);

        const subtotal = prodTotal + staffTotal + roomTotal;
        return Math.max(0, subtotal + (Number(order.adjustment) || 0));
      }, []);
      // ──── Completed Orders Table Logic ────
      const completedOrders = useMemo(() => {
        // Chỉ hiển thị đơn Đã thanh toán
        return orders.filter(
          (o) => o && o.orderCode && o.paymentStatus === "Đã thanh toán",
        );
      }, [orders]);

      const filteredCompletedOrders = useMemo(() => {
        if (!searchQuery.trim()) return completedOrders;
        const q = searchQuery.toLowerCase();
        return completedOrders.filter(
          (o) =>
            o.orderCode?.toLowerCase().includes(q) ||
            o.roomName?.toLowerCase().includes(q) ||
            String(o.roomId).includes(q),
        );
      }, [completedOrders, searchQuery]);

      const sortedCompletedOrders = useMemo(() => {
        return [...filteredCompletedOrders].sort((a, b) => {
          const getOrderTime = (o) => {
            const t =
              o?.endTime || o?.updatedAt || o?.createdAt || o?.startTime;
            const ms = t ? new Date(t).getTime() : 0;
            return Number.isFinite(ms) ? ms : 0;
          };
          return getOrderTime(b) - getOrderTime(a);
        });
      }, [filteredCompletedOrders]);

      const totalPages = useMemo(
        () => Math.max(1, Math.ceil(sortedCompletedOrders.length / PAGE_SIZE)),
        [sortedCompletedOrders.length],
      );

      const paginatedCompletedOrders = useMemo(() => {
        const start = (currentPage - 1) * PAGE_SIZE;
        return sortedCompletedOrders.slice(start, start + PAGE_SIZE);
      }, [sortedCompletedOrders, currentPage]);

      useEffect(() => {
        setCurrentPage(1);
      }, [searchQuery, orders.length]);

      useEffect(() => {
        if (currentPage > totalPages) setCurrentPage(totalPages);
      }, [currentPage, totalPages]);

      // Auto-dismiss notification
      useEffect(() => {
        if (notification && notification.duration) {
          const timer = setTimeout(() => {
            setNotification(null);
          }, notification.duration);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      // Update elapsed time for real-time calculation
      useEffect(() => {
        if (
          !showOrderCompletedModal ||
          selectedOrder?.paymentStatus === "Đã thanh toán"
        )
          return;

        const interval = setInterval(() => {
          setElapsedTick((t) => t + 1);
        }, 1000);
        return () => clearInterval(interval);
      }, [showOrderCompletedModal, selectedOrder?.paymentStatus]);

      const openOrderCompletedDetail = (order) => {
        setSelectedOrder(order);
        const products = order.products
          ? typeof order.products === "string"
            ? JSON.parse(order.products)
            : order.products
          : [];
        let staffs = order.staffs
          ? typeof order.staffs === "string"
            ? JSON.parse(order.staffs)
            : order.staffs
          : [];
        staffs = sanitizeStaffsData(Array.isArray(staffs) ? staffs : []);
        setTempProducts(products);
        setTempStaffs(staffs);
        setTempBankPayment(order.bankPayment || 0);
        setTempCashPayment(order.cashPayment || 0);
        setTempNote(order.note || "");
        setShowOrderCompletedModal(true);
      };

      const closeOrderCompletedModal = () => {
        setShowOrderCompletedModal(false);
        setSelectedOrder(null);
      };

      // Tính ước tính duration và tiền phòng khi chưa thanh toán
      const estimatedCalcForCompleted = useMemo(() => {
        if (!selectedOrder?.startTime)
          return { estimatedDuration: 0, estimatedRoomTotal: 0 };

        const startTime = new Date(selectedOrder.startTime);
        const now = new Date();
        const durationMs = now.getTime() - startTime.getTime();
        const durationMinutes = durationMs / (1000 * 60);
        const durationHours = durationMinutes / 60;
        const estimatedDuration = durationHours.toFixed(2);

        // Lấy room price từ rooms list
        const room = rooms.find(
          (r) => String(r.id) === String(selectedOrder.roomId),
        );
        const roomPrice = room ? Number(room.price_per_hour) || 0 : 0;
        const rawRoomTotal = (roomPrice / 60) * durationMinutes;
        const estimatedRoomTotal = Math.round(rawRoomTotal / 1000) * 1000;

        return { estimatedDuration, estimatedRoomTotal };
      }, [selectedOrder?.startTime, rooms, elapsedTick]);

      // Tính tổng tiền realtime trong modal cho đơn ĐÃ HOÀN THÀNH
      const calcForCompleted = useMemo(() => {
        if (!selectedOrder)
          return {
            prodTotal: 0,
            staffTotal: 0,
            roomTotal: 0,
            grandTotal: 0,
            staffBreakdown: [],
          };

        // 1. Tiền hàng hoá
        const prodTotal = tempProducts.reduce(
          (sum, p) => sum + Number(p.price) * (p.quantity || 1),
          0,
        );

        // 2. Tiền phòng (Lấy số liệu chính xác từ database nếu đã thanh toán)
        const roomTotal =
          selectedOrder?.paymentStatus === "Đã thanh toán"
            ? selectedOrder?.roomTotal || 0
            : estimatedCalcForCompleted.estimatedRoomTotal;

        // 3. Tiền tiếp viên (Tính gộp "Bao phòng" chuẩn như khi đang chạy)
        const pricePerMin = (pricePerHour) => (Number(pricePerHour) || 0) / 60;
        const staffBreakdown = tempStaffs.map((s) => {
          const firstStartTime =
            s.sessions && s.sessions.length > 0 && s.sessions[0].startTime
              ? s.sessions[0].startTime
              : s.startTime || selectedOrder?.startTime;

          if (!firstStartTime) return { ...s, money: 0, displayTime: "—" };

          const startMs = new Date(firstStartTime).getTime();
          let endMs = new Date().getTime();

          if (
            selectedOrder?.paymentStatus === "Đã thanh toán" &&
            selectedOrder.endTime
          ) {
            endMs = new Date(selectedOrder.endTime).getTime();
          } else if (s.isLeft && s.sessions && s.sessions.length > 0) {
            const lastSession = s.sessions[s.sessions.length - 1];
            if (lastSession.endTime)
              endMs = new Date(lastSession.endTime).getTime();
          } else if (s.endTime) {
            endMs = new Date(s.endTime).getTime();
          }

          const durationMs = Math.max(0, endMs - startMs);
          const money =
            Math.round(
              (pricePerMin(s.price_per_hour) * (durationMs / 60000)) / 1000,
            ) * 1000;

          const displayIn = new Date(startMs).toLocaleTimeString("vi-VN", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const displayOut = new Date(endMs).toLocaleTimeString("vi-VN", {
            hour: "2-digit",
            minute: "2-digit",
          });

          return {
            ...s,
            money,
            displayTime: `${displayIn} - ${displayOut}`,
          };
        });

        const staffTotal = staffBreakdown.reduce((sum, s) => sum + s.money, 0);

        // 4. Tổng thanh toán
        const serviceTotal = prodTotal + staffTotal;
        const subtotal = serviceTotal + roomTotal;

          0,
          serviceTotal + Number(adjustment || 0),

          productTotal,

            next[idx] = {
              ...next[idx],
              quantity: next[idx].quantity + finalQty,

                      </button>
                    ))
                  )}
                </div>
                <div className="border-t px-6 py-4 bg-slate-50">
                  <button
                    onClick={() => setShowAddStaffToOrderModal(false)}
                    className="w-full py-3 font-semibold bg-slate-300 hover:bg-slate-400 text-slate-800 rounded-2xl"
                  >
                    Đóng
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* COMPLETED ORDER DETAIL MODAL */}
          {showOrderCompletedModal && selectedOrder && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-2 md:p-4">
              <div className="bg-white rounded-3xl border border-slate-200 shadow-2xl w-full max-w-2xl max-h-[95vh] overflow-hidden flex flex-col">
                {/* Header */}
                <div className="px-6 py-4 border-b flex items-start justify-between bg-gradient-to-r from-slate-800 to-slate-700">
                  <div>
                    <div className="flex items-center gap-2 mb-0.5">
                      <h2 className="text-xl font-bold text-white">
                        {selectedOrder.orderCode}
                      </h2>
                      {selectedOrder.paymentStatus === "Đã thanh toán" ? (
                        <span className="text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-medium">
                          ✅ Đã thanh toán
                        </span>
                      ) : (
                        <span className="text-xs bg-amber-400 text-slate-900 px-2 py-0.5 rounded-full font-medium">
                          ⏳ Chưa thanh toán
                        </span>
                      )}
                    </div>
                    <p className="text-slate-300 text-sm">
                      {rooms.find(
                        (r) => String(r.id) === String(selectedOrder.roomId),
                      )?.name ||
                        selectedOrder.roomName ||
                        `Phòng ${selectedOrder.roomId}`}
                    </p>
                  </div>
                  <button
                    onClick={closeOrderCompletedModal}
                    className="text-3xl leading-none text-white/60 hover:text-white mt-1"
                  >
                    ×
                  </button>
                </div>

                {/* Body */}
                <div className="flex-1 overflow-auto">
                  {/* Thời gian */}
                  <div className="grid grid-cols-2 gap-px bg-slate-100">
                    <div className="bg-white px-5 py-3">
                      <div className="text-xs text-slate-400 mb-0.5">
                        Bắt đầu
                      </div>
                      <div className="text-sm font-semibold text-slate-800">
                        {selectedOrder?.startTime
                          ? new Date(selectedOrder.startTime).toLocaleString(
                              "vi-VN",
                            )
                          : "—"}
                      </div>
                    </div>
                    <div className="bg-white px-5 py-3">
                      <div className="text-xs text-slate-400 mb-0.5">
                        Kết thúc
                      </div>
                      <div className="text-sm font-semibold text-slate-800">
                        {selectedOrder?.endTime
                          ? new Date(selectedOrder.endTime).toLocaleString(
                              "vi-VN",
                            )
                          : "—"}
                      </div>
                    </div>
                  </div>

                  {/* Hàng hoá */}
                  {tempProducts.length > 0 && (
                    <div className="px-5 py-4 border-b">
                      <div className="text-sm font-semibold text-slate-600 mb-2">
                        🛒 Hàng hoá
                      </div>
                      <div className="space-y-1.5">
                        {tempProducts.map((item) => (
                          <div
                            key={item.id}
                            className="flex justify-between items-center bg-slate-50 rounded-xl px-3 py-2"
                          >
                            <div>
                              <span className="font-medium text-slate-800 text-sm">
                                {item.name}
                              </span>
                              <span className="text-slate-400 text-xs ml-2">
                                × {item.quantity}
                              </span>
                            </div>
                            <span className="text-sm font-semibold text-slate-700">
                              {(
                                Number(item.price) * (item.quantity || 1)
                              ).toLocaleString()}
                              đ
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Tiếp viên (Đã gộp chuẩn Bao phòng) */}
                  {calcForCompleted.staffBreakdown.length > 0 && (
                    <div className="px-5 py-4 border-b">
                      <div className="text-sm font-semibold text-slate-600 mb-2">
                        👥 Tiếp viên
                      </div>
                      <div className="space-y-1.5">
                        {calcForCompleted.staffBreakdown.map((s, idx) => (
                          <div
                            key={s.id + "-" + idx}
                            className="flex justify-between items-center bg-slate-50 rounded-xl px-3 py-2"
                          >
                            <div>
                              <div className="font-medium text-slate-800 text-sm">
                                {s.name}
                              </div>
                              <div className="text-xs text-slate-400 font-mono">
                                {s.displayTime}
                              </div>
                            </div>
                            <span className="text-sm font-semibold text-slate-700">
                              {s.money.toLocaleString()}đ
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Tổng kết */}
                  <div className="px-5 py-4 bg-slate-50 border-b space-y-2">
                    <div className="flex justify-between text-sm text-slate-600">
                      <span>
                        🏠 Tiền phòng ({selectedOrder?.duration || "—"}h)
                      </span>
                      <span className="font-semibold">
                        {(
                          selectedOrder?.roomTotal ||
                          calcForCompleted.roomTotal ||
                          0
                        ).toLocaleString()}
                        đ
                      </span>
                    </div>
                    <div className="flex justify-between text-sm text-slate-600">
                      <span>🛒 Tổng hàng hoá</span>
                      <span className="font-semibold">
                        {calcForCompleted.prodTotal.toLocaleString()}đ
                      </span>
                    </div>
                    <div className="flex justify-between text-sm text-slate-600">
                      <span>👥 Tổng tiếp viên</span>
                      <span className="font-semibold">
                        {calcForCompleted.staffTotal.toLocaleString()}đ
                      </span>
                    </div>

                    <div className="flex justify-between text-lg font-bold border-t pt-2 mt-1">
                      <span>Tổng thanh toán</span>
                      <span className="text-emerald-600">
                        {calcForCompleted.grandTotal.toLocaleString()}đ
                      </span>
                    </div>
                  </div>

                  {/* Phương thức thanh toán */}
                  <div className="px-5 py-4 grid grid-cols-2 gap-3">
                    <div className="bg-blue-50 border border-blue-100 rounded-2xl px-4 py-3">
                      <div className="text-xs text-blue-400 mb-1">
                        💳 Chuyển khoản
                      </div>
                      <div className="font-bold text-blue-700">
                        {Number(
                          selectedOrder?.bankPayment || 0,
                        ).toLocaleString()}
                        đ
                      </div>
                    </div>
                    <div className="bg-emerald-50 border border-emerald-100 rounded-2xl px-4 py-3">
                      <div className="text-xs text-emerald-400 mb-1">
                        💵 Tiền mặt
                      </div>
                      <div className="font-bold text-emerald-700">
                        {Number(
                          selectedOrder?.cashPayment || 0,
                        ).toLocaleString()}
                        đ
                      </div>
                    </div>
                  </div>
                </div>

                {/* Footer */}
                <div className="border-t p-4 flex flex-wrap gap-3 bg-slate-50">
                  <button
                    onClick={() => setShowReopenConfirm(true)}
                    className="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-2xl transition-colors text-sm"
                  >
                    ↩ Đẩy về phòng
                  </button>
                  <button
                    onClick={() =>
                      printInvoice(selectedOrder, calcForCompleted)
                    }
                    className="flex-1 py-3 border border-slate-300 hover:bg-slate-100 font-medium rounded-2xl text-sm"
                  >
                    🖨️ In hoá đơn
                  </button>
                  <button
                    onClick={deleteOrderFromCompleted}
                    className="py-3 px-5 bg-rose-600 hover:bg-rose-700 text-white font-semibold rounded-2xl transition-colors text-sm"
                  >
                    🗑 Xoá
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Reopen Confirm Popup */}
          {showReopenConfirm && selectedOrder && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[70] p-4">
              <div className="bg-white rounded-3xl max-w-sm w-full p-6 text-center shadow-2xl animate-in fade-in zoom-in-95 duration-200 border-2 border-amber-200">
                <div className="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                  ↩
                </div>
                <h3 className="text-xl font-bold text-slate-800 mb-2">
                  Đẩy về lại phòng?
                </h3>
                <p className="text-slate-500 mb-6 text-sm">
                  Đơn <b>{selectedOrder.orderCode}</b> sẽ bị Huỷ Thanh Toán và
                  chuyển về lại trạng thái đang hoạt động.
                </p>
                <div className="flex gap-3">
                  <button
                    onClick={() => setShowReopenConfirm(false)}
                    className="flex-1 py-3 border border-slate-300 font-medium rounded-xl hover:bg-slate-50 text-slate-700 transition duration-200"
                  >
                    Huỷ bỏ
                  </button>
                  <button
                    onClick={() => {
                      // 1. Đóng modal xác nhận ngay lập tức cho mượt
                      setShowReopenConfirm(false);

                      const targetRoom = rooms.find(
                        (r) => String(r.id) === String(selectedOrder.roomId),
                      );

                      // 2. Kiểm tra lỗi (nếu phòng đang có người khác dùng)
                      if (
                        targetRoom &&
                        targetRoom.status === "occupied" &&
                        targetRoom.current_order_id &&
                        String(targetRoom.current_order_id) !==
                          String(selectedOrder.orderCode)
                      ) {
                        setNotification({
                          type: "warning",
                          title: "Không thể đẩy về phòng",
                          message: `Phòng đang được sử dụng bởi đơn ${targetRoom.current_order_id}. Vui lòng kết thúc hoặc chuyển đơn đó trước.`,
                          duration: 5000,
                        });
                        return;
                      }

                      // 3. Chuẩn bị dữ liệu mới
                      const reopenedOrder = {
                        ...selectedOrder,
                        paymentStatus: "Chưa thanh toán",
                        endTime: "",
                        duration: "",
                        roomTotal: 0,
                      };

                      const updatedOrders = orders.map((o) =>
                        o.orderCode === selectedOrder.orderCode
                          ? reopenedOrder
                          : o,
                      );

                      const updatedRooms = rooms.map((r) =>
                        String(r.id) === String(selectedOrder.roomId)
                          ? {
                              ...r,
                              status: "occupied",
                              current_order_id: selectedOrder.orderCode,
                              start_time: selectedOrder.startTime, // Giữ nguyên giờ gốc
                            }
                          : r,
                      );

                      let updatedStaffs = [...staffs];
                      try {
                        const orderStaffs = JSON.parse(
                          selectedOrder.staffs || "[]",
                        );
                        orderStaffs.forEach((os) => {
                          updatedStaffs = updatedStaffs.map((s) =>
                            String(s.id) === String(os.id)
                              ? {
                                  ...s,
                                  status: "busy",
                                  current_roomId: selectedOrder.roomId,
                                }
                              : s,
                          );
                        });
                      } catch (e) {
                        console.error(e);
                      }

                      // 4. CẬP NHẬT GIAO DIỆN NGAY LẬP TỨC (Không cần chờ server)
                      setOrders(updatedOrders);
                      setRooms(updatedRooms);
                      setStaffs(updatedStaffs);
                      saveUnifiedCache({
                        rooms: updatedRooms,
                        orders: updatedOrders,
                        products,
                        staffs: updatedStaffs,
                      });

                      // Tắt popup chi tiết đơn và báo thành công
                      closeOrderCompletedModal();
                      setSuccess("Đang đẩy về phòng...");

                      // 5. Gọi Server chạy ngầm dưới nền
                      if (!RoomServer.isLocal) {
                        google.script.run
                          .withSuccessHandler(() => {
                            setSuccess("Đã mở lại phòng thành công!");
                            setTimeout(() => setSuccess(""), 3000);
                          })
                          .withFailureHandler((err) => {
                            setError(
                              "Lưu server thất bại, vui lòng tải lại trang: " +
                                (err.message || err),
                            );
                          })
                          .reopenOrderAndRoom(selectedOrder.orderCode);
                      } else {
                        setTimeout(() => setSuccess(""), 3000);
                      }
                    }}
                    className="flex-1 py-3 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-xl shadow-lg shadow-amber-500/30 transition duration-200"
                  >
                    Đồng ý đẩy
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Notification Popup */}
          {notification && (
            <div className="fixed top-6 right-6 z-50 animate-in slide-in-from-right-4 duration-300">
              <div
                className={`rounded-3xl shadow-2xl p-6 max-w-md text-white flex items-start gap-4 ${notification.type === "warning" ? "bg-amber-500" : "bg-emerald-500"}`}
              >
                <div className="text-2xl mt-1">
                  {notification.type === "warning" ? "⏰" : "✓"}
                </div>
                <div className="flex-1">
                  <div className="font-bold text-lg">{notification.title}</div>
                  <div className="text-sm opacity-95">
                    {notification.message}
                  </div>
                </div>
                <button
                  onClick={() => setNotification(null)}
                  className="text-white/70 hover:text-white text-xl mt-0.5 flex-shrink-0"
                >
                  ×
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };
  })();
</script>
