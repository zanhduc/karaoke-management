<script type="text/babel">
    (function () {
        const { useEffect, useMemo, useState, useCallback } = React;

        // ── helpers ──────────────────────────────────────────────
        const fmt = (n) => Number(n || 0).toLocaleString("vi-VN");

        function addMinutes(date, mins) {
            return new Date(date.getTime() + mins * 60000);
        }

        function toTimeStr(date) {
            return date.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });
        }

        // ── main component ────────────────────────────────────────
        window.OrderPage = function OrderPage() {
            const [rooms, setRooms] = useState([]);
            const [products, setProducts] = useState([]);
            const [staffs, setStaffs] = useState([]);
            const [customers, setCustomers] = useState([]);

            const [isLoading, setIsLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [error, setError] = useState("");
            const [success, setSuccess] = useState("");

            // ── form state ──────────────────────────────────────────
            const [selectedRoomId, setSelectedRoomId] = useState("");
            const [startTime] = useState(new Date()); // giờ bắt đầu = lúc tạo đơn

            const [selectedCustomerId, setSelectedCustomerId] = useState(""); // khách quen
            const [guestName, setGuestName] = useState(""); // nếu là khách vãng lai
            const [note, setNote] = useState("");

            // hàng hoá đã chọn: [{...product, quantity}]
            const [orderItems, setOrderItems] = useState([]);
            const [pickProductId, setPickProductId] = useState("");
            const [pickQty, setPickQty] = useState(1);

            // tiếp viên đã chọn: [{...staff}] - không có hours
            const [orderStaffs, setOrderStaffs] = useState([]);
            const [pickStaffId, setPickStaffId] = useState("");

            // giảm giá
            const [discountCustomer, setDiscountCustomer] = useState(0);
            const [adjustment, setAdjustment] = useState(0);

            // ── load data ───────────────────────────────────────────
            useEffect(() => {
                setIsLoading(true);
                Promise.all([
                    new Promise(res => google.script.run.withSuccessHandler(res).getRooms()),
                    new Promise(res => google.script.run.withSuccessHandler(res).getProducts()),
                    new Promise(res => google.script.run.withSuccessHandler(res).getStaffs()),
                    new Promise(res => google.script.run.withSuccessHandler(res).getCustomers()),
                ]).then(([r, p, s, c]) => {
                    setRooms(r || []);
                    setProducts(p || []);
                    setStaffs(s || []);
                    setCustomers(c || []);
                    setIsLoading(false);
                }).catch(() => {
                    setError("Không tải được dữ liệu.");
                    setIsLoading(false);
                });
            }, []);

            // ── derived ─────────────────────────────────────────────
            const availableRooms = useMemo(
                () => rooms.filter(r => String(r.status).toLowerCase() === "available"),
                [rooms]
            );

            const selectedRoom = useMemo(
                () => rooms.find(r => String(r.id) === selectedRoomId) || null,
                [rooms, selectedRoomId]
            );

            const selectedCustomer = useMemo(
                () => customers.find(c => String(c.id) === selectedCustomerId) || null,
                [customers, selectedCustomerId]
            );

            // Tính discount từ khách quen khi chọn
            useEffect(() => {
                if (selectedCustomer && selectedCustomer.discountPercent > 0) {
                    // Tính toán discount dựa trên % từ khách quen
                    // Nhưng cần đợi cho đến khi calc.grandTotal được tính xong
                    setGuestName(selectedCustomer.name);
                } else {
                    setGuestName("");
                }
            }, [selectedCustomerId, selectedCustomer]);

            const calc = useMemo(() => {
                // roomTotal = 0 vì chưa biết thời gian sử dụng (sẽ tính khi thanh toán)
                const roomTotal = 0;
                const productTotal = orderItems.reduce((s, i) => s + i.price * i.quantity, 0);
                const staffTotal = orderStaffs.reduce((s, i) => s + (Number(i.price_per_hour) || 0), 0);

                const serviceTotal = productTotal + staffTotal;
                const subtotal = roomTotal + serviceTotal;

                // Tính discount từ khách quen hoặc từ input manual
                let discount = Number(discountCustomer || 0);
                if (selectedCustomer && selectedCustomer.discountPercent > 0) {
                    discount = Math.floor((subtotal * selectedCustomer.discountPercent) / 100);
                }

                const grandTotal = Math.max(0, subtotal - discount + Number(adjustment || 0));

                return { roomTotal, productTotal, staffTotal, serviceTotal, grandTotal, discount };
            }, [orderItems, orderStaffs, discountCustomer, adjustment, selectedCustomer]);

            // ── handlers: hàng hoá ──────────────────────────────────
            const addProduct = useCallback(() => {
                if (!pickProductId) return;
                const prod = products.find(p => String(p.id) === pickProductId);
                if (!prod) return;
                setOrderItems(prev => {
                    const idx = prev.findIndex(i => i.id === prod.id);
                    if (idx >= 0) {
                        const next = [...prev];
                        next[idx] = { ...next[idx], quantity: next[idx].quantity + Number(pickQty) };
                        return next;
                    }
                    return [...prev, { ...prod, quantity: Number(pickQty) }];
                });
                setPickProductId("");
                setPickQty(1);
            }, [pickProductId, pickQty, products]);

            const removeItem = id => setOrderItems(prev => prev.filter(i => i.id !== id));

            const updateItemQty = (id, q) => {
                const qty = Number(q);
                if (qty < 1) return;
                setOrderItems(prev => prev.map(i => i.id === id ? { ...i, quantity: qty } : i));
            };

            // ── handlers: tiếp viên ─────────────────────────────────
            const addStaff = useCallback(() => {
                if (!pickStaffId) return;
                const staff = staffs.find(s => String(s.id) === pickStaffId);
                if (!staff) return;
                setOrderStaffs(prev => {
                    if (prev.find(s => s.id === staff.id)) return prev; // không thêm trùng
                    return [...prev, { ...staff }];
                });
                setPickStaffId("");
            }, [pickStaffId, staffs]);

            const removeStaff = id => setOrderStaffs(prev => prev.filter(s => s.id !== id));

            // ── submit ───────────────────────────────────────────────
            const handleCreate = async () => {
                // Chống trùng lặp: không cho submit lại nếu đang submit
                if (isSubmitting) return;

                setError("");
                if (!selectedRoomId) return setError("Vui lòng chọn phòng");

                const customerName = guestName.trim() || "Khách vãng lai";

                const orderData = {
                    roomId: selectedRoomId,
                    roomName: selectedRoom?.name || "",
                    customerName,

                    startTime: startTime.toISOString(),
                    endTime: "",  // Sẽ được set lúc thanh toán
                    duration: "",  // Sẽ được tính lúc thanh toán

                    serviceTotal: calc.serviceTotal,
                    roomTotal: 0,  // Sẽ được tính lúc thanh toán

                    products: orderItems.map(({ id, name, quantity, price }) => ({ id, name, quantity, price })),
                    staffs: orderStaffs.map(({ id, name, price_per_hour }) => ({ id, name, price_per_hour })),

                    grandTotal: calc.grandTotal,

                    // ✅ LUÔN = chưa thanh toán
                    discountCustomer: calc.discount,  // Lấy từ khách quen hoặc input
                    adjustment: Number(adjustment || 0),
                    cashPayment: 0,
                    bankPayment: 0,
                    paymentStatus: "Chưa thanh toán",

                    note: note.trim(),
                };

                setIsSubmitting(true);
                try {
                    const res = await new Promise((resolve, reject) =>
                        google.script.run
                            .withSuccessHandler(resolve)
                            .withFailureHandler(reject)
                            .createOrder(orderData)
                    );

                    if (res.success) {
                        setSuccess(`Tạo hoá đơn thành công! Mã HĐ: ${res.orderCode}`);

                        // reset
                        setSelectedRoomId("");
                        setSelectedCustomerId("");
                        setGuestName("");
                        setNote("");
                        setOrderItems([]);
                        setOrderStaffs([]);
                        setDiscountCustomer(0);
                        setAdjustment(0);

                        setTimeout(() => setSuccess(""), 5000);
                    }
                } catch (e) {
                    setError("Tạo đơn thất bại: " + (e.message || e));
                } finally {
                    setIsSubmitting(false);
                }
            };
            if (isLoading) return <div className="p-8 text-center text-slate-400">Đang tải dữ liệu...</div>;

            const availableStaffs = staffs.filter(s => ["available", "busy"].includes(String(s.status).toLowerCase()));

            return (
                <div className="max-w-3xl mx-auto p-4 space-y-4">

                    {/* header */}
                    <div className="px-1 pb-2 border-b border-slate-200">
                        <h1 className="text-2xl font-bold text-slate-800">Soạn đơn hàng</h1>
                        <p className="text-sm text-slate-500 mt-0.5">Tạo hoá đơn dịch vụ karaoke</p>
                    </div>

                    {error && <div className="p-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl text-sm">{error}</div>}
                    {success && <div className="p-3 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-2xl text-sm">{success}</div>}

                    {/* ── SECTION 1: Phòng & thời gian ── */}
                    <Section title="Phòng & thời gian">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div className="sm:col-span-2">
                                <Label>Chọn phòng trống</Label>
                                <select
                                    value={selectedRoomId}
                                    onChange={e => setSelectedRoomId(e.target.value)}
                                    className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
                                >
                                    <option value="">-- Chọn phòng --</option>
                                    {availableRooms.map(r => (
                                        <option key={r.id} value={r.id}>
                                            {r.name} — {r.type} — {fmt(r.price_per_hour)}đ/giờ
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <div>
                                <Label>Giờ bắt đầu</Label>
                                <div className="rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500">
                                    {toTimeStr(startTime)} — hôm nay
                                </div>
                            </div>

                            {selectedRoom && (
                                <div>
                                    <Label>Giá phòng</Label>
                                    <div className="rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 bg-slate-50">
                                        {fmt(selectedRoom.price_per_hour)} đ/giờ
                                    </div>
                                </div>
                            )}
                        </div>
                    </Section>

                    {/* ── SECTION 2: Khách hàng ── */}
                    <Section title="Khách hàng">
                        <div>
                            <Label>Chọn khách quen (tùy chọn)</Label>
                            <select
                                value={selectedCustomerId}
                                onChange={(e) => setSelectedCustomerId(e.target.value)}
                                className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm mb-3"
                            >
                                <option value="">-- Chọn khách quen --</option>
                                {customers.map(c => (
                                    <option key={c.id} value={c.id}>
                                        {c.name} — Giảm {Number(c.discountPercent || 0)}%
                                    </option>
                                ))}
                            </select>
                        </div>
                        <div>
                            <Label>Tên khách</Label>
                            <input
                                type="text"
                                value={guestName}
                                onChange={e => setGuestName(e.target.value)}
                                placeholder="Nhập tên khách"
                                className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
                            />
                        </div>
                    </Section>

                    {/* ── SECTION 3: Hàng hoá ── */}
                    <Section title="Hàng hoá / đồ uống">
                        {/* picker */}
                        <div className="flex gap-2 mb-3">
                            <select
                                value={pickProductId}
                                onChange={e => setPickProductId(e.target.value)}
                                className="flex-1 rounded-xl border border-slate-200 px-3 py-2 text-sm"
                            >
                                <option value="">-- Chọn sản phẩm --</option>
                                {products.map(p => (
                                    <option key={p.id} value={p.id}>
                                        {p.name} — {fmt(p.price)}đ/{p.unit || "cái"}
                                    </option>
                                ))}
                            </select>
                            <input
                                type="number"
                                min="1"
                                value={pickQty}
                                onChange={e => setPickQty(Number(e.target.value))}
                                className="w-20 rounded-xl border border-slate-200 px-3 py-2 text-sm text-center"
                            />
                            <button
                                onClick={addProduct}
                                className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-xl hover:bg-indigo-700"
                            >
                                + Thêm
                            </button>
                        </div>

                        {/* danh sách */}
                        {orderItems.length === 0 && (
                            <p className="text-sm text-slate-400 text-center py-3">Chưa có hàng hoá nào</p>
                        )}
                        {orderItems.map(item => (
                            <div key={item.id} className="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
                                <span className="flex-1 text-sm font-medium">{item.name}</span>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => updateItemQty(item.id, item.quantity - 1)}
                                        className="w-6 h-6 flex items-center justify-center border border-slate-200 rounded text-xs">−</button>
                                    <span className="w-8 text-center text-sm">{item.quantity}</span>
                                    <button onClick={() => updateItemQty(item.id, item.quantity + 1)}
                                        className="w-6 h-6 flex items-center justify-center border border-slate-200 rounded text-xs">+</button>
                                </div>
                                <span className="text-sm font-medium text-emerald-700 w-28 text-right">
                                    {fmt(item.price * item.quantity)} đ
                                </span>
                                <button onClick={() => removeItem(item.id)}
                                    className="text-rose-400 text-xs ml-1">✕</button>
                            </div>
                        ))}

                        {orderItems.length > 0 && (
                            <div className="flex justify-end pt-2 text-sm font-medium text-slate-600">
                                Tổng hàng hoá: <span className="ml-2 text-emerald-700">{fmt(calc.productTotal)} đ</span>
                            </div>
                        )}
                    </Section>

                    {/* ── SECTION 4: Tiếp viên ── */}
                    <Section title="Tiếp viên phục vụ">
                        <div className="flex gap-2 mb-3">
                            <select
                                value={pickStaffId}
                                onChange={e => setPickStaffId(e.target.value)}
                                className="flex-1 rounded-xl border border-slate-200 px-3 py-2 text-sm"
                            >
                                <option value="">-- Chọn tiếp viên --</option>
                                {availableStaffs.map(s => (
                                    <option key={s.id} value={s.id}>
                                        {s.name} — {fmt(s.price_per_hour)}đ/giờ
                                    </option>
                                ))}
                            </select>
                            <button
                                onClick={addStaff}
                                className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-xl hover:bg-indigo-700"
                            >
                                + Thêm
                            </button>
                        </div>

                        {orderStaffs.length === 0 && (
                            <p className="text-sm text-slate-400 text-center py-3">Chưa chọn tiếp viên</p>
                        )}
                        {orderStaffs.map(staff => (
                            <div key={staff.id} className="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
                                <span className="flex-1 text-sm font-medium">{staff.name}</span>
                                <span className="text-xs text-slate-400 w-28 text-right">
                                    × {fmt(staff.price_per_hour)}đ/giờ
                                </span>
                                <button onClick={() => removeStaff(staff.id)}
                                    className="text-rose-400 text-xs ml-1">✕</button>
                            </div>
                        ))}

                        {orderStaffs.length > 0 && (
                            <div className="flex justify-end pt-2 text-sm font-medium text-slate-600">
                                Số lượng: <span className="ml-2 text-emerald-700">{orderStaffs.length} người</span>
                            </div>
                        )}
                    </Section>

                    {/* ── SECTION 5: Thanh toán ── */}
                    <Section title="Tổng kết & thanh toán">
                        <div className="space-y-2 mb-4">
                            <div className="p-3 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-700">
                                💡 Tiền phòng sẽ được tính khi khách thanh toán (làm tròn theo giờ)
                            </div>
                            <TotalRow label="Hàng hoá" value={fmt(calc.productTotal) + " đ"} />
                            <TotalRow label="Tiếp viên (số người)" value={orderStaffs.length + " người"} />
                            {calc.discount > 0 && (
                                <TotalRow
                                    label={selectedCustomer ? `Giảm khách quen (${selectedCustomer.name} - ${selectedCustomer.discountPercent}%)` : "Giảm khách hàng"}
                                    value={"− " + fmt(calc.discount) + " đ"}
                                    valueClass="text-rose-600"
                                />
                            )}
                            {!selectedCustomer && (
                                <div className="flex justify-between items-center pt-1">
                                    <span className="text-sm text-slate-500">Giảm thêm (không khách quen)</span>
                                    <input
                                        type="number"
                                        value={discountCustomer}
                                        onChange={e => setDiscountCustomer(Number(e.target.value))}
                                        className="w-32 text-right border border-slate-200 rounded-xl px-3 py-1 text-sm"
                                    />
                                </div>
                            )}
                            <div className="flex justify-between items-center pt-1">
                                <span className="text-sm text-slate-500">Điều chỉnh trực tiếp</span>
                                <input
                                    type="number"
                                    value={adjustment}
                                    onChange={e => setAdjustment(Number(e.target.value))}
                                    className="w-32 text-right border border-slate-200 rounded-xl px-3 py-1 text-sm"
                                />
                            </div>
                            <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                <span className="text-lg font-semibold">Tổng thanh toán</span>
                                <span className="text-xl font-bold text-emerald-600">{fmt(calc.grandTotal)} đ</span>
                            </div>
                        </div>


                        <div className="mb-4">
                            <Label>Ghi chú</Label>
                            <textarea
                                value={note}
                                onChange={e => setNote(e.target.value)}
                                placeholder="Ghi chú thêm (nếu có)"
                                className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm h-16 resize-none"
                            />
                        </div>

                        <button
                            onClick={handleCreate}
                            disabled={isSubmitting}
                            className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl transition text-base disabled:opacity-60 disabled:cursor-not-allowed"
                        >
                            {isSubmitting ? "Đang tạo..." : "Tạo hoá đơn"}
                        </button>
                    </Section>
                </div>
            );
        };

        // ── small helpers ─────────────────────────────────────────
        function Section({ title, children }) {
            return (
                <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                    <div className="px-4 py-2 border-b border-slate-100 bg-slate-50">
                        <span className="text-xs font-medium text-slate-500 uppercase tracking-wide">{title}</span>
                    </div>
                    <div className="p-4">{children}</div>
                </div>
            );
        }

        function Label({ children }) {
            return <p className="text-xs text-slate-500 mb-1">{children}</p>;
        }

        function TotalRow({ label, value, valueClass = "text-slate-700" }) {
            return (
                <div className="flex justify-between items-center">
                    <span className="text-sm text-slate-500">{label}</span>
                    <span className={`text-sm font-medium ${valueClass}`}>{value}</span>
                </div>
            );
        }
    })();
</script>
